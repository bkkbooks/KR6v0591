body:
  text: 佛教的財富觀講於馬尼拉信願寺一敘起我們信佛學佛是要依法而行這在昨天曾經説到如人間的財富問題佛法怎樣指示我們也是佛弟子迫切需要知道的財富包括一切動産不動産國有的和私有的日常生活所需以及金銀寶玉等都是可是我先得申明我現在所要講的不是什麼經濟學也不是討論出家人對於財富的態度及處理的辦法現在要談談一般在家人對財富應怎樣取得應怎樣處理等問題功德天與黑女先從一故事來説起我們中國人遇到家境困難生活無著或是生意不景氣就去求財神在印度就是敬奉功德天如供天儀軌所説的南無第一威德成就衆事大功德天求功德天的恩賜財富故事就這樣發生了有人家道衰落就供養功德天早晚都誠意的禮拜一直供養到兩年居然得到了功德天的感應那天聽見有人推門進來一看正是功德天窮人急忙起來以最敬虔而歡喜的心情去迎接功德天是一位最美麗的女郎可是當他將坐下時外面又有人推門窮人忙著去看時這回來的卻是一位又黑又醜的女郎窮人阻止他進來可是那位黑女郎卻一定要進來同時説功德天是我姊姊我是他的妹妹黑女我們姊妹是從來不曾分離的你請他即使不請我我也非來不可姊姊來賜與財富我是來銷散財物的你見過有積聚財物而不散失的嗎這一故事説明了世上的一切財富都是無常的得來是那樣艱難可是結果是不能不散失而且又散失得那麼容易所以我們學佛的財富不可強求如散失了也不必過分的懊喪因為這是遲早要散失的反而應該注意財富應怎樣得來得來了應怎樣處理才不致讓它無意義的消散了毒蛇與福德資糧財富究竟是好事還是壞事呢再以故事來説明佛陀在世時每天實行乞食的生活阿難是佛的隨身侍者一次佛和阿難又去乞食了走到中途水溝旁的時候佛忽回頭對阿難説阿難毒蛇阿難上去一看就説毒蛇世尊他們就走過去了那時有父子兩人在田間工作聽説有毒蛇就跑過來看看不看也罷一看兩人有説不出的歡喜那裡有毒蛇溝旁土裡所露出的卻是一罈黃金於是父子倆歡天喜地的把黃金搬回家去了得到了黃金怎麼辦呢取一塊去金鋪裡兌換金鋪裡見他們是窮人心裡起了懷疑暗暗的去報告了官府一會兒便把父子倆捉了去再到家裡去搜索收藏的黃金一起查了出來審問明白就判定了盜取國王財物的罪名當時是波斯匿王時代法律上説凡藏於地下的都歸國王所有這父子兩人就以這個罪名而被判死刑在刑場上父親忽然想起了對兒子説阿難毒蛇兒子一想比丘説的真不錯現在是為黃金毒蛇所害而要死了也就望著父親説毒蛇世尊監斬的是一位佛弟子聽了他們的話覺得希奇就去報告波斯匿王王聽了要父子兩人回去問他們這兩句話的由來他們於是把早上在田間遇到的事情説了國王知道這是佛與阿難説的對他們説這是佛的開示現在你們信不信佛的話呢回答説真是毒蛇害得我們喪生失命怎麼還不信呢波斯匿王因他們信佛就把他們開釋了這個故事説明了金錢是萬惡的它使人墮落作惡喪失生命多少人為金錢而犧牲世上多少罪惡多少苦難不是從金錢而來嗎這是近於小乘的見解從另一面説如把財富應用得當是大有利益的佛法要我們修福修慧如把財富來布施行善便是成佛的福德資糧什麼叫資糧如旅行時非預備旅行資具糧食舟車等不可我們如發心學佛也非有資糧不可否則是不會成就的如以財富布施作福便是修集福德為成佛的資糧那麼應用財富而得當不是最有意義的嗎所以佛法對於財富決非一味的厭惡它看作毒蛇那樣財富是毒蛇同時也就是資糧問題在你怎樣處理它二財富由布施福業而來由福業而非神賜説到財富簡單的説一切都從布施福德而來從布施業因的感果得來我們所有的財富無論小至粒米大至全世界都是從我們的福業而來而不是什麼神所賜豫的神教的信仰者把他們的一切財物享受都看作神造而賜豫享受的他們對日常的飲食都當作神賜而在感謝祂的恩典這原是靠天吃飯的幼稚想法但是佛説這是依我們自己所積的福德得來的在過去世中如造作了很多福業那麼現在就有富有的享受反之便只有小小的福報甚至窮困到無以為生所以過去世的福業決定了我們現在的財富與享受一切是神所賜豫的理論上決不能使人滿意例如嬰孩初生他們所處的家庭為什麼大有貧富的差別這不能説是他們對神的信仰有所不同如厚彼薄此神也就太任性而不平等了再説有多少人對神的信仰是虔誠的但一直過著窮困的生活這又怎樣解釋呢佛弟子不能信任神的恩賜認為一切要依自己自己的業力才決定自己的福報如何從衆緣而非定命財富從布施福業得來雖是絶對的定律但其中還有許多問題一有宿因或更待現緣如説過去積有福業現在享有福報那麼現在的我們不是就可以坐享福樂嗎一切可以不勞而獲的定命論是不對的因為我們知道雖有布施業因而福報現前大抵還是要有現緣的有一笑話可以助明這個道理有人生下來後被很多算命的算定為命運好大福大壽此人因此而驕傲懶惰不肯工作坐享幸福他的妻子遇到這麼一位丈夫也只有終日嘔氣一次他準備回娘家去住幾天想到那位懶丈夫沒有人烹飪送到面前他是不會去動手的可能會餓死於是便替他製了夠半個月吃的大米糕中間留一圓孔挂在他的頸項上讓他餓了好吃他去了近十天忙著回家來那知一進家門便見那位懶丈夫餓死在一邊原來他懶得要命只吃到低頭吃得到的部分連把大米糕轉動一下也不肯動手這當然是笑話正説明了偏信前生福業是不成的前生的福業有的能自然感報不須要功力如嬰孩的生在富貴人家但更多是除了宿世的福業而外還要依自己現生的功力現緣用一分的力量有一分的收穫如農夫種田播下種子如宿世施業還得勤勞的灌水下肥除草如現生功力才會豐收不然坐等收穫那是沒有把握的除非少數的田土肥雨量足但雖有收成而産量不會多如宿生的福業自然感報種田是這樣種福田而得福報也是這樣所以不能專依宿生的福業還得靠現生的功力如專依宿業成為定命論那就像懶人一樣結果可悲慘了佛法不是定命論請大家注意二得福果或造成惡因關於福報我想説幾句話大家不要驚慌財富從布施的福業得來那麼現在辛苦的做生意或從政或勞動而得的財富是由福業而來嗎是的盜匪劫掠所得的或貪污欺詐所得的財物也都是福報嗎是的這似乎太危險有財物就是有福報這不等於獎勵作惡嗎不會的依佛法説這些非法得來的財富從往因説雖從福業而來但從現緣得財的方法説卻是種下惡因了用不合法的手段得財甚至這分福報不能受用反而受到罪惡的苦報了為善有善果布施必得福報但要依因果的正常法則去實現如種田的下種以後得老老實實的下一番功力灌水下肥除草等秧苗自會逐漸的長大開花結實為我們所受用傳説有一愚癡的農夫插秧以後天天去田裡觀望而每次都非常失望因為苗生長太慢了一天到田裡去把所有的秧都給拔得高一些他才滿意的回去可是第二天再去看時所有的秧都枯死了愚蠢的農夫不讓秧苗正常的生發長大卻以不合理的手段去促成秧苗的成長苗是長了而苗也就死了秧苗所以能生長因為有部分潛在土裡如土裡沒有那拔也是不會長的福報也如此如沒有前生的福業用非法的手段也還是不能得到但即使有宿生福業不以正法而得應得的財富福報得到時惡報也就在眼前了財富都由福業而來這是徹底的道理但有了福業還要用正常的方法去得到用非法的手段得財種下惡因真是把自己的福報糟踏了所以佛説如法求財不以非法三如法求財不以非法什麼是如法依法合法什麼是非法呢一般人以為從辛勞職業得來的財物便是合法的其實未必盡然從非法職業得來的財富是種下苦因的這又有兩類一非國法所許如從事的職業沒有違犯國家或是居留地國家禁令的便是正業如國法所不許的或不許民營的不許外僑經營的不許種植如鴉片或出賣的就不可以作國家的法令不論國民或僑民都應該遵守雖然國家的法令未必都是對的如不同意國家的法令認為不合理也得依正當的辦法來求補救求改變切不可陽奉陰違觸犯禁令二非佛法所許有些職業不一定是國法所禁的但依據佛法卻是一種不正當的職業這就是以殺盜淫妄酒等解決生活的職業如屠宰漁獵或被雇負責殺人或製造殺生的器具等便是與殺有關的非法職業又如專門偷盜小偷土匪或開設淫窟出賣淫畫春藥為生的或東欺西騙以説謊為職業的或釀酒開設酒館等便是與盜淫妄酒有關的職業這些凡是良好的佛弟子是要避免的這一點不論在家或出家衆都要互相勸勉不但自己不作還得勸教內善信共同避免觸犯我們中國佛教徒對職業問題每不夠注意有的是不知道有的明知道自己的職業是不合佛法的但或為了是祖先的遺業或為了生計改變的不容易還是做下去其實有真切的信仰真實的信解善惡因果就應該拿出勇氣來改革不惜犧牲忍受痛苦來改革信佛就應依法而行希望作佛弟子的應特別重視這點有的雖從事正常的職業但在職業上或與朋友往來上非法得財廣義的説這都等於是竊取的因為非自己所應分得的而現在取得了是應該付給人的而現在卻逃避了這種財物不應有而有一切屬於非法其中有是一般性的也就是任何人都可能違犯的問題很復雜例子也多現在略舉經典上常説的幾點一竊取他物這不是以偷盜為職業而是偶然的對於別人的財物起貪染心設法竊取或順手牽羊的取為己有又如別人遺失的東西拾到了應該歸還原主不但佛法如此現代的國法也如此如拾得而私藏起來也就等於竊取還有對國家都有納稅的義務如故意延不繳納如營業稅所得稅土地稅等或是偷漏捐稅走私以多報少等這是減少國家收入增益自己財富屬於非法得財二抵賴債務借債應該歸還如抵賴而故意不還是非法的不過有的不幸而事業失敗破産了依因果律説來生也是要償還的但他確是事業失敗無款可還即不能説是非法可是有的事實上有能力歸還藉口失敗而不肯清還債務這已是非法了還有故意倒閉他人的貨款存款而自己是愈倒愈富這不但國法所不許佛法上也是惡中之惡三吞沒寄存有把現款存放到別人的名下或是金寶財物為了外出等原因寄存在親戚朋友家裡但日子一久受人寄存的便抵賴説並無此事説那些是他自己所有的還有把金錢和一些重要的手續委託知己寄存在友好處等到寄託人死了受託人便吞沒寄存的一切欺負他的後輩這都屬於非法之例四欺罔共財幾個人共同投資組成一個公司公司的財産便是股東的共財如某一股東負責在公司辦事拿出偷天換日手段偽造帳目欺弄股東把共有財富轉移到自己的腰包去又如弟兄的共有財産未分家時有的先於中竊取化公為私這都是欺罔共財的非法事項還有一些非法的取得不是一般人所能犯而只是有關人所能犯的也略説幾種一因便侵占或服務政府機關或服務工商行號或服務社團學校利用地位及職務上的便利而損害服務事業的財物這種情形實在太多了有些甚至是被人看作慣例的採辦的從中取回傭金浮報旅費或交際費低價賣出高價買進而自己從中分得一分總之為了個人利益使服務的事業少收多支都可説是因便侵占的非法二藉勢苟得這是一般從政人員所最易犯的利用權勢及職務非法得財的辦法真多如人向某機關辦理某項手續裡面的負責人不替你辦理或問題層出不窮讓人走上好幾回還説過幾天來等得急了或是事情不能拖延太久只好去賄賂他們或買禮物送他財物一到問題簡化工作變得極有效率這是留難的一例有的查到民家或商店有小小違犯禁令的事情如售貨而不開貨單或不蓋店印等於是表示問題嚴重以種種來威嚇其實不一定是忠實執法而只要人情到了就完事這是威嚇的一例還有是走進商店行號或者民間富戶故意刁難甚至設局陷害説你犯下什麼罪要舉發你你怕事怕麻煩只有以金錢去討好他這是誣陷敲詐的一例還有得財枉法或縱容親屬收容賄賂等真是花樣繁多這是社會的病態政治上的罪惡奉佛的弟子們守法而不貪這些非法財富才是三經營非法出資本從事工商事業獲得合法利潤本是極正當的但其中也有許多非法的我不是內行人當然説不上內行話扼要的説貨不真價不實量不足獲得分外利潤的都是以假的作真的賣把次等貨當上等貨賣冒用他家商標欺蒙顧客多得利益價不實有討價還價的惡弊這本來無非想遇到不知時價的可以多賣幾元等到風氣造成大有非漫天討價不可的情況真是害人害己分量不足又如斗稱不公大進小出等至於不顧國計民生乘機抬價囤積居奇等不但為佛法所不許有時也會受到政府的取締經營事業一定要以合法的手段謀取合法的利潤由於人心不良社會病態所造成的非法取財的流弊是會有報應的大家應互相警惕如法求財才能無害於人有利於己現在舉一故事來説明決不可非法得財佛弟子舍利弗在家時很有地位自然就有些有地位的朋友他的好友中有名叫陀然梵志的舍利弗出家以後常在外方弘法一次回到了家鄉陀然梵志當然是他所關懷的一位有人告訴他陀然依賴自己的地位勢力作種種不法的行為從中取利他是勾結人民要脅政府同時又勾結政府欺壓老百姓舍利弗聽了心裡為他的老朋友難過一天見到了陀然想起他的不法行為就以老友的身分呵責他不該那樣的胡為問他為什麼要這樣陀然解釋為出於不得已為了孝養父母培育兒女還要修福積德祭天神祖先等沒有錢怎麼辦呢舍利弗告訴他就是為了供養父母培育兒女修福祭祖也是不可以非法取財的舍利弗知道他是一篇鬼話所以進一步追問真的是為了這些嗎陀然與舍利弗是宿生有緣的也就説實話了原來他有一位妻子衣食住行樣樣要講究天天要錢花沒有錢就連吵帶鬧弄得家庭不安陀然為了這所以才胡亂攪錢舍利弗大不以為然説他願為婦女的奴隸自己作惡而不顧將來的惡報勸勉他要為自己而重新做人這個故事開示了我們凡是非法得來的錢財無論出於什麼良好的動機都是罪惡對於這點佛法毫不妥協至於為了滿足妻女的貪欲而自甘下流那更不要説了人不能不依財物而生活但財富要以清淨的如法得來一不謹慎種下惡因苦報是自己的呢四財富的處理遠離非法而依法得財所得的財富應怎樣處理這略有兩大原則第一奢儉適中不要過於慳吝被譏為餓死狗守財奴又要量入為出不可過分耗費而致家庭經濟日見困難這不但平常費用要有節度就是供養三寶也一樣的要量入為出雖然信心懇切樂意施捨如由此而引起家庭經濟的困窘也會發生障礙的第二蓄用兼顧由正業得來的財物佛指示我們一個使用的方法是幾方面都顧到的適當計劃這就是將每年的如法收入作四分支配一資用把一分財物用作經常的生活費用包括兒女教育費等在財力可能時每人應有適當的生活水準不可奢侈卻要足夠二積蓄人事無常我們有時會生病將來還會老平時也總有意外的必須支出所以在每年的收益中應保存一分作臨時支出以及養老等費積存雖是少少的數目也是極有意思的不但可避免臨時的困窘求人也可養成不浪費的習慣近代的獎勵儲蓄用意也與此一樣三經營無論從事那一職業都應在每年的收入中分出一分為事業費多闢田園也好增設工廠也好增加資本也好充實學力及工作技能也好這樣才會增加收入使財富增長纍積起來四作福人不能專為自己專為現世應顧到社會利益以及自己的後生福樂所以對社會公益文化慈濟事業三寶法益供養護持都要分一分收入來作福這不但是自己積福德也是為人群謀幸福像這樣四方面顧到的經濟支出預算便是最健全最合理的財富處理法五財富究屬於誰財富到底是屬於誰的這個看來簡單的問題實際上非常復雜這要從三方面去説一從先前的因緣説那就是宿因則共現緣或別這是説從以前業感而有的宿因説大地河山火水田園一朵花一株草這些一般看作自然而有的都是大家共業所感的不但是人也還是畜生等所同感的如披拂的春風和暖的日光山石土壤這不都是共有的嗎凡是共業所感的不是一人的力量所能轉移如大家的善業增上就會進步而逐漸的清淨莊嚴如惡業增上就會衰退而成為貧瘠荒涼經過了人的功力也還有前生業力的彼此不同這些自然物就有屬此屬彼的差別所以説現緣或別如本是荒地有人加以墾殖土地轉為肥沃收成也多而又好如林木經人工採伐運輸加以製造而成用具這就不再是一切共有的了然以農業品來説土地本不是個人的要墾殖需要農具是工人製成的農具所用的鐵又是從礦山採取經鍛鍊等而成此外肥料種子水利一切都與現緣的人功有關如究竟的推論起來如佛法所常説的一法從一切法成一法助成一切法所以一切現緣所有物也都有共同的意義不過依功力現緣的主要或旁助不同顯出屬此屬彼的差別罷了二如從當前的攝受説那就是攝取則別受用或共攝取是有所攝屬而成為某方所有的是個人的是一家的某一社團的某一國家的雖其中也有是多人所公有的但主權有了攝屬便成為不共於他別的土地或財物了這種私有的攝屬由於自私的占有欲知識的不充分每每超出其應得的限量根據上面所説的宿因現緣來看不一定是合理的甚至如古代的以人為奴隸看作自己的財富而可以買賣到現在人類還以牛馬等為自己所有而自由的加以奴役或殺害又如某國人發現一島嶼就被看作該國所有或者禁止別人移殖又如侵略者以武力取得別國的領土或權益也被看作合法不過世間原是不太理想的原是不離自我的私有觀念的無我就出世了加上財富本身含有現緣或別的成分所以自然的會成為私有制這種攝取而屬此屬彼不一定理想但為了維護社會安定必然的産生成文或不成文的法規而防範相互的侵占在時代的演變下知識進步道德進步自會逐漸的走向合理如民生主義進步到耕者有其田都市土地漲價歸公等如知識更發達道德更進步現緣更密切人類的關係更切相信會逐漸到達大同境地也就是更合於宿因則共現緣或別的法則然而世間永久是世間攝屬的私有性也永久會存在的如真能完全超出私有的攝屬關係那只有淨土了由於宿因則共現緣或別的關係儘管財富的攝屬私有化論到受用還是可能共用的如農夫的莊稼麻雀們要來分享他的果實如栽植花木不準人摘取也得讓人觀賞即使圍起來謝絶參觀花香陳陳還是要隨風而送到別人的鼻中你打開收音機傾聽優美的歌曲不知你的鄰人也正在受用呢房屋是你的如偶然暴雨路人來簷前避避雨終該是可以的吧在戰爭時期國家可以徵用空著的房屋難民也可以臨時住用如大家到了無衣無食那麼你所有的衣食也就難於保持私有了衆生是展轉互助相成的宿因則共現緣或別的東西雖不妨攝取而成私有但受用卻可能共同呢三如約將來的果報説那就是保藏不定屬於自己享受不再屬於自己施諸悲敬才真屬於自己這一判別是應該分別解釋的一保藏不定屬於自己積聚的財物變成不動産也好存入銀行也好埋藏也好不一定是屬於我們自己的佛經説五家所共水災火災盜匪惡王不肖子孫水火兩災可以毀壞辛苦得來的財物匪與惡王可以強奪我們的財富不肖子孫把父祖辛勞的積蓄任情的揮霍現代的問題更多戰爭破壞幣制貶值等每有富翁在幾天內什麼都完了其實大家不免一死終歸無常蓄積的一切資財什麼也帶不去還是你自己的嗎積蓄些養老防災本來不可説不對但有人愚蠢無比富有的資財不肯供給他的父母兒女慈善事業更不必説連自己也捨不得用真不知財富是做什麼的傳説有一老人積蓄的黃金埋在屋外的牆腳邊每天吃飽了便到牆邊去看看滿意的欣賞他的黃金這樣日子久了難免被人識破暗暗地把藏金都拿走了第二天老人又去欣賞他的積蓄時發覺黃金已被盜掘了這可傷透了他的心號啕痛哭哭得鄰舍都驚動了他訴説黃金被竊後有人問他黃金埋藏多久了要使用它沒有他説埋藏已十年多了並沒有動用過因為每年收入豐餘不需要用它於是有人向他提議這好辦好在黃金是埋藏而不需用的那可以包幾塊土磚照舊埋在那裡當它是黃金每天不照樣可以去看看可以滿意的欣賞它嗎這故事説明了某些無謂的保藏只是滿足他的私有欲而已並無實用而結果終究是散失了二享受不再屬於自己有以為自己的財物自己有權支配享受所以縱情的浪費他是怎樣的富有呀不知道這麼一來再貧窮也沒有了如有一千斤穀子收藏起來日子久了穀子不是變質而不能再吃便是為鼠雀等逐漸消耗光專於保藏而不用的也如此所以上面説保藏不定屬於自己但此千斤穀子如把它一起煮飯吃了雖然並不損失可是吃完以後什麼也就沒有了財富專為自己所享受恰好如此所以説享受不再屬於自己過去的福報享受完了未來的福業什麼也沒有這不是最大的貧窮嗎三施諸悲敬乃真屬於自己積蓄的終會散失享受了就此沒有那麼就得把現有的財富分一分來作福修德為將來受福種子譬如一千斤穀拿一部分去下在田裡加上肥料功力就會有十倍百倍的更多收入這樣如分一分財富去布施讓大家受用為佛教文化慈善而使用便是努力於福報的再生産布施似乎是損失如種穀腐爛而實能引發未來豐滿的福報如收成更多老子説既以與人己愈有可借以説明布施得福的道理穀子下種時當然希望豐收把它播下好田地不能撒在沙石上布施作福也如此有兩種良好的福田功德最大一悲田把財富分一分去撫恤孤寡施捨醫藥救濟災難等這些社會福利救濟事業便是種福於悲田中因為這是值得同情憐憫的對象二敬田為兒女的孝養父母做佛弟子的敬奉三寶等這都是種福在敬田中因為這是值得尊敬的對象凡是種福於悲敬二田現生或將來一定會得良好的福報布施時引起施福業隨逐行人從今生到來生成為水不能淹惡王不能奪自己的財富所以説施諸悲敬乃真屬於自己上面所説的都還是一般的聲聞行者菩薩行者還有更好的主張更好的處理更永久的財富現在為時間所限只好留著不説了賢範小娟合記
