body:
  text: 佛教與教育佛教是宗教但與一般神教是不相同的他不只是要你信仰而更要你修學所以信佛也稱為學佛佛教是著重修學的所以尅實的説佛教是一種教育佛所教的是什麼要我們學些什麼最主要的是戒學定學慧學三學佛教的三學與一般所説的德育體育智育三育大意相通這是有人比對研究過的所以在學佛的過程中稱為學人到了修學完成也就是畢業了就稱為無學特別是佛被稱為天人師導師而信佛學佛的自稱為佛弟子弟子中有小學的聲聞弟子大學的菩薩弟子依在家出家男女等來分別就有優婆塞等七衆弟子可見佛與信衆的關係是老師與弟子而不是神教那樣的主人與僕人我想説佛教是教育把佛教與教育作為論題來講是不應該看作牽強附會的從廣義來説世間一切微妙善語皆是佛法可説一切良善的知識德性技能都總攝於佛的教育範圍內如從佛陀施教的重心來説最深徹而圓滿的佛教應該是覺的教育佛的意義是覺者是圓滿徹悟宇宙人生的真意義而到達究極無上者的尊稱佛的教育不外乎本著自己圓滿的覺悟內容適應衆生的根機來教育大家引導大家來修學同登正覺成佛的地步所以佛教是先覺覺後覺的覺的教育如隨俗而用一般的術語來説那可説佛教是最圓滿的完人教育太虛大師説仰止唯佛陀完就在人格人成佛即成是名真現實成佛就是人格的究竟完成虛大師是這樣明確的表達了佛教的真意義學佛是向佛學習佛是我們的最高典範信解了究竟圓滿的佛德才能以佛為師而常隨佛學説到佛德古來有大雄大力大慈悲智德恩德斷德等種種説明太虛大師總攝為大悲大智大雄力極為精確分別的來説一大智慧佛的智慧大覺圓滿通達如所有性不二的平等空性盡所有性無限的緣起事相是窮理盡事的大智在佛的大智中含得人生真義的覺悟與宇宙事理的覺了不離人生覺證而窮盡一切所以不同於一般的智識二大慈悲佛的慈悲是平等愛護一切給豫離苦得樂捨妄契真轉染成淨的利益在衆生愚蒙顛倒障礙自己而還不能受度時佛也從來不捨棄一人只要一有可度的因緣終於會受佛的教化而上進的所以佛的悲濟是平等的等視衆生猶如一子永恆的盡未來際利樂衆生徹底的不像神教那樣神是博愛的又包藏著極端的殘酷因素三大雄力大雄是印度宗教共通的最高理想而唯佛能圓滿的體現因為佛的大智大悲窮深極廣才能顯現為大雄力如説佛有十力四無所畏等從佛的教法證法來説佛的大覺與斷惑清淨佛説的聖道與障道法佛是圓滿覺證而又毫無猶豫的宣説出來由於四無所畏四種絶對自信所以佛被稱為人中師子形容佛的説法為師子吼又如佛的身口意三業無論獨處或在大衆中都不會再有過失所以也不用藏護顧慮可能錯誤而注意自己糾正自己叫三不護這種盡善盡美的絶對自信是什麼也不能再動搖的從佛的慈悲利濟來説佛有十力能摧破一切魔邪障礙完成利濟衆生的大業佛陀的無量悲願無限精進都是大雄的表現總之佛的功德是無量而不能盡説的簡持賅攝不出於此如與世間法比對來説大智慧是最真實的知識大慈悲是最圓正的道德大雄力是最偉大的能力也可説這是究竟圓滿的知識感情與意志當然在佛的功德中這是即三即一而無礙的不過從這三方面去説明容易正確了解佛德的全貌我不止説過一次了學佛就是向這樣的圓滿佛德去修學學習佛的三德就是大乘學要的三金剛句信願慈悲智慧而這三者又實在就是依據人性本有的三種特勝憶念勝梵行勝堅忍勝而使之淨化進化這不妨再為略説一人性是有憶念的特勝這是最主要的在梵語中人是依此意而立名即人從經驗憶持而能進展到高尚豐富的知識但人的知識含有與生俱來的執見及從社會師友或自己推尋得來的謬誤所以人的知識固然有益於人類而邪惡謬誤的思想也不斷的引導我們個人或社會落入惡化腐化的深淵這要修學大乘的正智深智來徹底淨化一番學成如實的知見才好二人性的梵行是清淨行的意思勝即能克制私欲或控制肉體的情欲或犧牲私我的利益而有淨心利他的道德可是人智淺薄習俗愚迷世間也有低級的甚至似是而非的偽道德這應學習慈悲唯有無私無蔽與樂拔苦的慈悲心行才有完善的道德可説三人性有堅忍強毅的特勝不但忍受艱苦百折不回而且能有為萬世開太平的闊大精神可是如被應用於思想僻謬行動錯誤這一堅忍的毅力也就成為招引人類苦難的原因了如學習大乘信願發菩提心為佛道為衆生而確立無窮盡的大信願那麼依信而起願欲依願欲而起精進即為自覺覺他大力量的根源所以學佛不是別的只是依於人性的三特勝修學佛法的三要門完成佛陀的三德佛即人性的淨化進展到究竟無上的地步這一由人到佛的完人教育儒者也略有發明如中庸的三達德智仁勇即合於佛説人性的三特勝而修學的三要門也近於大學的三綱但次第升進淨化覺化的全部學程唯有在佛法中才有明確精嚴的説明這種覺化的完人教育自覺覺他就是教育自己又教育別人自教與教人都不是空虛的知識傳授而是著重於自覺的實踐的教育或者説學習如作為無關於自己身心的淨化而僅是學一些知識或者技能來維持生活滿足物欲的享受那實在是不成其為教育的這點佛教與儒家都是同一看法佛教的第一義是覺悟人生的真意義使自己從隨波逐浪的迷妄中覺醒過來唯有自覺才會源泉渾渾流露無盡的悲願勇於向上的精進以自覺為重心的佛教又是實踐的如教育而離開了實踐就與佛教的精神不合所以義學教理的研究著述雖是佛教的一大科但偏重義學或專作學問的研究在佛教中是不能受到特別尊重的拿知與行來説吧佛教是從實踐的立場來確定知的地位如修行的八聖道首先是屬知的正見與正思惟這是看作修行的項目而不是修行道以外的佛法的一貫學程是以知導行又以行致知依知而行如眼目明見才能舉步前進而依行致知如向前走去才會發現與看清前面的事象知才能行行才能知越知越行越行越知在這樣的學程中達到徹底的正知與如實的修行如佛被稱為明行足即是到達了知與行的究竟圓滿佛的教育以實踐為本而實踐又必然是以知為先要的佛弟子應站穩這一立場去求得世出世間的智慧雖然説佛教重於實踐不僅是空虛的知識傳授但在佛學的教化傳習方面還是不離語言文字的因為這是師資授受的主要工具不離語文的學問從前彌勒菩薩曾總括應該修學的説菩薩求法應於五明處求五明就是大乘佛弟子應該修學的五類學術五明是一聲明是語言文字學包括有語言訓詁文法音韻也通於音樂等二因明因是原因理由這是依已知而求未知察事辨理的學問在語言方面是辨論術在思想方面是理則學邏輯三醫方明這是醫藥生理優生等學問四工巧明這是基於數學所有的物理科學以及實用的工作技巧五內明上四種為共外世間的佛的教育是在這共世間學的四明上進修不共的佛學所以叫內明這是佛所宣説的法毗奈耶也可説純粹佛學聲明與因明為自覺覺他的必備學問聲明是語文學而因明是思辨的方法沒有這二種學問總不免思想混亂是非不明不但缺乏教人的能力就是自以為然的也未必就是正確的在西藏初學佛法都從聲明因明入手因為這是理解聖教的必備工具我覺得中國佛教的衰落至少與聲明因明的忽略有關醫方明是能除身心苦痛而得安樂的工巧明是利用厚生增進人類物質幸福的佛教的救濟世間那裡局限於口頭宣傳醫方與工巧正是菩薩利益衆生的實際學問善財童子參訪的大善知識中就有數學家建築師醫生製香師如大論師龍樹菩薩就是優越的製香師與煉金師化學在他指導下所建的寺院與洞窟真是鬼斧神工被稱為印度佛教的第一建築這可見佛教的教育不只是因果空有心性而是五明正像孔子一樣不只是侈談性理而是以六藝教人不過從來的佛弟子多少受到小乘思想的熏染總以為前四是世間法內明才是出世佛法不知在大乘佛學中即世間而出世世與出世無礙聲明因明等是共世間的出世學真俗融通為佛教教育的一科佛教的重心是覺化的完人教育方法是實踐教育傳習的科目是五明這都已在上面概略的説到現在再從從事教育事業來説佛教的説法開示以及著作或者佛教的文藝音樂經典的搜藏流通翻譯這都是教育文化的活動但作為佛教的教育活動是不應該局限於此的在經中佛陀不斷的讚歎法施法是真理德行良善的學説以及禮俗換言之法是合法合理性的一切世出世間善法佛弟子修學此法又與人為善而宣揚此法就是法施法施可分為二類一出世法施如內明的弘揚傳授二世間法施如聲明因明等的教授世間法施就是世間的一般教育從前維摩詰長者入諸學孰誘發童蒙便是大乘學者從事一般教育的實例這不應看作純世間的在大乘的真俗無礙中這是大乘的共世間學為大乘法的一分為導入大乘的基礎所以從事這一般的教育事業不應看作適應時代附屬於佛教的而應作為佛教自身的重要內容而努力佛稱這些為法施是最有意義因為布施是有功德的努力於世出世法的教化無論是個人或教團都是有功德的但真正的如法布施是出於與人同樂為人拔苦的同情這是無條件的施與而不是為了果報或者為了現生的功利所以從事世出世法的教育不但不應為自身的名聞利養著想也不應為教團的擴張著想為了正法為了利益人類而發心勇進的做去這才是佛教的教育佛教教育工作者的精神
