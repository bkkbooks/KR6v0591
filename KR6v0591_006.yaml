body:
  text: 從人到成佛之路在馬尼拉大乘信願寺講一學佛即向佛學習關於從人到成佛的路先得認識自己是人由人來學佛應該學些什麼要怎樣學現在只能講一些重要的淺顯的初步使大家知道從人到成佛的關要佛法應從兩方面去了解一方面是究竟理想最高目的成佛另方面因人的程度參差不齊所以有種種方便法門不同的修行方法但最後終歸是成佛這好像我們所走的路有的平坦有的高低不平有的迂曲有的直截了當但如認清最後目標還是條條大路通長安今天所要講的是從人到佛的路直捷平坦的路依此行去不但穩當又容易到達學佛就是向佛學習以佛為我們的模範而學佛是怎樣修學而成的我們也這樣照著學所以真正的學佛是一不但為後世的福樂而學修行布施等功德希望來生能比現在更好這在佛法中名為以增進心而學目的在求來生的福樂果報如生天國等這只是佛法的方便法門不是以佛為理想而學這並不是説學佛的不求來生的增進在沒有成佛以前當然希望能生於人天中但這不是學佛的目的大家要以成佛為目的如真能依法做去一定能得到的只要我們有高超遠大的理想與切實地遵行為什麼生人生天不夠呢因為不徹底不究竟生人間財富金錢壽命地位人事都在變化無常中不徹底不圓滿説生天吧就是帝釋天近於玉皇大帝大梵天近於希伯來的耶和華也還是不圓滿還是在變化中還是會墮落的相信耶和華上帝的一定不同意這個見解其實耶和華是不徹底的以大梵天王為例吧他説萬物與人類是他創造從他而生的我們要問天地未創造以前是否有天地人類未生以前是否有人類假使是沒有那為什麼要創出天地與人類呢婆羅門教就有一種解説為了戲樂這是説為了表示自我的自在自由自我的滿足所以從此而引生一切這像一所新房子空洞而沒有什麼覺得空虛而不滿意就得買傢具花瓶等等來裝飾一下所以如説神能創生人類萬物這只是表示他的不甘寂寞顯示他內心的空虛內心還有問題不能無事如人在繁忙的時候會感覺到麻煩希望能獨自地安安靜靜休息可是真的給他幽靜的安息又會感到空虛又要出來眺望靜極思動為了自我的自由與滿足要天地男女萬物弄到無邊苦痛真是自找麻煩所以凡是內心有不足而有所要求的就表示內心有問題不徹底學佛的説到修行了生死不但要在萬人喧囂處安住而無所不足還要能於無人處自靜其心做到名符其實的無事道人神教所想像的神還有要求不能心安便是要墮落的主要理由所以我們不能以此為正確的路子二不但為自身解脫而學人間天上一切都不是徹底的所以要了生死超出人天三界但這還只是為自己解脫而學佛是狹小的路是迂曲的路佛法當然要了生死但應注意到自利利他小乘的了脫生死好像吃酒的一時沈醉而以為完成了又如行路的跑了一段急急在路旁休息一下這種急於達到目的而實際上更慢好像龜兔賽跑兔子跑得快而急於睡覺休息結果兔子不免落後學佛如急於了生死離苦得樂只為自己而學還是歪曲迂回的路子三為佛之大菩提而學所以真正的學佛應為佛之大菩提而學這才是達到正等正覺的正確的路直捷的路説起大菩提內容可説是信願智慧慈悲的一切完滿但在初學者可能有所偏重一重信願求菩提衆生根機不同多少有差別如初學而著重在信願相信佛有無上功德最究竟圓滿有最上智慧最大慈悲對佛發生信仰心以佛為理想而立願上求菩提二重智慧向法界另有一類人以佛的圓滿菩提為對象而重在智慧參究宇宙萬有真理宇宙究竟是什麼人生真理是什麼只有佛才是最圓滿究竟最洞明一切所以學佛的大智慧從智慧的增長中到達佛的地步三重慈悲救衆生也有讚仰佛的大慈悲想到人類衆生的苦痛沒有徹底救濟的方法普通所説的提倡道德文化增加經濟等等來救濟其實都不徹底只有佛的大慈大悲才是圓滿究竟所以就學習慈悲心行向佛菩提學佛的路很多如念阿彌陀佛的是重信願為了解佛理而誦習研究的是重智慧著重在救濟慈善事業的是重慈悲這幾種功德都要學無論從那方面入手都可以不過真正學佛的必然三類都漸漸學習以大菩提為目標而學二唯人為能學佛一人類的特勝一般來説人雖自尊心極強卻都看輕自己覺得自己太渺小不肯擔當大事為最高理想而努力這是頂錯誤的其實人是頂有意義的佛法説在六道衆生中地獄太苦餓鬼飢餓不堪那裡會發心學佛畜生也大多是愚昧不能了解學佛阿修羅猜疑心大不能堅信佛所説的話又加上瞋恨心強喜歡鬥爭天國享福都來不及更沒有心學佛所以三途八難中長壽天便是八難之一因此佛經説人身難得佛法難聞只有人最為難得才能學佛有人問神教與佛教有什麼不同我説神教説人間不如天上佛教説人間更好既得人身不要錯過他應該尊重人身發揮人的特性而努力向上這是佛教的一大特色人有什麼好呢經説人有三特勝天上也不及我們大梵天上帝雖然高貴但都不及人的偉大因人有三種特勝所以佛特地在人世成佛教化人類向佛學習三種特勝是一憶念人在印度話中是憶念的意思人的憶念比什麼都強小時的事情都記得幾千年來的歷史千百年來的經驗都能保存而傳下來這在牛羊豬狗甚至天神都不及我們人的智慧最強一切文化科學發明都是依著過去經驗的憶念纍積而後能日漸進步日漸發明由於憶念而來的智力是一切所不及的二梵行克制情欲的衝動為了他人的利益能營為道德的行為寧可犧牲自己利益他人這種由於梵清淨行而來的道德是人類的一大特色三勇猛人生存在這娑婆世界什麼苦都可以忍受無論怎樣困難都可以克服這種一定達到的決心與毅力也是人的特勝在天上是沒有的這三種特勝如用以努力作惡濫用聰明也會造成大壞事使人類的苦痛加深不過種種好事也是從這裡面發展出來用以向善就等於中國所説的大智大仁大勇大家都知道一切衆生皆有佛性都能成佛經説佛性有四種功德就是智慧慈悲信樂三昧德行通於慈悲信樂必有精進所以人的三特勝也就是佛性四德中的三德在人身中特別發達也就因此人身容易修學成就人類容易學佛唐朝宰相裴休説過一切衆生都可成佛但六道中真能發菩提心而修菩薩行的唯有人佛性功德人身最為發達所以人才能學佛成佛二從人道直趣佛道在學佛的方便中如生天得小乘果多是彎曲而迂回的如修天法而生長壽天為八難之一障礙了學佛有以為學小乘法證阿羅漢了生死後再説小乘如中途醉眠不徹底也不迅速所以我們應該走直截了當的路就是從人的地位求生人間一直到佛的地步不求生天不求證小乘果依人身求人身不離人身而向佛道都得從不離人事做起有的人自以為修學佛乘而信修天帝的神祕法門或不重慧而專重禪實是天法有的沒有大悲心雖究大乘理而等於走著小乘之路天法與小乘法終究也可轉成佛道但到底是迂曲了特別是在這個時代應該先修人法不離家國的人間正行從人直向佛道以免世人的誤會現代衆生的根性不同尤其是中國人重人倫所以中國佛教徒更應該從人倫道德做起人間正行修集增長佛道因行的功德也一天天增長會漸近成佛的境界我們不要糟踏自己應該利用這人生短短的時間向這個目標而努力行去三學佛所不可少的信解要學佛道有不可缺少的信仰與了解這在聖典中説有八事現在簡要的略為六類一三寶威德三寶就是佛法僧以佛僧來説吧大乘法中佛菩薩大乘僧有高上的智慧慈悲值得崇仰更有難思的神力能為一般所不能為的事不但信佛菩薩的威德神通還要信法即成佛的法門也確是有功德有力量依法修行能使我們到達究竟成就二諸法真實諸法即所有一切事物我們所知的世間一切都不是真實的為什麼呢可用兩點來説明一一切都在變化人以至地球都不是永恆的都是不徹底的二世間的一切都是相對的有善就有惡有生就有死有興就有衰有這個就有那個有這家就有那家有這國就有那國同一個國家也有派別黨外有黨黨內有派世間就是這樣相對差別充滿矛盾所以都不是究竟的真相世間的一切是相對的變化的世間所以存在這世間的人類也不徹底真正學佛的要信解在變化無常種種差別之中有永恆的不變平等無差別的真理如以正當方法去理解依著去修行就能得到真理的體驗苦痛從此解消佛菩薩也因此而成就三清淨因果一般人都懂得佛法重視因果但因果不一定清淨的不單是殺盜淫妄惡因惡果不清淨就是一般的布施禮佛念經也不一定是清淨的如布施功德固然是善的如心目中覺得我能行善或我比其他人布施更多或者為了使人服從故施小惠有自我的成份有為未來得到善果報的意念這便不清淨不純潔所以學佛的要相信有清淨因果就是離煩惱離自我見的無漏因果純潔的因行能得到清淨的成果必須以佛為理想對清淨因果生起堅定的信解四能得菩提信解了以上三點還不一定能學佛成佛有人説我太愚笨了或太忙碌了自己不信任自己那裡能發心修學所以要加強信心一切人有佛性我也決定能得大菩提有一分力量就盡一分力量今天不成還有明天今生不成還有來世堅定信仰一定能得菩提只要肯發心修學下去五得道方便一切衆生皆有佛性都可以成佛可是佛是從修學得來的依方法去學人人都能得到這修學方法叫得道方便如相信地下有水還不夠必須知道怎樣去開掘用怎樣方法取水上來如不這樣即使地下有水我們還是沒有水喝要以方法去得到所以説沒有天生彌勒自然釋迦六如來聖教我們都不是佛怎能知道成佛的道路呢釋尊成佛後大慈大悲地把成佛的方法説了出來記載在經典裡面相信經律論所説的依之求了解有了信心才會增加學佛的力量會看的看不會看的聽裡面開示我們種種成佛的方法四從十善菩薩學起對佛有了充分的信解就得從十善菩薩學起很多人對菩薩的名義不了解多有誤會菩薩是印度話菩是菩提是覺悟的意思薩是薩埵就是衆生的意思所以菩薩是求大菩提的衆生菩薩的程度不一高的高低的低在一般人的心目中聽見菩薩就想到文殊普賢觀音地藏頂高的大菩薩其實凡發心成佛的就是菩薩佛與菩薩的分別是佛是至高至上究竟圓滿如讀書畢業了菩薩是向上修學的學生開始學的如幼稚園生是學生在小學中學大學以至研究院也還是學生差別只在學問的高低而在修學的過程中是一樣的菩薩也是一樣有初發心菩薩初學的與我們凡夫相同只是能發菩提心立成佛的大志願慢慢修學到頂高的地位如文殊觀音等不要只記著大菩薩覺到我們不能學在學校裡由幼稚園一直學到研究院菩薩也是由初發心菩薩學到大菩薩現在講最初修學的初心菩薩與我們凡夫心境相近切實易學一大悲為菩薩發心菩薩發心當然包含了信願智慧而重心在大悲心有大悲心而後想成佛度衆生的就是菩薩上面講過成佛如沒有慈悲心是不能達到的就是能參究絶對真理如沒有大悲心也還是落於小乘所以菩薩的最要處便是大悲心見衆生苦好像是自己的苦痛想方法去救度他們才是菩薩心佛種子發心是立志時時起慈悲心立下大志願不會忘失此心發起堅決不退便登菩薩位修發大悲心方法很多佛法裡有自他相易法把自己想作別人把別人想作自己這麼一下大悲心自然會發生起來試問大家心裡頂愛的是什麼你們一定回答是父母夫妻朋友國家民族其實佛説愛無過於己父母等凡是沒有損到自己利益的當然能愛否則就什麼都不愛了大家都以私心為愛自己而愛一切假使能想到別人的苦痛等於自己的苦不但愛人如己而且以自己為他人不專從自己著想那才是真愛真慈悲自身有苦誰也巴不得馬上去掉它別人的苦等於自己怎能不動悲心設法解除衆生苦痛呢能有這種觀念大悲心自然生起來大悲心發生立願成佛度衆生就是菩薩了所以初學菩薩並不一定有神通或者身相莊嚴但是單單立志發心還不夠必須以正行去充實它二十善為菩薩正行菩薩與凡人的分別是發菩提心行菩薩道以菩提心去行十善行是初學的菩薩叫十善菩薩十善就是對治十惡的十種善行不殺生就是愛護生命不偷盜是不要非法得財進而能施捨不邪淫是不要非禮不妄語是不説謊不兩舌是不挑撥是非破壞他人的和合不惡口是不説粗話罵人譏諷人説不對也得好好説不可説尖酸刻薄話綺語是説得好聽而能引起殺盜淫妄種種罪惡就是誨盜誨殺誨淫的邪説或者毫無意義浪費時間不綺語是要説那些對世道人心有好處的話不貪是應得多少就得多少知足少欲不是自己的不要妄想據為己有不瞋恨是有慈心不鬥爭不邪見是學佛的要有正見要相信善惡因果前生後世生死輪回聖人境界阿羅漢菩薩佛能了生死不要起邪知邪見以為人死了就完了十善菩薩是初心菩薩發大悲為主的大菩提心要成佛度衆生依這十種善行去修學可説人人能學如説不會做那一定是自己看輕自己佛法説人要有健全的人格就得從五戒十善做起十善便是人生的正行如有崇高道德能行十善缺少大悲心還只是世間的聖人人中的君子佛法就不同了十善正行是以發大悲心為主的菩提心為引導的所以即成為從人到成佛的第一步大家以佛為理想發菩提心修十善行此外如懺悔發願禮佛念佛以外還要熱心注重護法把佛法當作自己的生命不要以為我學佛就好了如佛法受到損害受到摧殘應為了自己的信仰衆生的慧命來護持菩薩應行的甚多現在不能廣説最後我希望大家開始學這大乘的第一步作一菩薩幼稚生從發大悲心修十善行學起明道記
