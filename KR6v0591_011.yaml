body:
  text: 佛教的戰鬥觀世間是不息的生命洪流個體生命的保持種族生命的嗣續無限生命的渴望這生命洪流的奔放就是世間的一切又實相一切衆生衆生中的人類充滿了喜樂自由生存的熱情它有內我的渴愛自體愛境界的貪戀境界愛無限生存的欲望後有愛它的一切活動無不以和樂的生存作中心但是生命的活動有喜樂也有悲哀有和合也有離散有互助也有戰鬥如稱兩頭的同時高低一樣愛好生存就不能避免戰鬥戰鬥從求生而來如中阿含經説以欲為本故母共子諍子共母諍父子兄弟姊妹親族展轉共諍更相説惡況復他人以欲為本故民民共諍國國共諍彼因鬥爭共相憎故以種種器仗展轉相害這生命中心的人間世或見到它的和諧於是乎説天地之大德曰生上帝愛世人或見到它的凌奪於是乎説天地不仁真理就是不和在佛教的見地看來這是生命流的兩極是不相離的生命內在的本質這世間雖似乎有靜止有喜樂有自在而第一義的見地是諸行無常諸受皆苦諸法無我佛教是特別把握這一端而把它看為世間的實相因此這生命中心的世間佛教是把它作為沒奈何的苦惱看一切在無常變化中是生也是滅即生即滅的相續從生長到安住從安住到異滅這生滅滅生的狂流充滿著生存的喜樂與愛好而生存的實相是苦惱所以雜阿含經説以一切行無常故一切諸行變易法故説諸所有受悉皆是苦有樂必有苦有愛必有瞋你要求生存就不能避免鬥爭這是世間的實相如果是世間世間永遠是這樣除非你能截斷要津破網而遊諸行無常諸受是苦諸法無我這在世間的學者也多少有所窺見但他們不走上悲觀縱欲與自殺就走上殘酷陰險古代的道家法家近代唯物論者的促進矛盾就是一個例子然而佛教在第一義的理智生活側重無常苦痛在情意本位的世間法中卻向來歌頌無諍的和合倡導和樂共存的道德這在佛教的戒條中表顯得最為明白不傷害他人的生命不殺生不掠奪他人維持生存的物品不盜家室是種族生命嗣續的組合所以不得因滿足自我的肉欲而破壞他人家庭的和諧不邪淫人類和樂共存唯有互諒互信才能實現社會的和諧所以不得欺詐不妄語不挑撥離間不兩舌不惡意的批評罵詈不惡口不作誨盜誨淫等無益的戲論不綺語佛教透視世間的無常苦無我而推行善生共存的世間法似乎奇特其實理由很簡單無常不是斷滅和樂自在不無相對的價值佛教的人乘正法是立足於生存意志奔放的基點出發於人類共同的要求生是人間活動的中心生是道德的尺度生者必滅有生必苦但生病總要服藥一定要盡其可能以維持它的生存決不因遲早是死亡的而提前自殺或者促進病勢的發展生存就是苦惱世間不能圓滿但非追求和樂的共存不可唯其世間不能圓滿才有更進一層的必要不然世間將永遠是如此和樂共存不論它有否絶對性可能性它永遠是人類的共欲是人生歷程中的正軌照樣的不論鬥爭是否罪惡是否可以完全消除它也永遠是世間的實相與生命同其終始佛法倡導讚歎和樂共存的道德對鬥爭確乎不敢提倡從沒有把戰爭描寫為光明與美麗但它是世間相的一角釋尊並不一概抹煞它佛教理想中的輪王政治在推行和樂共存的仁政這仁政王法不及賢聖法律的深入徹底但能更普遍的使人類甚至一切動物生長發育在合理而和諧的程序中生存的道德律是仁政的綱領但輪王必有一主兵臣這等於説離了為正義與自由的武裝就無從推行和樂共存的仁政戰鬥並不一定是可咒詛的推行仁政的領袖要具備種種的條件第一是軍衆淨潔正法念處經軍衆不但是第一並且還需要純一不雜具有崇高理想的淨潔的軍衆為自由正義而戰的武裝才能確保無諍的和樂共存依佛教的見地武士剎帝利的出現就在解除人類的爭奪出增一阿含經三十四卷釋尊的信衆中像頻婆沙羅王毗琉璃大將等都是參預戰鬥的軍事領袖戰鬥在佛教中並不一定咒詛它而且還承認它的正當有一回有一軍人在行軍前去向佛辭行釋尊説汝等之身受王俸祿所作當然此事佳善生經凌奪是世間的實相戰鬥是人間常事釋尊不否定戰爭問題在怎樣才需要戰爭要怎樣戰爭為掠奪爭霸而發動的侵略戰自然是佛教所反對的反之在被侵略方面釋尊本身就曾教他們備戰釋尊在世的時候中印摩竭陀是新興的國家毗舍離的離車人成為摩竭陀攻略的對象他們向釋尊訴苦憂慮摩竭陀的襲擊釋尊給他們説了治國七法不危之道劈頭的第一條就是修備自守般泥洹經如能上下一心內政修明能常自警策不放逸雜阿含經能有備無恐不但敵人所不能攻破也要使敵人知難而退在琉璃王進攻迦毗羅衛時釋尊也曾進行道義的援助設法使琉璃王退兵增一阿含經假定和平絶望不得不進行戰爭那麼佛教的見地以怨止怨不可能戰爭的目的如果在征服仇殺那在戰爭的進行中必然是殘酷蹂躪反而增加敵方的同仇敵愾心戰爭的結果又必然是給豫被征服者以殘酷的剝削與束縛這遲早要因被征服者的反抗而慘遭厄運不能以怨止怨所以唯有以慈心入軍陳才能獲取勝利不但決戰的勝利並且要以偉大的真理與自由的同情消融淨化侵略者的野性仇恨戰爭永遠是為和平自由而戰這不但為了自己的國家民族也是為敵人在這些方面佛教是常用治病的譬喻來解説折伏一個瘋人他毀害一切甚至凌辱醫生醫生的目的唯在拯救他的病苦是不會因他的凌辱而憤怒怨恨的醫生使病人感受些苦痛或服藥或針灸剖割這決不是報仇苦治病人目的在解救病人我中華民族為了爭取民族的自由與生存正進行反侵略的戰爭這一戰自然是志在摧破日本軍閥的瘋狂而不是仇恨全體的日人要抗戰到日本軍閥統治力的崩潰進而與愛好和平的日人確立其和樂共存永久的友誼每個為民族而戰鬥的勇士要深切顧念國族所遭受的慘重的損失更應顧念那日本軍閥宰割下的日人都是怎樣的急待我民族戰士從戰鬥中去拯救他不是為了仇恨為了慈悲心的激發為了正義與自由為了慈悲需要戰爭不惜自我的犧牲去努力實現實現仁者無敵充滿了安樂與自由的勝利
