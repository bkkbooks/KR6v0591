body:
  text: 佛法與人類和平一和平的意義和平本為人類一致的願望在飽經戰爭苦難或時局惡化而瀕臨戰爭邊緣的時候人類的和平願望也就更為迫切起來然從古來今人類一直在仰望和平祈求和平而和平始終不容易獲得一部草四史充滿了血腥氣大部分的日子都在戰爭中渡過所以要求和平必須探求和平的意義不容易和平的癥結而探索那達到和平的坦道我們佛教徒對於和平的願望無疑比一般人懇切得多我們應接受佛陀開示的聖訓去把握和平的真義應仰承佛陀的慈悲願力而盡著為實現和平的努力人類有要求安定要求福樂要求生存的共同意欲所以人人有共同的和平願望但和平並不能從空洞的願望得來相反的缺乏理智的和平願望每招來戰爭的苦難害了自己鼓勵了敵人一般所想念的和平大抵與沒有戰爭或戰爭停止同一意義這是並不正確的如甲乙兩國相爭甲勝乙敗乙方簽訂了賠款割地甚而接受征服接受奴役的條約這那裡是實現和平這是弱肉強食強迫承認不和平的戰爭惡果如某方為了鬆懈對方的戰爭意志延遲對方的戰力積集或破壞對方的戰友合作虛僞地倡導和平裝出和平共存的外交姿態而自己卻祕密地更積極的在備戰這也算和平外交嗎這是和平騙子戰爭的陰謀者如信以為真自取毀滅這也決非和平的功臣而只是天真的和平悲劇又如局部的不和平因素越來越嚴重不能迅速的設法消除而只是拖延或犧牲部分來換取和平弄到大戰勃發變局部為全體糜爛到不可收拾這不能稱為維持和平反而是戰爭的培養者我們本著佛陀的真理當然崇仰和平但真正的佛弟子決不以虛僞的欺騙的和平為和平不倫不類的僞和平實在是戰鬥的變形戰鬥的延續值不得我們歌頌也值不得我們追求和平的反面是不和不平不和是暴戾仇恨衝突鬥爭不合作不平是強凌弱衆暴寡一切的不平等真正的和平決不能從不和的暴戾仇恨鬥爭中得來也決不能實現於不平等的基礎上和與平有著相互的依存關係失卻一端即會失去一切所以暴戾的共産集團從不和的情緒中使用不和的殘酷恐怖手段到處鼓動仇恨製造鬥爭這是決不能達到真正和平的他們雖標榜平等鼓吹蘇聯式的和平而不知在不和的情況中求平等而離平等愈遠大力鎮壓所造成的廣大奴工群即充分證明了不和必然不平的道理我們不能贊同出發於不和的僞和平然對於現世間所有的不平因素也不能同情經過重重糾紛在長期歷史中造成的世界現狀不平等是到處存在的如基於不平的現狀企圖不平的維持那雖然宣傳博愛鼓吹合作也只是維持不平等的和平僞裝彼此間終於不免情感惡化而嚴重的不和如埃及伊朗與英摩洛哥突尼斯與法最近的糾紛即是這不平必然不和的最好說明所以如厭惡共産黨徒的暴戾鬥爭的不和手段而不能自己糾正不平等的現狀那麼美麗的和平願望不一定被共産的不和所毀棄卻可能為他自己的不平所粉碎咒詛共産黨徒的殘酷恐怖並不等於愛好和平忠於和平和與平必須相依共進從和諧合作的空氣與方法中進求平等從平等的基礎上感召大家來和諧合作真正的和平才會接近人間到達人間二不和不平的心因人人想望和平而和平不容易實現不容易實現的原因有充分探討的必要依佛法說內有不和不平的心因外有不平不和的事緣彼此相互影響這才興風作浪造成從來難得和平的局面不和佛典稱之為諍諍見於語言文字見於行動而實深刻的存於內心扼要來說內心的諍有二一見諍二愛諍這二者又根源於受與想所以稱受想為諍根見是見解這裡專指主觀的成見偏見倒見邪見當人類觸對對象時必然的攝取境相所取的境相有著局限性片面性攝取境相時必覺有異於其他的特性如此而並不如彼取境分齊這才成為一個個的心象從此構畫名言表現於思想議論這是認識過程中想的力用這種有著局限性片面性是此非彼個體性的心象使我們的認識不能有完整的認識不能把握真正的事理不免錯亂不免矛盾不免畸輕畸重自是非他有了這執一概全以末為本以非為是等一切如盲摸象的異見異說世間即由此而糾纏不清衆義經說各各自依見戲論起諍競知此為知實不知為謗法若依自見法而生諸戲論若是為淨智無非淨智者真的誰不自以所見為正確誰不執己見而排斥他說如以成見偏見為正智為能得真理那麼誰都獲得真理了這種從認識缺陷性而來的見諍一向就此亦一是非彼亦一是非以見欲繫著故出家與出家而復共諍宗教與哲學者由於見執而聚訟紛紜釋尊早就為我們說破而到這思想鬥爭尖鋭的現代越發顯出他的重要性來愛是貪欲權力名譽生命都是人類所貪著的而衣食住等經濟生活及男女性生活尤為欲界人類貪求的對象在我們觸對對象時內心必起反應而領受於心這一內心的反應有自己主觀的標準起著合意的不合意的或無所謂的領受合意的樂受即引起愛欲而戀戀不捨沒有得到的一心一意的去追求得到了一心一意的希望增多無限的增多保有永遠的保有所以說受為愛欲的根元然經濟生活本為一切屬於一切也可說不屬於任何一人以愛欲的習見而想攝屬為自己以為屬於自己已含有嚴重的錯誤何況經濟的物質生活從個人說決非一人所能完全取得終不免陷於無限欲求而永不滿足從大衆說你以愛欲而想占有不斷的占有他也想占有無限的占有當然要引起衝突而成為不息的鬥諍這一由於物欲而來的諍競釋尊更說得分明以欲為本故母共子諍子共母諍父子兄弟親族展轉共諍以欲為本故王王共諍民民共諍國國共諍彼因共相諍故以種種器仗轉向加害或以手扠或以石擲或以杖打刀斫這種家庭社會國際間的鬥諍古今有何差別不過現在多了飛機大炮原子彈毒氣等而已總之我們有見解即使理解到並不完全並不徹底而多少希望別人服從自己的意見我們有物質的需求即使理解得別人也一樣需要而多少希望自己得到的勝過別人見與愛為精神生活與物質生活中的兩大諍執而這實根源於認識中的受與想佛說五蘊特立受想為二蘊即重視他是見諍與愛諍的根源如廣泛的說內心的一切活動無論為感情的意志的知識的凡不能正確而恰當的一切是諍一切是煩動惱亂不得和諧的安寧所以說一切煩惱皆名為諍尤其是狂喜時憤怒時渴想時失望時悲痛時恐怖時憂慮時內心是烈火一樣的在焚燒狂飆一樣的在震動山一樣的險峻海浪一樣的洶湧電一樣的閃爍煩動惱亂到極點然一切煩惱中重要而根本的是愛見慢無明愛有自體愛境界愛或色性欲欲資生物定境愛見有我見我所見常見斷見一見異見有見無見等執見慢主要的是我慢這是個性人格性的特徵每一生命雖為前後的不斷似續同時的相互依存而現為一合相即形成一個個的單位由於個體獨存的錯覺在接物待人時總是自他對立而著重自己流露自尊自大的我慢即使是事實所逼自慚形穢自卑中也不脫卑慢的因素從深細的自尊自重感發展為妄自尊大的優越感控制一切的主宰欲權力欲現實是不能盡如人意的因而轉化為瞋恚忿怒敵視仇恨怨結殘酷甚至見到他人的境遇良好雖無關自己也要嫉妒而心裡難過起來這比起執見與物欲要嚴重得多在同一思想物資平衡分配的場所每因意氣權力的爭奪而事態惡化即因慢而諍的實證見從識別而來愛從領受情而來慢從形成個性的意志中來這三者同為不能正確而恰當的心理活動無明是這一切的通相如約特殊的意義說無明是不能覺了事事物物的真相特別是不能認識自己不覺自我無我的假我的真相無明或稱愚癡雖似乎重於知識的謬誤而實形容知情意的共同錯亂心意的盲目活動因此歸根結底的說內心的根本諍因是無明不能覺了自我的迷蒙這是世間不得和平的諍因也是人生不得解脫的錯亂根本三不和不平的事緣不和不平的鬥諍無論為語文的或行動的必為了某一事名為諍事某一事件的所以成為諍事雖有純由內心諍因所引起誤會而來而大都也由於這一事件的不平等釋尊曾標舉僧團和合的三大要素為見和同解戒和同行利和同均這指示了和合必基於同一平等而不同即無法和諧的真理見是思想的戒是戒條法制規章利是經濟生活一切諍事總不外思想法制經濟這三者的不合理不平等是外在的諍緣由於外在的不和不平事緣引發內心的不和不平心理由於內心的不和不平因素加深了事緣的不和不平狀況內因與外緣的交織世間是一直在動亂中鬥爭中想望和平而始終不能實現真正的和平唯物論者強調諍緣特別著重於經濟以為思想與制度的不平依經濟生活的不平等而成立唯心論者強調諍因重視道德的進修以為德性增進可漸達於法制與經濟的合理化如依佛法來說諍因與諍緣有著互相推動促進的關係而人世間的不得和平或實現世間法中的人世和平諍緣應特別重視諍緣事非絶對的外在是相對的客觀存在存在於自他關涉的社會關係中思想為基於心境相緣的活動諍因的見對此有主要的影響力然從個人的思想而成思想諍執那必為自見與他人見解的關涉經濟為基於我物相需的活動諍因的愛對此有主要的影響力然從個人的物資欲求而成為經濟占有或支配的諍執又必為自己與他人間的欲求衝突法制為基於自他的人事活動這是更顯明地有關於自他諍因的慢對此有特別關係所以世間不和不平的種種諍事都由於內因外緣而外緣的三事雖是盤根錯節展轉相關而起諍特重於人事法制人類的意氣用事權力爭執等而外思想與經濟的諍執也要依有關經濟與思想的法制更新而趨向解決唯有這三者的趨向於平等人事的和諧才有更高的意義總之不和不平的諍執傾軋不但是心或物經濟而是心境自他我物的交涉而表現於自他關係的問題是在自他關係中我們怎樣處理思想法制與經濟的問題內因與外緣的相關試列表如下自心癡暗見慢愛心境事自他事我物事思想諍執法制諍執經濟諍執人類顛倒四外緣為重的世間和平對於和平有著重出世的入世與出世融貫的二類今從世出世雙融的大乘方便的分為三層即重於事緣的人間和平重於心因的心地和平事理兼重的究竟和平論到事緣的人間和平以現代的情勢說國家為重而漸趨於世界和同我們從佛教的三和原則來論列可分為國家現狀的人與人間的和平國際傾向的人與人間的和平在同一國家的人與人間一應有思想的和平首先要指出不平等的思想無論為宗教的哲學的政治的如自以為真理為光明而把異己看作罪惡與黑暗看為該死的應該被毀滅的這種極端的獨斷的排斥異己者的意識形態無論為宗教或政治實在是不和不平的思想毒瘤而為今日世界今日中國的慘痛局面的製造者依佛法說人人應有絶對真理的崇高信念這是可能證實的但這並非一般所想念的自以為然的這由於一般的認識內容有著根本的缺陷性有局限性與片面性但同時又必須肯定的承認人類的思想有著差別性與相對的價值雖有是非偏正而都可有或多或少的接近於真理特別是成為世界性的有數文化這才能容忍對方諒解對方從思想的自由中促進思想的和諧交流淘鍊融鑄而趨於一極這除了革新獨斷的排他的偏見以外主要的文化活動應屬於為真理的自由職業者質直無諂曲誠實不虛誑柔和不粗獷應為思想和平工作者的三大信條而重真理重世間公論尤為不偏不倚的正確方針對於從權力而來的文化統制如納粹式的從財力而來的文化壟斷如資本家的收買新聞是思想的蒙蔽與壓制不是自由與光顯這大多是虛僞與欺騙的宣傳者少有能為真理與和平而工作真正和平的文化工作者應發揮其自身文化的力量唯有如此言論自由與出版自由才有意義才能不受權力財力的束縛或其他力量的要脅而引向真正的和平二應有政治與法律的和平政治為衆人事情的治理人人應有政治權利的平等機會為維護群衆的安寧而需要法律法律是平等的不應有超法律的特權者也不容故意的破壞者然要求政治的平等必須備有兩大條件一教育平等人人享有必備的修學權利人人修畢必備的學程才能有足夠的政治常識而不致受他蒙惑如經歷一定的修學期限德力與智力不夠水準即失去與問政治的權利二財富無效政治權的機會均等當然不能以財富為標準也不應受財富的支配如一般的選舉使用大量的選費大肆宣傳雖不一定成功而缺少選費幾乎是無法競爭的最好的宣傳應該是競選者為國為民的服務業績如必要宣傳自己的主張政府應供給他們同一的宣傳工具如一切為財富所決定自費修學而多少人智力不充足自費選舉而多少人財力不充足既不平等也不夠民主一切政治上的鬥爭黨與黨的互相攻訐權力的種種鬥爭實在從不平等不民主的因素中來三應有經濟的和平糾正勞心治人勞力被統治的對立趨向於勞心勞力的平等合作共謀自他的福利糾正資方剝削勞方鬥爭的敵害經勞資兩利導向勞資平等進入人人為勞者人人有資力的社會財富與享受應盡力的引向均衡不患寡而患不均不均平即使普遍的財富纍積生活提高也還是增長暴戾的怨氣所以應盡力發展公有經濟這不是與民爭利是才能多做社會公利事業使人民得就學就醫育幼養老等無價的供給對於私有經濟應依當前情形制定財富與享受的標準這是不可過高的以後隨財富增積而漸次提高然由人類私欲的根深蒂固仍應容許私有經濟超出限制的活動但在水準以上的一切應暴露於社會之前隱藏私蓄者沒收這才運用善意的溫和的輿論限制他的享受浪費而使超標準的財富自動的能以一分或全部貢獻於社會福利事業私有財富生前雖可自由的贈與但死後卻不得傳於家庭的任何人僅可以某些物件作為紀念品而贈與在業力決定一切的人生中雖能大體均衡而到底不能泯除等級智力不同能力不同毅力不同體力不同從服勞而得來的享受自然也無法完全一致但對於任何人尤其是殘廢衰老不論什麼理由都應該給豫合水準的消費使他們獲得足夠的生活不失人生的樂趣依平等和合的意義而論到國際間的和平思想方面應為自由的溝通不能憑藉武力財力而為有組織的文化傾銷某一國家某一國際組織運用武力財力以及其他力量傾銷他的整套思想尤其是獨斷而排斥一切的思想無論是宗教或政治都是一種極惡劣的罪行帶有濃厚的侵略性質國際間的思想交流應純為自由的傳譯自由的紹介文化傾銷的職業家應禁絶其往來對於這種懷有征服與統治的野心家必須認清他的面目而不受欺騙政治方面應尊重區域文化的不同情態民族文化的不同傳統誰也不應該專以自己愛好或行而有效的政制衡量一切不能以武力財力為後盾從外加以壓力從內加以挑撥或者利用外交特權進行煽動強迫實行自己的政治制度以達到政治控制的目的經濟方面應通力合作工業先進的國家應自動放棄不合時宜的特權不合理的利益援助落後地區更應避免經濟剝削國與國間如存有經濟掠奪的現象是不能實現全面和平的依此而論號稱自由民主的國家還不夠和平的水準而蘇俄的共産集團大量的文化傾銷高度的經濟剝削這是蘇俄的新帝國主義的新侵略什麼也不能符合佛法中和平的精神這契合佛制三和原則的社會國家是傾向於大同的國家國際是不礙國家的國際基於平等原則和平精神來推進國的局限性逐漸鬆弛國際的統一性與無礙性逐漸增強大同而自由的人間和平將不經戰爭而實現實現為人間的淨土這裡面才有真正的平等真正的自由真正的民主這才是實現真正的和平五著重內因的心地和平外在的事緣與內在的心因有相互的關係如外緣的諍事逐漸趨向和平內心的諍因有關思想的偏見有關權力的我慢有關經濟的貪欲也受到限制而自然會漸漸淡薄起來政治修明的國家民衆的道德每不需勸教而提高即由於此同時真正和平工作者如調治身心修正智而伏偏見修慈悲而伏瞋慢修戒定而薄貪欲這對於以身作則而實踐的和平工作必更有力量更易成就所以政治不是道德的而決不是不道德的彼此有著相互關係上來說人世的和平重於外緣這不是說不需內因的和平是說內因是次要的因為人事錯綜的社會不和平有關於大衆決不能做到人人的心地和平反之即使有少數能心地和平對於大衆的人世和平也不能起著決定性的作用所以人世的和平重於外緣要基於平等原則和合精神從人事法制政治的革新中促其實現內因為重的心地和平著重身心淨化真能心地和平必有和平處世的表現然社會不和不平或極度的不和平卻不妨實現個人的心地和平這由於人有個性前後延續中有著統一性表現為個人活動的緣故在佛法中三乘聖者是同證涅槃解脫的解脫是不受煩惱繫縛而得活潑潑的無拘無礙的自由自在涅槃梵語有消散的意味稱歎為止息沒靜寂滅安隱實形容心與理冥心地的最極清淨最極和平一切煩惱不外乎知情意的偏頗的分裂缺乏完整性統一性而各相對立自相矛盾這心海的動態如海水一樣相推相蕩不能和也不能平而心中重煩惱的現起那等於海浪的洶湧而已所以內心的淨化消除煩惱即自然的達到心地和平的涅槃心地自由的解脫這內心為重的心地和平是徹底的究竟的從正覺人生真相體達空無我性而破盡愚癡我執為本的煩惱根源淨除了從我執而來的瞋慢貪欲執見等也不再存在這樣的心地和平名為無諍論處為佛弟子身心修持的目標從此心地的和平與自由流露出的身心活動待人處世決不會違反人世和平的精神佛制教團的真和平真自由可以作為最有力的證明六內因外緣並重的究竟和平內因外緣並重的世出世並重的大乘真義以完成究竟和平佛土莊嚴佛身清淨為標的如偏重人世和平而不能徹底的心地和平即流為凡夫行如偏重心地和平而不能著力於人世和平即同於小乘行必須兩者並重化除人世的鬥諍因而增進心地的和平由於心地和平更能積極地促進人世和平這才是真正的大乘行學佛者每不能理解世間善法的一貫性甚至誤會為一切世間法都與出世法不相順不知世間的人世和平與出世的心地和平是基於同一諍鬥的淨化真正的不和不平雖都屬於人類衆生自己但一則表現於外透過社會關係動亂於思想法制經濟方面成為社會的不和平一則內存於己交織於心境自他物我方面熏習自己成為自心的不和平從個己來看社會沒有必然的一致關係世間的社會和平不一定是個己的心地和平世間社會不和平也不一定是個己心地的不和平然從社會來看衆人世間不和平內心的不和平也增強世間和平內心也易於和平社會對於個己不是有決定性的卻有重要性的因為上智與下愚不移而一般人都受著社會環境的重大影響環境對於個人有著重要關係所以彌勒在淨土成佛並不稀奇而釋迦在穢土成佛才受十方一切佛的無邊讚歎大乘法不但淨化自己淨化衆生更淨化國土即證明環境對於人心的重要性為大衆著想促進人世的和平是非常重要的這有利於一般的和樂更有利於佛法的進修菩薩發願要嚴淨國土確是比著重出世的二乘有著更深的正見菩薩的努力於人世和平修證於心地和平分別來說雖如上所說然由於菩薩從人世和平中去實現心地和平從利益衆生中去利益自己所以是一必以真理相感召而有同願同行者的共同努力二心地和平雖主要為真智的淨除煩惱根本無明我執徹證平等空性但不離世間淨化世間而成正覺不是節制煩惱不是滅絶煩惱是融化的轉化的貪欲淨化他而使轉為大乘信願即菩提心為真理為和平為自由為度脫衆生為莊嚴國土而起信願所以說衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成盡一切生中為成就衆生莊嚴國土而無限的勇進瞋慢淨化而使轉化為大乘慈悲與一切衆生如父如母如兄如弟如姊如妹以衆生的痛苦為痛苦以衆生的快樂為快樂而努力於與樂拔苦的大行執見淨化而使轉為大乘智慧通達緣起衆相而歸於一如大乘行者一定要有信願有智慧有慈悲也即是具足了菩提願真空見大悲心這才能完成菩薩的聖格達成淨化自己淨化衆生淨化國土的究竟和平這三者中慈悲是最要的這是融和自他為他利他的主要因素因為有了慈悲才不但是徹證空性的智慧而且是入世利生的方便善巧信願也不但是求出生死苦難而是能不離生死願入地獄不但是志求佛道而且是有一衆生未成佛終不於此取泥洹有信願有慈悲有智慧的菩薩實為綜合了人世和平心地和平而努力於究竟和平的工作者大乘學是真正的和平究竟的和平可以造成人世的和樂也可以實現心地的和樂現在世間如此苦難中國如此困厄人心如此陰險如此唯私唯利難道不想求得一真的和平坦道嗎真正的佛弟子真正的有心人菩提所緣緣苦衆生這正是發心的時候了切勿以為佛法的和平過於崇高必須有崇高而完美的和平觀才能不為不倫不類的虛僞和平不和不平的強權政治所欺騙不因魔焰猖狂而震懾必要有完美的理想才能從近情處易行處去下手推行究竟而完備的和平屬於佛法我們的讚歎歸於佛陀
