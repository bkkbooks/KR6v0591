body:
  text: 發揚佛法以鼓鑄世界性之新文化一佛法與世界性太虛大師圓寂以來快要十五年他創辦的海潮音更是滿四十年了教難國難還是那樣嚴重世局人心還是那樣混亂這對於以革新僧制淨化人生鼓鑄世界性之文化為鵠的大師應該是不勝其感慨的最近應中華民國聯合國同志會約作了一次佛法與世界性的座談時間匆促語不達意趁這海潮音四十周年紀念特演繹的再說一番我們這個時代已從國家而漸漸走上國際聯合由於科學進步更進入太空時代不同星球的往來頻繁也許是不會太久的事了然而人類的思想儘管高喊平等自由博愛而實際卻背道而馳不是不想不要而問題是現居優勢的西方人蘇俄在內缺乏世界性的文化沒有世界性的人生觀殖民主義的全球掠奪雖快成過去而共産主義的世界奴役還野心勃勃大家在這太空時代前夕不是部署太空戰略以圖征服世界就是控制太空地區以便物資占有現在的人造衛星競爭及美日等國早有人組織月球地産公司不都是說明這些嗎這樣的國際性與太空時代只是帶來了矛盾衝突災禍國際與太空時代是會來的但這還是不平等不自由殘酷的不斷演出真正的平等自由的新時代那就要看人類的智慧尤其是現居優勢的西方人的智慧了看大家是否能建樹真正世界性的文化來適應這新的時代從前太虛大師以為唯有發揚佛法以佛法而鼓鑄世界新文化人類才有希望這點我們是完全同意大師的見地無論是宗教政治或其他文化其最初大都帶有區域文化的色彩這在印度佛教也還是一樣的每一宗教或政治等都是人類自己的産物都是適應人類某種欲求而出現的人與人間有共通性所以不同區域不同時代的宗教或政治等都有發展為世界人類普遍採用的可能單是這樣現世界的宗教與政治等有世界性的是很不少了然而我要說的世界性意思不是這樣因為一般的宗教政治與學術思想是不能離開自我中心的自我中心便是我的我的家我的種族我的社會階層我的國家甚至是我的天下國際與太空等自我中心的活動對內是爭取領導對外是謀取擴張從是自非他到有自無他這含著嚴重的對立衝突這樣的宗教政治等不是真正的世界性而卻是反世界性的以宗教來舉例說印度的婆羅門教原是民族的宗教婆羅門剎帝利吠奢雅利安族有宗教的再生權而被看作低賤的首陀羅族其實是被征服的死了完事從此消滅以色列的猶太教他們信仰的耶和華上帝是亞伯拉罕的上帝以撒的上帝以色列的上帝原為民族的保護神所以以色列人是上帝的選民屬於上帝的而要把外邦人交以色列人去統治事實上並未成功雖然從婆羅門教而演化為印度教從猶太教而革新為基督教等已大有進步而還是丟不下信我者永生不信我者滅亡的包袱這在宗教界還不過狂熱的排他性而已如成為政治的指導精神那被奴役的人類可夠苦了總之這種局限的偏激的排斥異己而向外擴張即使是舉世風行也無非真正世界精神的反動招來人類更大的災禍說到佛教的世界性依佛法的術語來說應該是法界性姑以人類來說佛法從來就不是少數人多數人而是一切人一切衆生的論空間不是一地區一星球世界而是一切世界的論時間不是某一時代而是盡未來際所以佛法常說豎窮三際橫遍十方這是從無限時空中的一切衆生一切人類去觀察超越了自我執著而沒有任何局限性的立場所以真正能信解佛教的沒有不深刻感到這是自己的事也是人人的事信仰是純粹的自由信仰雖希望別人信仰而決不勉強別人信仰所以佛教始終是自由地傳布從不曾利用政治或經濟力量打起替天行道的旗幟向世界傾銷也就因此不曾為了傳教引起嚴重的宗教戰爭以佛教的傳入中國來說他始終是自由傳布和平的與中國文化共存然而卻深深的啓發了中國文化使中國文化得到更高的發展二佛教的世界性原理佛教的世界性法界性原理從何得來這是由於釋迦牟尼佛在菩提樹下大覺大悟的體證得來體證到的在不可說中說為法界依此而宣揚出來的佛法就名為稱法界性的法界等流佛所親證的法界性與庸常的見解受著自我意識支配的不能相提並論關於法界性不妨從兩點來說明一從事事差別解了法從緣生而深入空平等性在一般的認識中不但是外界的事物就是內心的每一活動都是一個個的就是推論到的理性也似乎是一合相的這種庸常的認識本來無礙於世俗的認識世間也確是那樣的大到星球小到原子都是表現為個體相的然而如推論到時間是剎那剎那時間點的纍積物質是一微一微占空間的點的積集內心是衆多心心所的和集那些小到不能再小的因素是宇宙的基石這就成為至小無內的宇宙觀有的覺得不對一一事物有著內在的關聯性這樣推論到極際一體兩面一本萬殊等思想又引到了其大無外的宇宙觀其實以為是一也好是多也好小一也好大一也好都是受到常識中那個一合相的影響常識直覺到的是如此而佛卻從此深入悟解得一切法從因緣生簡言之存在的一切物質也好精神也好表現為一個個的都是離不了關係條件而存在隨舉一法都是從因緣而有的離了因緣不存在而同時這也就是其他法的因緣所以表現為個體相的在前後延續彼此相關的活動中與一切法息息相關雖好像是實在的個體的而實不外乎物理的生理的心理的幻相幻相不是說沒有而是否定了那孤立的靜止的個體性的那個現象而已從這緣起而沒有自性自性就是實在的個體性的深觀中深入一切法的底裡即是空平等性這如芭蕉層層的披剝進去原來是中無有實一樣這就是一切法的真性是平等無差別的超越時空質量的是佛平等大慧所自覺自證的一般本體論者只是推論到類似的境地但又總是把這看作實在的所以或說是神或說是物或說是生或說是心等都想把這作為宇宙的本元來說明一切以為一切從屬於這個這是雖多少理解到事事物物的內在關聯而不能擺脫常識中的個體一的實體的執見這才結果是精製改造那常識中的生心等現象而稱之為本體這是與一切法本性不相應的因為真的到達空平等性超越了時空質量說做什麼都不會是的就是稱之為什麼都不是也是不相應的所以說破二不著一一切法空空亦不可得唯有通達空平等性才不會落入是神是物是心等一元論不會以常識的精製品為真性引生一切由此而起一切從屬於此的謬見人類的意識直覺到那個體的實在的一切多少理解因果關聯而不能徹底終於非要尋求一個實體不可本此意識去看自己也就把自己看作主體的雖多少理解到人類相依互助等事實而在待人接物的實際生活中總是自我中心的這在平常人還好一些越是學問事業有成就的政治領袖帝王等每在不斷的成功過程中錯覺自己為不同於人的自己的見地就是真理自己的行動一定合法走向極端的反世界性而在佛由於正覺了法界空平等性從此透出去觀察一切一切是形成個性而實一切依於一切這才從法空緣起的幻網中通達了一總別無礙全體與部分在關聯而依存中總別都只是相對的存在二主伴無礙在某一點上以一為主而活動時一切即相伴而助成並無絶對的主體三成奪無礙一切是相依相成的相成中含有相對性相對的相反活動在關聯而共存中也是相成的方便二從念念分別解了意言無實而深入心光明性人類的一切認識主張行動文物制度都是依能知的心識而成立的假如是木石一樣這一切都不會有了也就無所謂人了可是人類的起心動念是念念分別的一個個的印象一個個的概念正與外界事物的各各差別一樣所以不自覺地大抵是一個個的認識以為一個個的對象就是這樣這是什麼那是什麼這是這不是那個那是那不是這個構成名言與義相的相應性憑這樣的認識去理解事物固然是不能解了真相在這樣的念念分別中也無法覺到心的深處但在佛的解悟中通達了一切認識都是依根認識的官能境認識的對象識三和而成立也就是說認識是緣起的存在在根境觸對時心識就現起那個境相這就熏成內心的熏習同時依根起識時也就依熏習而表現那對象所以每一印象概念認識都由於過去熏習所成的無邊名言熏習所引起離不了過去心識所習成的緣影念念分別其實是過去曾習的名言熏習所現起而又熏成新的成分識的念念分別是由想的取像而安立的名言所以稱為意言也叫名言因為內心的認識與能表詮的語言大致相同也叫緣影因為這是心境交觸時留下的影子熏習人類的心識受過去無邊的名言熏習所支配現在又受一般人類的語文思想文物制度所影響人心正像一座文化的儲藏庫文化的久遠堆集當然應有盡有愈來愈豐富愈來愈復雜人類也就越來越聰明越來越進步可是正像文化古老的國家每為古老的文化所束縛而一些文化的毒素已不斷地在發酵而使文化古老的國家日漸衰退一樣人類在積極的名言緣影中過生活分別越多意言的熏染越深每為名言分別所拘蔽而一些不良的心理因素也不斷地擴展使人類活埋在這名言分別的堆積層中忘失了自己的本心人類的知識愈進步為什麼世故越深越是好話說盡壞事做盡便是這個緣故由於佛的悟入緣起徹了那念念分別不能通達真相不是自心固有的所以叫做客塵所以在定慧的熏修中通達名義互為客名言無實性脫落名言分別緣影到達心光明性也就是不曾受過名言熏染的純粹覺性這是不能與動物的低級心識並論因為一切衆生都是不能離開熏習的到達這稱為根本智超越了主觀與客觀的相對性前後起滅的變異性而只能稱之為本淨本明的覺性到達這與空平等性無二無別不過從兩方面來說明罷了在佛的如實正覺中原是不曾有智與理的隔別的佛以心光明性的體現透出名言而重起名言分別時稱為後得智不再如衆生那樣的以名言分別為表達事實真相不再為語文思想制度等所束縛名言熏習中的一切不良因素脫落無遺如日出而黑暗消失一樣也正像在固有文化中咀嚼精英而吐棄那糟粕一樣佛的正覺就與法界性相應所以能不偏蔽不固執通達了一心色物平等中的心為主導性佛說三界唯心大中觀者的見地這是針對世間的迷妄說明非自然有非神造非物集的由心論依衆生心識的傾向而緣成世間人欲的自由意識也依此而發見了究極的根據太虛大師對此曾稱之為無元心樞二自他相依中的心識相通性人類的意識如發報收報機一樣不斷的收入外來的也不斷的放射出去雖然自心為分別熏習業熏習所障蔽不一定能無礙的交流但如能透過名言無實的關隘便能隨分隨力息息相通這也就是人類衆生慈愛的根據佛法的同體大悲無緣大慈都依此而確立三息息流變中的心體完整性分別熏習的世俗活動中意識是不斷的變化著然由於通達名言無實所以知道念念的本來無礙無限錯綜變化中的統一性到究極時就是佛的心智圓滿性與一切佛平等平等三佛教的世界性事例從佛自覺法界性而流出的佛教顯示了世界性的文化現在想舉幾項事例來證成一語文人類的思想與情感交流語文是重要的工具在人類習用的語文中沒有不覺得自己的好容易學當然在民族精神衰落時有些人會咒詛自己的語文而以能使用外國語文為光榮的有些宗教神化他自己使用的語文看作神的語言有的嚴格採用某一語文以圖宗教的擴展與統一由於佛的深入語言無實性所以使用一切語言佛世有人向佛建議用印度的雅語梵文來統一佛說但佛卻不同意說聽用國俗言音學習佛說每一語文都有他的傳統與長處也許都有缺點加上民族感情更為難說這是不能取一而廢其餘的有些人在語文上固執是此非彼有些專在推求原始意義以為這才是某字的本義而不知語文是習俗共許不斷變化從來就不能免於歧義的所以佛說方域言詞不應堅執世俗名想不應固求不為語文所蔽不偏不執自由採用而自然交流過去大陸的中國大寺院裡僧衆來自各方無形中産生一種混合語什麼人都說得不完全相同可是大家都聽得懂這也許是世界性的語文無礙最好的事例二解行佛法的世界性表現在理解與實行方面特點是一隨機適應以佛的慧眼來看人類的個性知能興趣習慣都是種種不同的所以最好的教化是適化無方以不同的方法來適應化導不同的衆生但內在有著關聯性一貫性能不斷的引導向上而到達同一的究竟這點佛法表現為八萬四千法門五乘三乘而又同歸於不二法門一乘一切衆生皆成佛道佛從不以機械的劃一的解行來教導人從不像神教那樣的劃一簡單的目標使大家歸於同一信行人類界無論是個人種族國家都有個別的不同存在所以弘傳佛法不但要知法而且要知時知衆萬不能製定大小劃一的帽子不問人的頭大頭小勉人以一致頂戴所以佛法中說小藥師的藥籠裡只有一樣藥能治一種病大藥師有種種藥能治一切病雖然在一般人看來今日世界的佛教每有出入或者嫌他沒有嚴密的世界性組織如天主教一樣其實佛法的多樣性真是佛法世界性的特徵真能在佛法中進修的自會有同一的傾向進入同一的至善境地二自由抉擇佛法是適應不同的根性或淺或深或豫為人悉檀或奪對治悉檀對於不同的教說佛弟子是尊重自由思考的特別是應理論者進展到但立現比二量不立聖教量以自拘蔽聖教的真理一定是合於現量比量的依義不依語不受語文所困蔽重視內含的意義尤其是注意到為什麼這樣說依了義不依不了義在不同義理中有批判抉擇的自由所以是理長為宗自由思考與自由抉擇展開了小大空有的深義無論是佛說的隨機性或教義的自由抉擇都必然的是反教條的反教條的宗教也許有人覺得希奇其實只是相應於世界性的特徵反教條的自由學風在中國的天台賢首宗特別是禪宗裡到得最確實的證明一般教學不免受到翻譯語文的拘蔽或印度教派的局限重於實踐的禪者從中透出而演為禪宗不用固有的術語固有的教說號稱不立文字而照樣學習佛法傳布佛法成為千年來的中國佛教主流三兼容並蓄不但佛教內部的無限衆多而一致對於教外也一向以道並行而不相悖的精神來處理佛世一位異教徒信仰佛法以後想斷絶一向敬奉的外道們的供養但佛勸他照常的供給他們佛法沒有一筆抹煞異教覺得在人性淨化的進修過程中這只是程度低一些而已佛不拒異教於善法之外決不如異教那樣的狹隘對於不同的宗教一律看作惡魔認為非墮地獄不可狹隘的排他性也許真是惡魔的特質相反的以佛法看來不同的宗教學術雖不是佛教但儘有些是菩薩的教化一切文化的發展受到地區及時代的局限不能不有偏蔽甚至包含毒素但在教化當時當地的人類來說不能不說有著良善而積極的成分這種寬容的立場事實也確實如此表達了佛教文化觀的世界性能與世界一切良善的文化共存陶練一切偏蔽而引向崇高完善的境地佛法在中國影響了中國的儒理學道全真派在印度影響了後起的印度教學傳到希臘與埃及也促成了西方神教的革新雖然他們在固有傳統文化的根柢上融攝了佛法或者反而誹毀佛法然在佛法泛應的精神上依然是滿意的部分成功佛法必須保存佛法的完整性與原則不斷的影響一切而使世界文化充滿了佛教世界性的精神共向於究竟的極則三制度在佛教的制度中可以說到兩點一佛教是有僧團組織的佛是實際的領導人也是弟子們心目中的教主但佛卻說我不攝受衆又說我亦是僧數出家僧衆的組織佛並不以領導者自居而說以法攝僧法是真理與德行大衆是受了真理與德行的感召而集合起來的人人可以解脫人人可以成佛平等平等所以佛也是衆僧的成員之一僧團以會議而辦事佛真是典型的民主導師二適應時地需要關於集體生活佛是制有大衆共遵的規律但佛又說隨方毗尼這是說衣食等事凡佛所制而餘處覺得杆格難行的可以不行佛沒有制訂而在他處卻認為必要的佛也認為是對的這所以佛教的僧制不拘於印度的舊俗而在中國日本等都演化為不盡相同的制度總之佛教是適應一切遍入一切而引令向上並非打倒一切而標榜死定的法制向全世界去強力推行四結論佛教的世界性是根源於法界現證的從此而流出的法界等流語文思想制度無不表現了世界性而充滿平等自由民主寬容慈悲的內容所以說發揚佛法以鼓鑄世界性的新文化不是以一套新的來取代舊的也不是打倒其他宗教而推行佛教而是從發揚佛法中化除實體的世界觀銷融自我中心的人生觀闡揚世界性原理培養人類世界性的新意識從世界性的思想中心調整改進陶練現有一切的文化而使其融合進步適應新的時代成為新文化的內容使每一國家民族個人都能和樂善生於新的文化新的時代裡說到這裡再扼要的指出法界性的文化佛教可說是從文化核心人類意識內容去革新主要是從實體的事物實體的自我執見上去革新所以革新的有力工具便是佛法的空無我觀了唯有這樣才能有真正的平等自由與慈悲相反的從實體而來的事事差別自他敵對就是反世界性的文化基礎從一切敵對去考察這才會以矛盾為真理才會覺得自己與一切人為敵人人是惡人這是人類的敵對性殘酷仇恨的意識來源雖有人能意識到事物自他的融和性然由於實體性自我感的固執表現在宗教或哲學中終於不能是平等的民主的而被看為一切從屬於此實體的如見於政治意識那不外乎希特勒式的公民表決史達林式的民主領袖在這種精神意識中也沒有真正的博愛相反的是仇恨的懲罰上帝愛世人而結果是以洪水來淹沒了一切人類
