body:
  text: 一般道德與佛化道德道德不獨是佛法所有的世界的各宗教各民族各時代都有他的道德不過佛教的道德觀在一般共通的基礎上更有他獨到的特質而已所以現在想從一般的道德説到佛化的道德人類進一步到一切衆生能和樂共存互助合作實現家齊國治天下平的理想道德是顯得極其重要的如忽視道德則家庭國家國際都會混亂不堪從前釋迦佛出世時印度傳統的婆羅門教失去了權威而新起的思想界就有懷疑道德否定道德的他們大抵依據機械的唯物的觀點覺到世間無所謂道德與不道德沒有善與惡也沒有從善惡而引起的苦樂果報他們破壞了道德的軌律破壞舊道德的軌律破壞舊的而不能凝成新的宗教新的道德然而世間不能沒有是非不能不分別善惡邪正故釋尊呵斥那些抹煞道德的為邪見人為引導人類墮入惡趣者釋尊的大覺而創立佛教就是重新肯定道德價值的宗教所以真正的學佛就是從一般的道德實踐起進步到最圓滿的道德生活的完成一道德與不道德説到道德就有不道德道德與不道德佛法中稱為善與惡這二者不能從物質的觀念中得來所以唯物論的人生觀等於從根否定了善惡的意義道德與不道德大概的説是人類以上的文明産物從有意識的實踐中表現出來善與惡依什麼作標準怎樣是善的怎樣是惡的從事相來説可有二義一從將來的結果來説人們的起心動念説話作事如因此而引起將來的良好果報就是善如這樣做去會得到將來的不良後果就是惡二從當前所對的人事説不問什麼事如對他人有利益叫做善否則就是惡依此而分析起來可以有四種假使這樣做自己與他人都能得好處這當然是善的如自己吃虧而他人能得利益這也是善的而且極有意義如自他都無利益都受損害這當然是惡的如自己雖得利益而他人卻受到損害這不能不説是惡的上面二種解説善惡的判斷是一致的因為現在所作而於他有利的即使現在自己有損而將來一定會感受樂果所以是善反之即使現在自己沾些便宜將來也會招受大苦所以是惡如深一層説佛法就稱善與惡為法與非法依中國話説即合理與不合理凡契合於正理的是法是善不合理的是非法是惡違理與非法的一定會引起他人的損害是惡反之合於法理的一定會於人有益所以是善善與惡的簡單分別大略如此二最一般的道德與道德律什麼是一般的道德不是佛教所獨有的是各宗教各民族各時代所可能共有的道德在這一般的道德中最根本的或可説是道德的根本為一切道德行為所不可離的如離開了這雖也多少有其價值但是微不足道或可説不成其為道德的這就是最一般的道德釋迦佛出世前後印度的宗教界編集有法經法論法即是道德近於中國的禮在這些道德法規中以慈悲不殺為最一般的道德這不只是印度人或是某一階級的道德而是一切人類所應有的道德出現於印度的佛教也以慈悲為本而看作首要的根本的道德慈與悲佛法中小小有差別希望他人得到快樂幫助他人得到快樂這是慈心慈行希望他離去苦痛幫助他解除苦痛這是悲心悲行一般人的慈悲雖與佛法所説的大慈悲不完全相合但這是深度與闊度的不同論性質還是共通的一切的道德心行都以此為本我們學佛的首先要受皈依皈依的願文説從今時乃至命終護生進而受戒先要受持不殺生戒護生與不殺生便是慈悲心行的實踐佛教的一切德行都是不能離開慈悲不殺的從佛法看來衆生的生命延續雖説是苦痛的根源但又沒有不貪戀生存因為衆生所有相對的喜樂都以生存為先決條件所以苦痛充滿的衆生為了愛好不徹底的世樂都怕自己一期生命的毀滅衆生沒有不是愛生惡死的厭苦求樂的佛法的護生與不殺生以及大乘佛教的不肉食都契合於衆生的共欲合情合理的所以是道德的這種最一般的道德在中國文化主流的儒家中就是仁德行雖是很多的如孝弟忠信禮義廉恥等但仁是最根本的向來都以仁為德行的核心此外如老子所説的三寶中有慈墨子説兼愛以及基督教的愛都無非慈悲的別名大家都把一切德行歸納到仁愛慈這可見印度文化中説慈悲為最一般的道德實在非常確切因此道德的基石是仁慈是與樂拔苦現在有些人提倡階級的愛階級的道德事實上從仇恨鬥爭的基礎出發使全人類普遍陷於鬥爭殘殺的恐怖中這那裡是道德從不道德仇恨鬥爭的動機出發無論怎麼説那樣做只是增長人類的苦痛不但毀滅別人自己也被毀滅實是抹煞道德的偽道德為什麼仁慈愛是道德的根本是最一般的道德律我們知道道德是表現於自他關係上的而仁就是人與人間的合理關係發為應有的合理行為佛法説有自通之法這是從自己要怎樣推知他人也要怎樣這是以己心度他心就是儒家潔矩的恕道依自通之法來説我要解除苦痛他也同我一樣那麼我不應增加他人的苦痛而且應幫助解除他我要有喜樂他人也一樣的要有喜樂那麼我不能奪去他人的福樂更應該協助獲得他自己要去愚癡要得智慧要身體健康人格健全都應使他人和我一樣這樣的以己心度他心即是慈悲與一切德行的源泉耶穌説你要人怎樣待你你也要怎樣待人我要人待我好所以我也要待人好雖近於自通之法然在自他關係上還是從為了自己出發佛法説我希望如此可見他人也是希望如此的所以應該對他人如此這只是對人的同情並無功利觀念儒家説己所不欲勿施於人己欲立而立人己欲達而達人與佛法的精神更為相合衆生的生命是心色和集又是自他增上彼此依存苦樂相關的人與人衆生間有這樣的關切所以損害他是不合理的自他既是相依而存的害他即等於害己反過來説幫助他減少痛苦也就等於減少自己的痛苦這當然是合理善這利他而後能自利損他等於損己的道理一般人不一定清楚地了解或者還會反對而不願信受道德的法則可是我們從無始以來生生不已的活動不能不受這自他相依苦樂相關的法則所影響所以在不離自他依存的生活中雖沒有人教導也會自覺到自他間的同一性引發他人的需要與我一樣的意念見人受苦而生悲惻心見人得利而生歡喜心每從無意間流露出道德意識的自覺這種道德意識或稱良心良知什麼人都是多少有的不過有些人為物欲色情名譽利養權勢等所迷覆道德意識的自覺不容易顯發專門為私為己損他害己甚至見他失利而幸災樂禍見他得利而嫉妒障礙然而窮凶極惡的在某種環境下也會良心發現感到自己的罪惡而痛哭流涕的無始來不離自他依存而引發的根源於仁慈的道德意識不但是人人所共有的而且是一切道德所不能離的例如孝養父母雖説是天經地義然如為了奉養從掠奪貪枉欺騙而得來財物也不能説是善的不能不説是非法惡的因為獲得財物時對人失去了道德慈悲的緣故所以説到道德的心行應該重視這最一般的道德意識三道德的變與不變部分人的看法道德是放諸四海而皆準百世俟諸聖人而不惑似乎一毫變動不得另一些人卻以為道德是依經濟及社會情況的變動而變動並無一成不變的這雖都有部分的意義而實是慈悲為道德的普遍軌律無可變動而表現於實際的德行有著種種性有著變動性雖然內容還是有著一貫性的這可以分三點來説一表現於自他的社會關係時如對家庭區域國家世界由於應對各社會層的不同關係所表現的德行也就多少不同如善生經説父子夫婦師弟等間彼此都有應守的德目依一般説如家庭的孝道是無可疑的應有德行但在社會或國家的立場就有移孝作忠或大義滅親的德行而不能拘守家庭的孝道這是為了大社會層大的利益就不能不犧牲小社會層小利不過道德不是法律重於自發自覺的操持可以啓發誘導而不能強人所難硬性的要別人如此否則不免有人要假藉為公忘私全大捨小的美名強迫人類作違反人倫國誼的罪行陷人類於大苦痛恰好是違反慈悲殘酷而無同情的惡行二表現於時間的前後關係時由於社會情況有著某種變動道德的措施也就會多少不同如家天下時代的忠君到民國便不同又如男女間應守的德行從母性中心時代到現今的一夫一妻制貞操的含義有著多少不同的但這決不是道德無標準忠貞永遠是人類應有的美德僅因時而表現不同或從不完全而演進到更完全而已三表現於根機的淺深關係時同一社會同一時代而由於個人的根性德行會多少變化如佛法中人乘法只要不邪淫就是持不淫戒而聲聞乘的出家者卻完全遮禁同是一樣的戒如不殺不盜等小乘要止大乘中有可作的在小乘中不那樣做是持戒大乘中可能認為犯戒要這樣才算持戒表面看來大小乘的德行相反其實不過由於發心不同目標不同對於戒德的運用小小差別而對於某一德目的尊重某一德行的信守始終是一致的總之道德的根源在慈悲這是不可能變動的沒有慈悲即是不道德或非道德的從此而表現於自他間多方面的合理關係有孝弟忠信等不同德目這些可因時因地因對象因志趣而不同但這些德行永遠是人類相互依存所應有的準則古人説盜亦有道大盜的劫掠殘害當然是不道德的但大盜的能成大盜至少在對於部屬間必有他的合理關係這才能團集而成為大盜如完全背棄了自他間的應有關係大盜也是不能成就的這説明了有人類有社會人與人間的應有德行永遠不可能背棄的所以我們鼓勵人類尊重道德實踐道德要從道德的根本去啓發他激發人類的慈悲去實現於一切事行如忽略根本只知拘守陳迹死執教條那不但不能契合道德的真意反而會引起對於道德的誤解甚而障礙了道德的開展四道德的三增上增上是依的意思我們依此三者可以使我們的德行進展為更完善更崇高的對於道德這三者都是有力的增上緣但必須三者並重而不偏於一邊才好什麼是三增上一自增上自是自己二法增上法是真理或軌律三世間增上世間是輿論及公認的意見要遵行完善的德行不能不顧到這三者這與我國古説的畏天命畏大人畏聖人之言有點相近一自增上即時常喚起自尊心尊重自己不甘下流對自己所作的勇於負責對一切應做的事由自己來擔當聲聞乘説人人有解脫分大乘説人人有佛性確信自己有為善成賢成聖成佛作祖的可能彼既丈夫我亦爾不應自輕而退屈不願自暴自棄努力向上沒有不能做到的尊重自己擴展自心的德行負起自救救他的重任尊重自己不甘下流便是促進道德的主要力量二法增上要循著真理而行不能與他相違背前面説過善行名法惡行即非法凡契合緣起事理的心行是道德我們不能不順此而前進三世間增上大家以為這樣是合理的這樣是聖賢或善人所稱歎的我就應這樣做尊重社會的公共意志接受社會的善意批評這才能成一個合乎人情的善人例如從事政治受到外來的批評不肯反省自以為然甚或笑罵由他笑罵好官我自為之這必然走向惡行尊重輿論就會修正自己的偏失走向光明的坦途三增上是人類道德向上增進的基石不但不能缺就是偏在那一邊也會發生偏弊的如過分尊重自己每覺得自己的超勝什麼真理人情容易放在一邊這即使動機良善也會漸漸地走向不道德的路自害害人如過於尊重真理可能會冷酷而不順人情專顧世間容易背棄真理因為世間的意見不一定對真理並不以多數為標準所以我們要持行完善的德行走向出世圓正的道德決不能離此三者而應從協調中不斷向上佛法的二乘重於理智對世間利濟衆生事業不免冷淡些這雖不是不道德而到底不夠完善大乘圓滿的菩薩道三增上並重這才能完成究竟圓滿的佛德五佛化的道德在般若上來所講的大抵與世間所説的相通還不能表顯佛法的特色佛法能完成究竟圓滿的德行他的特質何在佛化道德的特質在般若梵語般若華語為智慧但此所説的智慧意義極深指通達我法空性的真慧不是一般智慧所可比擬的所以大智度論説般若甚深智不足稱為什麼説佛化的道德在般若這可從不道德説起不道德的惡行從什麼而發生是由於煩惱而來的一切煩惱以薩迦耶見我見為本一般世間的一切動作都從我見而流出做壞事固然由於我見的策動即使是做善事也還是不離我見一般人為著自身利益遵行道德的生活看來是潔身自好為衆服務為社會國家謀利益其實還是為自己的離不了我見的力量為了滿足個己的我家我國等願望如損他而作不道德的事固然要不得就是行善像布施持戒如覺得我能修行我比他好我救了他也還是和我見糾纏在一起從私我的情見出發即使高揚著為人類為社會的旗幟也是不理想的因為從私我的情見出發好事非我來做不可救人救世也非我我們不可我才能行善我才能救國救世界你不行這種兩賢相嫉大抵是為了這個依佛化的道德看來這是不徹底不完善的道德與不道德相雜想行善而往往誤入惡徑只要是善事別人做與我做同樣的是善事我應該做他人能做更好如非自己行善不可對他即不能不爭或者並無多大不同而還是非爭不可這樣的善行問題可就大了這是不能自利利他不足以救濟世間不足以證得菩提的所以一般的惡行增長生死生起苦痛就是一般的善行也還在生死中還是不能脫離苦痛的由於一般的善行並無徹底的善行為善也從自己出發於是世間的邪見者懷疑道德否認有純粹為他的德行實則一般的善行不離自己的情見就是凡夫行凡夫本來如此就凡夫説凡夫這不能責他怪他還是應該獎勵他為善不完善的德行到底比作惡好得多凡夫的善行雖如此而聖者的德行卻與此不同佛化的道德建立於般若無我智的磐石是破除私我掃蕩執見的特殊智慧從這種智慧所攝持所引導的便與凡夫的德行截然不同不再專為自我為我的家庭我的廟子我的故鄉我的國家而著想能從整個人類一切衆生的立場去看一切這在佛法稱為緣法界衆生而發心不但求自己得益動機在使大家都得到利益那些説世間都為自己沒有真實為人道德的懷疑者若研求佛法就知道佛法中確有不為自己的真道德菩薩為利益衆生而發心必要從無我智透出如體悟一切法無我真慈悲即活躍於內心私情與愛欲能當下斷盡菩薩悟入世間是相依相關的法法平等不二這才見衆生樂如己樂見衆生苦而如親受苦痛一樣與樂拔苦的慈悲油然而生而且是無限的擴展這樣的慈悲似乎與儒者的仁耶教的愛相近然這是無我的慈悲實在是大大的不同了通達無我法性發大慈悲心這是真情與聖智協調的統一心境學佛的最高道德即從此而發現出來學佛重在祛除私我但不依方法還是祛除不了如遍地的荊棘蔓草不鋤盡根株決不能生長嘉穀我們心中的私欲也是根深蒂固非著力的痛下功夫也不能清淨而完成崇高的德行所以修持悟入目的在淨化身心從此而完成圓滿究竟的德行不知者以為佛法的修持與世間與人類無關這是重大的誤解要化除我我所見要依戒定慧三學去修習如儒家於道德的修養也有一番功力防範於起心動念之前時時照顧要人致敬慎獨然佛法的修持不但要息心而制心一處還要於一心中勘破自我定慧齊修從染惡根源我見去鍛鍊一番琢磨淨盡才能心地發光顯發為完善的德行真能做到私我淨盡般若現前那就不但了脫生死而一切行為無不隨順正法能真實的度脫有情佛教所説的一般道德與其他相通唯有從般若而流出的無漏德行才是佛化的不共道德道德與真理慧渾融表現出佛化道德的特色六學佛即是道德的實踐學佛是道德的實踐這説明了學佛是人人應學不論男女長幼的信佛的到寺裡來進香禮佛持名誦咒這是對於佛菩薩的崇敬或請求佛菩薩的加被真正學佛的不但是信仰不但是遵行佛教的禮儀而要信智並重學佛也不是專重教理研究一番就算數而要解行並重學佛的主題不外乎三學戒定慧或開廣為六度這都是實踐德行其中戒是一般的德行重在止惡防非然不單是止如應作而不作也是違犯的能夠持戒身語的行為就會合乎法度不過外表的行為雖謹持不犯而還不能將內心的亂念息下散亂失念不正知這都是使心地蒙昧不明使我們走向罪過的動力所以進一步應當集中精神專心一境使內心進入安定而純淨的境地這就是定得了定部分的煩惱降伏了但要斷除煩惱非引發無漏慧不可真慧二無我慧是廓清我見妄執的利器如熾烈的猛火一樣燒盡一切的煩惱內心經過慧火的鍛鍊畢竟清淨這才能內心外身所行都能合法慈悲心淨化而增長了能捨己為人顯發為圓滿的德行從這學佛的過程看學佛不是別的只是從外表清淨而到內心清淨從內心淨化而使外表的行為更完美更圓滿學佛實只是道德的實踐這一完美的實踐過程雖不能人人都做到但要做一世間的善人也得合乎學佛的戒學才得
