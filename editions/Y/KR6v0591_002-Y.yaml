body:
  text: 人間佛教緒言一人間佛教的展開契理與契機佛法所最著重的是應機與契理契機即所說的法要契合當時聽眾的根機使他們能於佛法起信解得利益契理即所說的法能契合徹底而究竟了義的佛法要著重這二方面才能適應時機又契於佛法的真義如專著重於契理或不免要曲高和寡了如專著重於應機像一分學佛者只講適應時代而忽略了是否契合佛法的真義這樣的適應與佛法有什麼關係現在所揭示的人間佛教既重契機又重契理就契機方面說著重人間正行是最適合現代的需要而中國又素來重視人事別的不說如印光大師他平生極力弘揚念佛往生卻又提倡敦倫盡分這名詞雖是儒家的但要在這人間做成一像樣的人盡到為人的本分作為求生西方的基礎他是沒有忽視佛教在人間的重要意義民國以來佛教的法師居士都有適應社會的感覺或辦慈善教育事業等不問成績如何但確是認識並傾向於這一方面佛教是人間的人間佛教的論題民國以來即逐漸被提起民國二十三年海潮音出過人間佛教專號當時曾博得許多人的同情後來慈航法師在星洲辦了一個佛教刊物名為人間佛教抗戰期間浙江縉雲縣也出了小型的人間佛教月刊前年法舫法師在暹羅也以人間佛教為題來講說總之人間佛教的時機適應性確是引起各方面的重視了人間佛教不但契應時機更是契合於佛法的深義大家應努力來弘揚人生與人間太虛大師在民國十四五年提出了人生佛教在抗戰期間還編成一部專書人生佛教大師以為人間佛教不如人生佛教的意義好他的倡導人生佛教有兩個意思一對治的因為中國的佛教末流一向重視於一死二鬼引出無邊流弊大師為了糾正他所以主張不重死而重生不重鬼而重人以人生對治死鬼的佛教所以以人生為名佛法的重心當然是了生死成佛道但中國佛弟子由了生死而變成了專門了死如臨終飭要臨終津梁臨終一著等書都是著重於死的我在香港遇見某居士還說學佛就是學死一般的學佛修行動機每每如此即為了將來死得好禪宗的臘月三十日到來作得主也只是死得好的證明大師曾為此寫了生活與生死一文認為佛教的本義是解決生活在生活問題的解決中死的問題也就跟著解決了其實佛教的了生死並沒有錯生死是生死死生生生不已的洪流包含了從生到死從死到生的一切解決這生生不已的大問題名為了脫生死如不能了生那裡能了死這那裡可以偏重於死而忽略於生中國學佛者由於重視了死也就重視了鬼中國傳統的宗教是人死為鬼雖接受了佛教的輪迴說相信鬼可轉生為人但他們只知道人與鬼的互相轉生而每忽略了人死不一定為鬼可以人死為人人死為天所以學佛者甚至往生淨土的信仰者也還是不願為鬼而又預備做鬼死了用種種的飲食來祭祀他依佛經說唯有餓鬼才需要祭祀燒冥衣給他穿化錫箔冥洋給他用紮紙房給他住佛教中不但應赴經懺著重度亡而且將中國的一些迷信習俗都引到佛門中來這完全受了中國人死為鬼的惡影響其實一人死了不一定生於鬼趣或生地獄畜生或生到天國或仍來人間即使想到死亡也不應預備作鬼無錫的丁福保以為信佛先要信鬼大師以為這不免加深了鬼教的迷信為對治這一類鬼本的謬見特提倡人本來糾正他孔子說未能事人焉能事鬼儒家還重視人生何況以人本為中心的佛教大師的重視人生實含有對治的深義二顯正的大師從佛教的根本去了解時代的適應去了解認為應重視現實的人生依著人乘正法先修成完善的人格保持人乘的業報方是時代所需尤為我國的情形所宜由此向上增進乃可進趣大乘行使世界人類的人性不失且成為完善美滿的人間有了完善的人生為所依進一步的使人們去修佛法所重的大乘菩薩行果我怎樣判攝一切佛法大師曾說仰止唯佛陀完就在人格人圓佛即成是名真現實即人成佛的真現實論即人生而成佛顯出了大師人生佛教的本意人生佛教是極好了為什麼有些人要提倡人間佛教呢約顯正方面說大致相近而在對治方面覺得更有極重要的理由人在五趣中的位置恰好是在中間在人的上面有天堂下面有地獄餓鬼與畜生可說在人間的旁邊而也可通於上下鬼趣的低劣者近於地獄有些宗教是不分的所以閻羅王或說為鬼趣的統攝者又說是地獄的王而鬼趣的高級者即低級的天神畜生中高級的也通於天天神與鬼畜在一般宗教中雖從來有分別而實有混淆的形跡大概的說傾向於統一的永生的是天神神教教但也有多少不同如基督教的耶和華回教的阿蘭是一神教如印度的梵天大自在天中國道教的元始天尊等是泛神教即有多神的傾向而統一的如傾向於雜多的死亡的即鬼靈鬼教或巫教教佛教是宗教有五趣說如不能重視人間那麼如重視鬼畜一邊會變為著重於鬼與死亡的近於鬼教如著重羨慕那天神仙鬼一邊即使修行學佛也會成為著重於神與永生長壽長生的近於神教神鬼的可分而不可分即會變成又神又鬼的神化巫化了的佛教這不但中國流於死鬼的偏向印度後期的佛教也流於天神的混濫如印度的後期佛教背棄了佛教的真義不以人為本而以天為本初重於一神傾向的梵天後來重於泛神傾向的帝釋天使佛法受到非常的變化所以特提人間二字來對治他這不但對治了偏於死亡與鬼同時也對治了偏於神與永生真正的佛教是人間的唯有人間的佛教才能表現出佛法的真義所以我們應繼承人生佛教的真義來發揚人間的佛教我們首先應記著在無邊佛法中人間佛教是根本而最精要的究竟徹底而又最適應現代機宜的切勿誤解為人乘法二人間佛教的三寶觀三寶在人間佛法無邊實不外乎三寶我們學佛的第一要皈信三寶拿出家人說皈依三寶即加入僧團而學法由學法而趨於果證皈依的對象是三寶所學所證也不出此三寶如不能正確地信解三寶一切與外道的知見一樣那名稱是皈依三寶其實對佛法是極其陌生的三世十方佛是極多的凡對於宇宙人生的真理普遍而正確的覺悟正遍知慈悲智慧一切功德到達圓滿的境地就稱為佛單說佛不是指那一位佛而是通指三世十方的一切佛但是我們怎麼知道有佛有十方三世佛呢這因為我們這個世界曾經有佛出世本師釋迦牟尼佛就誕生在印度的迦毘羅國釋迦種族父親是淨飯王母親是摩耶夫人他也有妻有子出家後參學修行終於成了佛他常在摩竭陀國的王舍城憍薩羅國的舍衛城等弘揚正法到八十歲的時候在拘尸那地方入滅照這歷史上千真萬確的事實來看佛那一樣不是在人間的釋迦牟尼佛不是天神不是鬼怪也從不假冒神子或神的使者他老實的說諸佛世尊皆出人間非由天而得也增壹阿含經這不但是釋迦佛一切都是人間成佛而不會在天上的又說我亦是人數佛是由人而成佛的不過佛的斷惑究竟悲智功德一切到達無上圓滿的境地而已佛在人間時一樣的穿衣吃飯來去出入他是世間的真實導師人間的佛弟子即是隨佛出家常隨佛學法句經說具眼兩足尊眼即知見知見的具足圓滿者即是佛佛在兩足的人類中處最可尊敬的地位佛出人間人間才有正法由於有本師釋迦牟尼佛我們才知道有三世十方諸佛從佛佛道同來說一切佛還不等於釋迦佛嗎再從法寶說諸佛所證覺的諸法實相是法修行的道也叫法道與悟證的寂滅法本無所謂人間不人間的佛出世或不出世都是這樣佛時常說是法非佛作亦非餘人作那麼為什麼說法在人間因為本師釋迦佛的說法是為人而說的在神鬼氣氛濃厚的印度環境雖也偶為天龍等說法而重點到底是為了人間的人類如佛教根本教義中的十二緣起的識名色六處三支由初識投胎識而有名色肉團凝成由名色而起六處眼耳鼻等成就這唯有此欲界人間才有這完整的生長過程他界如天與地獄等都是化身的頃刻即圓滿六處那裡有此階段又如無色界既沒有色法即是有名無色處中也但有意處而沒有眼等五處了佛這樣的說明身心漸成的階段即是約此界人間而說的又如生緣老病死阿毘達磨者把病略去了但經說是有的老與病其實也只是此界人間的情況地獄與天神可說都是沒有的佛本為人說十二緣起等到以此論到一切即覺到有些不盡然其實佛沒有為天為鬼而說此法門這是為人類而安立的五蘊十二處十八界等都如此又六根對境生起六識這也是人類的情況許多下等動物畜生是無耳無鼻的當然不會有圓滿的十二處十八界色界的眾生沒有鼻舌識到了二禪以上前五識就都不起了五蘊十二處十八界的分類實在是依人類而分別的談到修道如天國畜生即沒有律儀戒所以可以肯定的指出法本是為人類而說的一切是適應人類的情形而安立的佛既沒有依地獄天堂的情況而立法如有地獄法與天堂法那也只適合於地獄與天國也不是我們人類所能信行的說到僧寶不用說是在人間了出家五眾沙彌沙彌尼式叉摩那比丘比丘尼中除了人間其他眾生都是沒有的所以出家眾的律儀戒唯是為人而說也唯是人所受所行的受戒時即曾問汝是非人耶如是非人天神與鬼畜即不得受戒依戒而攝僧依僧伽而住持佛法一切都是人間的何等明顯佛出人間為人說人法人類所能解能行的人類得因此而增進而解脫的佛法修學者也即是人間賢聖僧三寶常住人間進一步說人間才有如法而完美的三寶佛在人間法與僧也無不在人間三寶本在人間這即是我們的皈依處如忽略此界人間的佛法僧而偏重他方天國龍宮無疑地會落入於死亡與鬼靈永生與天神的窠臼埋沒了佛法的真義人間與天上從三寶出現於人間說佛為創覺的立教者佛住世時生活起居與一般人相彷彿既不是神也不是神的兒子或使者他是真摯的人類導師人間有苦有樂穿的吃的住的都不能隨心適意天上呢吃的是天廚妙供穿的是細滑天衣住的是七寶宮殿比人間的享受是不知好到若干倍人間壽命短天壽極長活到幾百萬年的不算回事人間的身量短而天身有的如須彌山那麼高大光明晃耀有的以為佛與人一樣太不夠圓滿能像天人那樣的廣大莊嚴就好了這一不能把握人間佛教的見解就現出了天上成佛的思想如說色界究竟天離欲成菩提天上成佛是真佛人間成佛是化身這是現實人間的佛陀而天化了佛於色究竟天成佛即大自在天成佛於是佛梵合流印度婆羅門教徒便說人間的釋迦牟尼佛是化身是大自在天的化身這樣的弄得神佛不分使佛教在印度流於神秘迷妄走上了末路所以我們必須立定佛在人間的本教才不會變質而成為重死亡的鬼教或重長生的神教認定了佛在人間那麼說法時也在人間佛法即是佛在人間的教化佛所表現的三業大用以語言為弟子們開示佛的行止舉措對人接物身體一切的活動都是身教是為弟子們示範的尤其是他的大慈悲大智慧意業能感召人類佛的三輪示導即是人間佛法的根本怎能使法寶常在人間流行呢一由出家在家的佛弟子切實的依教奉行而表現於身心中二有經像塔廟等傳世表示出佛法的內容與精神如經典的文字即是用印度文寫的所以經典傳來中國是要有人如鳩摩羅什及玄奘等翻譯這因為是人間的佛法所以編集傳譯流通都有確鑿的史實可考證不像外道的經書胡說是神說的是從天上送下來的因此更顯得佛法在人間為了人間而說如為畜生龍等說鬼夜叉等說天帝釋說那麼用什麼語文編集誰翻譯而成為人語如以人間佛教的眼光來說如龍樹菩薩從雪山老比丘處得大乘經這是很平實的事如說夜叉送來天龍傳來那對於佛典的語文編集翻譯一切都成為問題了佛經的編集開端都載明時間地方聽眾佛法本著重時地人的確實性這才能引人生信所以說說時方人為令人生信故如佛在天上成佛說法那一切都不是你我人類能知也只能適應於天上而無關人間的教化了我們是人需要的是人的佛教應以此抉擇佛教使佛教恢復在人間的本有的光明仁俊記
