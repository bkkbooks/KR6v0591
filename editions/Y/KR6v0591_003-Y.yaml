body:
  text: 從依機設教來說明人間佛教一教乘應機的安立施教宗旨佛法是適應眾生的根機而安立的需要什麼就為他說什麼如大智度論所說的四悉檀即是佛陀應機說法的四大宗旨說法的宗旨雖多但總括起來不出此四一世間悉檀以引起樂欲為宗如對初學而缺乏興味的佛必先使他生歡喜心隨順眾生的不同願欲給他說不同的法如遇到農人可先談些田園的事然後即巧便地引入佛法那聽眾一定是樂意接受的從他性欲所近的引入佛法不使格格不入如佛在印度適應印度民情於受施後也為人說唄讚如印度多信天神佛也就稱天人師為梵天帝釋等說法佛說天神等不可歸依如隨順世俗也不妨供養他等大乘的先以欲鉤牽後令入佛智也只是這樣的巧方便二為人悉檀以生善為宗如不肯布施的就將布施的功德說給他聽為說持戒為說忍辱等功德總之應機說法以使他的善根滋盛為目的這與世間悉檀不同的這不是為了隨順眾生願欲逗發興趣而說法是為了增長善根這不一定是世間所熟識的但必是佛法所認為合於道德的三對治悉檀以制止人類的惡行為宗旨如貪欲重的教他修不淨觀瞋恚重的教他修慈悲觀愚癡重的教他修因緣觀散亂多的教他修數息觀我執重的教他修界分別觀有的能行許多慈善事業卻不能遏止自己的惡行也有人能消極的止惡卻不能起而積極的為善所以生善與息惡在應機施教中成為二大宗旨止惡不但是制止身體與語言的惡行還要淨化內心的煩惱如有人只肯布施不能持戒毀戒是一切罪惡的根源因此為說布施功德是有限的只感得身外的福報學佛最重要的是持戒持戒才能感人天報這就是以持戒對治毀犯的惡行如有人但能制止身語的惡行而煩惱多起即為說學佛不能但限於身口應清淨內心修習禪觀生善與止惡的目的不同而眾生又因時因地而異所以說法是有多種巧方便的有的稱揚讚歎有的又呵斥痛責或讚此斥彼或讚彼斥此總之眾生的根機應該怎樣就要怎樣說法四第一義悉檀這以顯了真義為宗這是佛陀自證的諸法實相不信解這甚深的真義而修行趣證是決不能了脫生死圓成佛道的所以佛依第一義悉檀說是究竟的了義說這才是佛法的心髓龍樹說三悉檀可破可壞第一義悉檀不可壞如世間悉檀要看這時代的情況怎樣這區域的習俗怎樣這人的根性怎樣隨順世俗的逗機方便千變萬化不拘一端如時代不同區域不同對機不同那就對於甲的世間悉檀對於乙可能成為大障礙不成方便這那裡可以拘執世間悉檀是可破壞的但在時地人的適應時是極好的方便說到增長善根對治惡行原則雖古今一致的佛稱道為古仙人之道也是有著永久性的但實施的方法也會因時因地因人而不同古代的別處的道德在此時此地看來也許認為不完善了然諸惡莫作眾善奉行的原則是不會改變的依佛所說的第一義悉檀那才是常遍的大道照著去修證才能出離世間的迷惑悟證徹底圓滿的真理佛法如醫師給藥病人吃一樣隨病人的情勢變化給他吃的藥也就不同所以隨著時代環境根機的不同所說的法也應有差別如佛法在印度就要適應印度的各種情況佛法傳到中國日本南洋等國家都因適合這些國家的不同的情況而多少不同佛法施教的宗旨有此四悉檀不同弘揚佛法而要得到機教相契的效果就得深切地注意四悉檀的運用才行把握方便前三悉檀與究竟的差別才行尤其是不能誤解方便為究竟從根本上破壞了佛法的綱宗教乘類別隨眾生根機的差別故教法也隨而有別乘有運載的意思人類依此教法修行即可由此而至彼如乘車一樣所以稱佛法為乘人能依此教法修行即可由人而天或由凡而聖這一向有五乘三乘一乘的類別五乘是人乘天乘聲聞乘緣覺乘菩薩乘或佛乘乘必有三事一發心二目的三方法五乘可略為三類一人天乘為一類人天乘發什麼心呢叫增進或作勝心在六道中生死輪迴受苦不已但比較說人與天要好得多所以學佛法的動機有些人總是希望現在人間及來世生天生人比目前環境要好一點現在的身體不圓滿智識不深生活不富裕學法的目的希求現生將來身體智識生活都能達到豐滿安樂此種心理也是世間常人所共有的發這樣的心因此而學佛這不過人天乘的發心現世在人間希冀現生人間樂未來世得生人間天上樂這是人天法的目的以人間正行布施持戒等為方法如不能循人天的正道損人利己殺盜邪淫妄語那是要墮落的如存此增進心那無論學什麼高深佛法結果也不出人天道中二聲聞緣覺乘為一類二乘的根性相同僅稍有差別他們的發心與人天乘不同他們深刻地感覺到三界生死是太苦了就是生在人天道中到頭來也還是一切皆苦所以不追求現生樂與後生樂於世間一切生起無常故苦的感悟發出離心想息除三界的生死以證得涅槃為目的修行的方法也重於調治自心的煩惱如但存此出離心即使修行大乘法也還是要退證小果的三菩薩乘菩薩發心又與二乘不同他也見到三界的生死是太苦可是他又見到三界眾生與自身一樣的受苦於是發大悲心為本的菩提心對有情所受的苦迫生起同情心憐愍心以自利利他的方法為修行以度生成佛為目的佛法雖無量無邊歸納起來不出此五乘法學佛法不出此五乘法而五乘中以菩薩乘為高勝如學佛而離開了此五乘的發心與修行就是虛偽的學佛不能免離惡道的苦難再說三乘與一乘人天乘本不是佛法的宗要佛法的重心是出世間的人天乘法也不但是佛法的像中國的儒道西方的耶教與中東的回教動機與行為大都是契合人天乘法的就是世間的政治學術也很多是符合人天法的所以人天乘法是共世間的顯不出佛法的特殊佛法的特質是出世法即是三乘法三乘即聲聞乘緣覺乘菩薩乘三乘的差別上面已約略說到一乘即一大乘三乘中也有大乘與一乘有什麼差異呢如說三乘同入無餘涅槃聲聞緣覺的無學果是究竟的這即是三乘說如說不但菩薩決定成佛聲聞與緣覺將來一定要回心向大同歸於唯一大路成佛這即是一乘說一開始就發菩提心的叫直往大乘先修二乘再回心向大乘叫迴入大乘從學菩薩行成如來果說大乘與一乘並無實質的差別佛法中一向有三乘與一乘的諍論根本在二乘的是否究竟這如聲聞乘小乘緣覺乘一佛乘菩薩乘大乘表中二條短線如二乘另一條長線如一大乘在經說二乘究竟時菩薩乘與二乘相對稱為大乘但二乘是終要轉入大乘成佛的唯大無小所以大乘即成為一乘三乘究竟本是方便說的在證入法性平等中同歸一乘為必然的結論所以般若經說阿羅漢等聖者是一定會信受大乘般若的法華經等說如聲聞而不信一大乘是增上慢人自以為是阿羅漢而不是真阿羅漢通約三乘來說二乘是出世間法菩薩乘也是出世法但特別稱讚為出世上上法因為菩薩不但求自己成佛也願一切有情得度為大智大悲大願大行的合一對人天乘說大乘是出世的也是入世的是世間法與出世間法的統一到達更高的完成教史遞演佛法的五乘三乘如從同歸一乘佛道的立場來說佛法分為三類實只是大乘的三類從印度佛教史的演變上看這是確實有此三類的此三類虛大師在我怎樣判攝一切佛法中有簡要的說明大師的見解是唯一大乘一切有情皆能成佛從此去觀察一佛滅後初五百年即正法時代以聲聞道為中心而即是以聲聞行果趣入大乘那時候的學佛者多分是先學聲聞乘修行證果然後再回入大乘像法華經的舍利弗四大聲聞有學無學的比丘比丘尼等都回向大乘發成佛度生的大願這種風氣五百年後還有嗣續的印度佛教史明顯的記載著他的事情如龍樹提婆無著世親等雖不一定先證聲聞大概先於聲聞學派中出家受戒或先小後大或內修菩薩行而外現聲聞僧相出家菩薩以屬於這一類的為多依二乘行果以向大乘的菩薩都是重智的二乘一向重智悲心不夠精勤禪觀切求悟證先斷煩惱了生死再回心學佛即是智增上菩薩因為他本重智慧久久成為習慣了雖然回心向大也還是悲心不深在菩薩道中進程不快二依大師說即像法的時代一千年印度學佛法的多分依天乘行果而進趣大乘的這些可稱為天菩薩的不像二乘的先證小果而是對於婆羅門教的天法有基礎的根機習慣於天法的以天法為方便而融攝於佛法所以觀念佛菩薩等於念天或即稱之為修天處處以佛化的天國為理想的境地例如密宗的本尊都是夜叉羅剎像或梵像表示了天神的姿態這時二乘在佛法中地位極低三依大師說一千五百年後到了末法時代是依人乘行而趣入菩薩道證聲聞果的是等於沒有了連南傳佛法的聲聞乘佛教國也重於教育慈善等人事在山林修聲聞行會被時代譏刺為逃避自私了專修天乘菩薩行的著重於飲食男女要被時代責斥為迷信荒謬了依現在的情況看唯有依人乘行學菩薩法即依人類的正常道德為基礎發心直趣大乘才是應機的而且是可以宏通的救世的佛法大師的分類法由人菩薩而天菩薩由天菩薩而二乘菩薩是很有意義的二乘菩薩重智天菩薩重信淨土密宗都是天菩薩行都重信仰人菩薩重慈悲對一切人類起同情心而施設種種利濟的事業大智度論曾說到菩薩或重智或重悲或重於信精進雖真正的菩薩信進悲智是應該具足的但依趣入大乘說確有這三者的不同在印度一千五百年的佛教史中也可看出三期的演變試畫為曼荼拏以說明機教的差別鬼神擁護在家施戒出家解脫初期佛教以出家的聲聞僧為中心釋迦佛自身舍利弗目犍連大迦葉們都是現出家相的出家有什麼特殊風格可稱為自在解脫如穿衣吃飯住處都不怎麼講究隨緣度日少事少業減除煩惱林野風致現出清淨自在的精神初期佛教以此出家的解脫為中心此外有在家弟子如舍衛國的給孤獨長者摩竭陀國的頻婆娑羅王憍薩羅國的波斯匿王以及文臣武將農工商賈男女老幼這些人都是現在家一般人的常相重布施持戒盡力於對國對家對人應作的正事他們也修定但重於慈定也能了生死但不處於住持佛教的地位而是外圍的信眾最外層的是鬼神從淨居天到餓鬼畜生阿含經與毘尼中每有天人阿修羅乾闥婆夜叉等偶爾也參預法會少分是守護佛教以免惡性的鬼神來搗亂在佛教中處於不關重要的地位他們有二種特徵一貪求對世間的五欲貪心最極強烈二忿怒在什麼時候最容易引發瞋恚佛對於這些總是勸他們不為自己的貪欲暴劣的忿怒而害人害世天人在家聲聞出家三類佛教的重心極為明確此初期的佛教鬼神僅是世間悉檀不加尊重也不否定神教的色彩極淺迷信的方便極少內重禪慧外重人事初期以出家解脫為中心的佛教是如此出家解脫在家慈悲天神護持佛滅後五百年的佛教情況即大乘教興起的時代也約有五百年佛教的中心是演變了處於佛教中心的佛與弟子都現為在家相如文殊觀音普賢維摩詰善財常啼等菩薩可說都是在家的大乘歸極的佛陀為毘盧遮那佛也是有髮髻戴頭冠的身上瓔珞莊嚴的在家相這以在家為中心的佛菩薩表現了大悲大智大行大願的特徵重六波羅蜜四攝等法門當時出家解脫相的聲聞僧連釋迦佛在內被移到右邊去不再代表佛法的重心而看作適應一分根性的方便了聲聞乘所說的三寶觀不是佛法的根本究竟而根本的是以發菩提心度生成佛為宗的一大乘二乘雖然被推移到方便的外圍但並沒有拒絕他們是處在旁聽的地位不過迦葉等聲聞弟子時常在怨恨自己輕視自己為什麼不知道修菩薩以成佛末了才決定二乘都要回心入大乘的如法華經所說天鬼畜不遠處於外圍地位抬高了處在左邊的地位舉例說傳說佛在世時有護法神金剛力士本是夜叉而已在大乘佛教中就尊稱為菩薩化身海龍王緊那羅王犍闥婆王阿修羅王稱為菩薩的也不少連魔王也有不可思議大菩薩這些天菩薩在大乘法會中助佛揚化也還是本著悲智行願的精神助佛說六波羅蜜四攝等大乘法不過增加一些神的特徵一分低下的天神大抵是熱心的護法者這一期的佛教從出家移入在家從人而移向天為高級的天與在家人的趣入佛法也是適應於崇奉天神的在家婆羅門而發揚起來入世利生充滿了本生談中的菩薩精神但同時天的傾向發達起來天神的地位也顯著起來所以這是佛教的人間化也是天化印度大乘佛教的隆盛是包含這兩個內容也影響了後來發展的傾向這不如初期的樸素重於集團生活而多少曲應世間俗習而傾向於唯心及個人的偉大出家解脫在家慈悲神天貪忿第三期的佛教一切情況與初期佛教相比真可說本末倒置處於中臺的佛菩薩相多分是現的夜叉羅剎相奇形怪狀使人見了驚慌有的是頭上安頭手多武器多項間或懸著一顆顆貫穿起來的骷髏頭腳下或踏著兇惡相的鬼神而且在極度兇惡應該說忿怒的情況下又男女扭成一堆這稱為具貪相那些現在家慈和的菩薩又移到外圍去了至於現出家解脫相的在最外圍簡直是毫無地位這種境況從密宗曼荼拏中可以完全看出由於天神特別是欲界的低級的為佛教中心所以一切神教的儀式修法應有盡有的化為佛法方便這即是虛大師稱為以天乘行果而趣向佛乘的由此可見初期佛教以聲聞乘為中心中期以人天菩薩為中心後期以天菩薩為中心中期的大乘佛教一方面傾向天菩薩同時又傾向人菩薩人菩薩法在印度的中期佛教有著充分的表現為了適應於印度神化極深的環境佛教就更攝取婆羅門教的方便發展到天菩薩去現在所提倡的人間佛教我們是人應以人為中心應攝取印度初中二期佛教的人菩薩的慈悲與智慧特應從悲起智而不取後期佛教的天菩薩法傳到中國的佛法唐代也還是印度後期佛教的開始所以還不像傳於西藏的完全天化中國所傳的佛教天神化本來不深也許聲聞的傾向要濃厚些提倡純粹的人菩薩法即由人發菩薩心以悲智普濟一切有情直趣無上正等菩提應著重中期佛教而脫落天化的傾向二諸乘應機的分析人乘及基於人乘的天乘佛法是適應眾生根機的從對什麼機說什麼法去分別就明顯地看出那些是人乘的特法天乘的特法二乘的特法菩薩乘的特法佛法興於印度當然要適應印度當時的文化以及印度人的特性佛法為了適應某一時代某一區域的根機佛法就有時代性與區域性了佛法與古代印度文化有重要的關係必須了解這點才能不受他的拘束不以適應印度古代文明的契機法誤解為十方三世常住的真理要求未來世仍得人身名人乘法以人為可貴的盡人的本分作人類應作的正事有此人身的正行將來定能獲生人間因果等流毫無差失生天也如此現生修學天乘法來生一定得生天報行人法得人報行天法得天報這是無可疑惑的釋尊出世前印度的初期文化人乘法天乘法是沒有分別的古人心裡所縈迴的問題主要在人間如何能得到快樂這是人類最基本的欲求由個人到宗族以及國家都是如此他們時刻地在想獲得人生快樂並希望這快樂能長久持續下去這在佛法裡叫做現法樂然由於現生樂是短暫的是隨即消逝了的況且人間的缺陷很多如自然界的災害風暴雨淹山崩地震人為的禍患刀兵斫殺爭城奪地因此求來生為人與更求上生天國的思想也油然而起此種思想古代的一切宗教莫不如此這在佛法中名為後法樂這兩種宗教思想一求人間現法樂一求未來人天的後法樂近於五乘中的人天乘這不是說人應如此修天應如此修是說人如此行即得人身得天身這二者都從人身起行從人生正行發展到生天的行法後來印度宗教又引出永生不死的思想如基督教的天國永生一樣當時印度人以為天中的大部分還是要死的所以探究怎樣才能究竟不死以為唯有最高神梵是宇宙的本源是永生不死的常住不變的人能復歸於梵即得恒常的妙樂這種思想的底裡本含有解脫的意義由生而死死而又生這本是個大難題這應該想法徹底解決佛教是超過了現法樂與後法樂而探求究竟解脫樂的這在一般的宗教皆以生梵天或梵我合一為究竟樂這三種企求歸納世界人類的思想不外乎如此釋尊出世時究竟解脫的思想已瀰漫全印度在人天中傾向於天國以為天比人間好這因為不但天為後法樂的地方他們相信生梵天即是究竟解脫處獲得人間福樂與來生得生人天的方法印度宗教的主要方法有六祭祀咒術德行苦行遁世瑜伽一祭祀中國人重視祭祖宗或祭土地神等於古代宗教的祭祀重要性大抵已不能深切了解古代的宗教情緒極濃祭祀是唯一的大事每天每月每年都有規定的祭祀時間如希伯來的猶太教印度的婆羅門教中國的神教即後代儒家與道家共的宗教都是這樣逢男女婚喪農作收成的時候都要舉行隆重的祭祀最高的是祭天上帝等但中國由帝王包辦久之淡忘了不再像猶太教等傾向於一神祭祀法古代的印度猶太教波斯教等也如此一家設一火一年到頭家裡是不熄火祭的祭物大抵與人間的食物相同如新生的瓜果米穀乳酪牛羊等人類生活所需的東西投到火裡作祭品以為這樣的祭祀這些被火燒的飲食氣味升到天上天神即受他們的供養天神生歡喜心使你種的五穀養的牛羊都得茂盛繁殖身心獲得康樂未來能得生人間天上後期佛教密宗的護摩即沿婆羅門教的火祭而來但還有複雜的祭祀須請祭師代行設三火二咒術不但是印度古代人大都有此信仰如中國的道教也有咒術持咒時身體也有表示的動作還有象徵的物品祭祀的咒語含義在可解不可解之間古人相信咒語有很大的力量可為人類與天或鬼神間感通的工具印度的咒術有的為附於祭祀的用語動機還光明正大但另有獨立的咒術其間即有存心不正利用低級鬼神的魔力作損人利己的邪術三德行如人遵守祖宗的成法奉行家庭間的義務或為國家作戰等凡是看作人類應行的正法都可為來生人天的因同時由於祭禮對祭師要發心供養布施的風氣盛起來祭師對於祭主信徒也時常警誡他們要誠敬老實或奉行特定的戒條否則祭祀與持咒就會無效這裡面也含有道德的正行人生正行中如不殺不盜不邪淫不妄語等古來也已非常重視的了上面三類大致為求現法樂與後法樂的行法祭祀通究竟樂四苦行有禁欲的意義如物欲的享受極力節制又含有努力的意思上三種是一般人所能做的但苦行只是少數人的特行是宗教中最精進的人苦行是戰勝物欲的精神如甘地也是一苦行者他終身是那樣的精苦印度民族的獨立是受了他最大的鼓舞發生難以相信的感召力但有偏於戕賊身體的苦行如常立不食臥荊棘中等即是無意義的了佛在世時摩竭陀與央伽國修苦行的極多受到世人非常的崇敬這些苦行者不是人乘法而是傾向於生天及解脫的五遁世近於中國的隱逸有的覺得祭祀咒術等是形式的為家庭俗事所纏的真正的修持要擺脫形式的宗教到深山叢林裡去專修釋尊未出家前這風氣就已盛行稱為沙門有的到五六十歲完成了家庭的義務再過遁世生活有的少年即出家六瑜伽隱遁者大抵是苦行者又是修持瑜伽的瑜伽大抵與佛教的禪定相近從物欲的克制呼吸的調御精神的集中以達超越的自在境地這身心體驗的瑜伽即是生天或了脫生死的究竟法門上面所說的六項方法祭祀咒術是一般的求生人天的德行通於做人的方法以及進修的根本道德苦行隱遁瑜伽是生天的而且是生天得解脫的釋尊出生於印度人間應機立教對於這些是怎樣的攝取或破斥呢祭祀咒術德行苦行瑜伽遁世人乘法天乘法佛所安立的人天乘法將祭祀除開如婆羅門繁重的祭祀佛法中是不要的這如猶太教本重祭祀被耶穌革除了一樣談到咒術更是絕對否定的佛法對於印度的祭祀天神如屠殺牛羊毒害生命耗費財物勞動大眾佛以為這只有增加罪愆毫無益處在家佛弟子如不鋪張簡單地用點香花果穀來供天也不阻止他這是攝化眾生的方便屬於世間悉檀從這可看出佛教的寬容精神不像基督教回教等的排斥異己的作風東方的精神是寬容的但佛法每因寬容而引出流弊這是佛徒不曾能把握佛陀創教的精神還有祭祀祖宗印度中國都重視他有人問佛祭祀祖先有沒有用佛答如父母死了墮在餓鬼道中祭祀他可使他暫免飢餓的苦迫若生到人間或天上畜生或地獄就用不著祭祀因為如人及畜生都是不依祭祀而生活的佛這樣回答真耐人尋味但聽者又問如父母不墮在餓鬼中即不要祭祀嗎佛又答也可以因為過去生中的父母不能說沒有墮在餓鬼中的佛不反對祭祖一為使餓鬼得食二免與印度的習俗發生嚴重的糾紛要生人天要具足人天的正行有了人天正行現法得樂未來也得樂果相反的如殺生偷盜等邪行未來墮惡道受苦現法也受種種苦果人天乘的德行約有三種施戒定稱為世間三福業事施是犧牲自己所有的不貪戀慳吝而肯拿來利他持戒是制伏煩惱與一切人建立正常的關係使自己的行為不作損人的邪行定是內心的淨伏煩惱的部分斷除這裡是著重禪定中的慈悲等持為利他的廣大同情心人乘的方法有二施與戒天乘的方法更修禪定生天必要修定如修得四禪將來能生色界四禪天遁世是天乘法生欲界天法是不一定遁世的精修瑜伽為生天的主要法門苦行佛教是取他的精意通於人天法主張少欲知足精進勇猛不過苦不縱欲取著中道的態度總之印度宗教以為生天即得解脫的方法遁世苦行瑜伽佛是多少修正了他以為這不過生天法而還不能得究竟解脫布施與持戒一般的說是人乘的德行進一步的也可以生到欲界天也要多少習定要想生到色無色界非修禪不可所以人乘法以施戒為本而重在戒善無戒即墮落鬼畜趣天乘法以戒定為主而重在禪定適應印度當時的根機人乘法即為家本位的德行從佛法去了解他這實是適應人間所最急需的不過限於時機佛教最高深圓滿的真義還不曾充分在人乘法中說明而已佛法的人乘法與中國儒家的思想相近基於人天的聲聞乘佛為適應當時印度的民情根性立人天乘法又依此而進立聲聞法聲聞本為當時佛弟子的通稱從佛聽受正法依法修行得解脫都叫做聲聞後來演變為一部分佛弟子的專稱要說明基於人天的聲聞乘法還得從前所說的六種說起德行苦行隱遁瑜伽戒定慧印度一般在家的人天法與究竟解脫法依釋尊看來人天法中也有種種錯誤尤其是外道的解脫法都是虛偽的有著根本的錯謬佛所安立的聲