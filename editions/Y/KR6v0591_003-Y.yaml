工作除學習戒定慧外每天托鉢化食到城市或村莊裡去隨時為信佛的或未信佛的宣說佛法這樣的遊化弘法使佛法深入民間以佛法去淨化人間人間比丘出家而過著大眾生活與社會保持聯繫負起教化的責任釋尊也就是過這種生活的釋尊的生活一切隨緣他常受百味食的供養但化不到食也便空著鉢回來有人將洗鍋沈澱下來的飯糍恭敬地拿來施佛佛也照常的歡喜吃下他也有時樹下坐在給孤獨園鹿子母講堂等即安住於高樓大廈中有時穿糞掃衣但價值千金的金縷衣佛也照樣的受著如中阿含經柔軟經說佛的隨緣受用一般人都稱讚佛為少欲知足這一類型的人間比丘為不流於縱欲及苦行的極端者如大眾共住生活隨緣遊行教化近於一般的人間正行而過著出家的生活男女不嫁澹泊禁欲又近於天行聲聞的在家弟子是基於人乘的無事比丘是著重天行的人間比丘即綜合這二者而取折衷的立場當時的印度正是隱遁的苦行的時代釋尊雖適應這一特殊的情形有出家的制度但聲聞解脫道的主流是人間比丘顯然的是基於人乘而重於持戒及智慧的基於人天聲聞的菩薩乘大乘菩薩法也是適應印度眾生的根機而施設的真理雖遍於三世十方但在時代性的適應上說佛法菩薩法也不能不適應印度當時的根機佛說人天乘法以融攝印度一般的正常行又適應一分隱遁的瑜伽者施設出世的聲聞法菩薩法是將此世出世間法統一起來成為高上而圓滿的佛法大乘法的發揚光大是佛滅後五百年的時代初期佛教聲聞是佛弟子的總稱不分大小乘但印度佛教中起初也是有菩薩的一釋迦菩薩二彌勒菩薩釋迦未成佛前是現菩薩身行菩薩道的彌勒菩薩發菩提心現在尚未成佛照經上說南印度有十六個青年來見佛發心從佛修學其中有名叫彌勒的發願成佛佛為他授當來下生成佛的記別釋迦菩薩彌勒菩薩與當時聲聞僧的作風相彷彿同樣的現出家相持戒乞食然菩薩有深邃的智慧廣度眾生的悲願而聲聞的智慧淺悲願薄從佛聞法急於證涅槃果大有不同如彌勒菩薩的不斷煩惱不修禪定明顯的顯出菩薩乘的特色如從佛的本生本行去看就更顯著了本行釋迦佛的傳記詳細說明釋尊的不忍眾生殘殺而發心怎樣的慈悲精進說法度眾生等老病時也還是不休不息這與一分的聲聞弟子相比急於證果或者不願說法有的寧可挨餓不願去人間乞食從佛的智慧慈悲精進去看與聲聞的精神是怎樣的不同菩薩成佛要經三大阿僧祇劫修行往昔因中的修行故事即名為本生談依本生所說菩薩可分二類一在人道中菩薩每生於無佛法的時代或為國王大臣長者外道或經商做工打獵或為航海家技術師等大抵以在家身作在家事而為人類眾生謀福利關於行菩薩道的重要故事約有五百則菩薩行是將自己的一切頭目腦髓國城象馬隨所求而能一切施予的其中有這樣的故事有人染了癩病醫生說要用人血與骨髓才治得好而且那人是要從來沒有瞋恚的那時的釋迦菩薩為國王的王子病人來向他乞求他慈悲心深隨即將自身的血髓施給他菩薩為了實行救人的宏願自身的一切無不可以施捨菩薩求法的心也是熱切精誠那怕剝皮為紙刺血為墨析骨為筆也歡喜而甘心去作為了求法就是捨身為奴也不感到為難朝聞道夕死可矣在菩薩道充分表示了這偉大的精神持戒菩薩把戒看得比身命更重要不得已寧捨身命也不肯毀戒忍辱精進禪定智慧沒有不勇於修習大乘法的六波羅蜜十波羅蜜就是從本生談的菩薩行歸納他的性質而得來這種難行能行難忍能忍的堅毅願力表現出大乘入世度生的善巧釋尊成道以前就是這樣做的二在餘趣中主要在畜類中本生談說菩薩或為鹿王龍王象王孔雀王小鳥猴子等菩薩怎麼會墮在畜類呢古代的傳說鳥獸都與人一樣的會說話從他們的行動中常表示出極崇高的德行本生談中菩薩的示現旁生即是從旁生的故事中揭發出菩薩應有的精神例如一隻小鳥見到山上樹林著了火牠怕那些鳥獸被燒死飛到水邊用翅膀漬水飛回洒在樹林上一次又一次的不休不息天帝釋見了怪小鳥的太笨徒然辛苦無濟於事小鳥回答道能不能做到是一回事總要這樣盡力做應該盡可能的援救出山林中的親戚朋友這故事中的小鳥即釋迦佛的前身這樣精進的捨己為人的大悲願力真是值得人類稱揚與效法這其中充滿了深刻的教訓理解他的真義不論鹿象也好龍蛇也好菩薩的悲願大行人類是應該這樣去效法的如作為事實去解說這許多鳥獸是菩薩示現的是菩薩慈悲度生不惜去受苦的榜樣本生談所說的菩薩道將菩薩為眾生為佛法的精神和盤托出天台家稱之為藏教菩薩本生所載的菩薩行聲聞乘者都是相信的這可見人身的菩薩僅少數出家大都是現在家身的雖有隨類現生的但現天身地獄身是少見的人與象鹿等旁生其實都是人間所親切見聞到的在古人心境中人與旁生是非常親切的菩薩與一般的差別是從他的精神和行為而表現出來他未成佛以前過去生中這樣現在和未來也還是這樣難行能行難忍能忍佛就是修這樣的功德圓滿而成的古典本生談中的菩薩一不但在人類鳥獸中也受生二菩薩每出在無佛的時代或為國王大臣長者居士外道等菩薩是傑出的賢者是極難得的沒有多數的結合成團體像聲聞僧那樣組成六和僧團因為本生談中的菩薩都是個人的所以興起的大乘佛教也始終沒有菩薩的集團菩薩既現身鹿王龍王象王等所以推論到菩薩無處不在加深了混俗和光隨類拔苦的信仰而現實人間的菩薩大行反而被輕視為事六度菩薩這二點對印度大乘佛教的影響極為深刻適應印度眾生的根機佛教極力發揚人間菩薩行由於個人的通於異類的在大乘思想的發展中拘泥形跡的大乘者逐漸向唯心的神秘的天乘菩薩行而前進佛滅後四五百年大乘佛教勃興起來華嚴最初三七日法華涅槃末後共八年傳說中的大乘法經典佛在世就說好了的佛法起初都是佛弟子口口相傳大乘經集出流通的年代並不算早大乘經常載著佛滅四百餘年或後五百年此經始流通人世這是大乘法發揚時代的明證華嚴經般若經大集經等大乘經陸續出世性質也多少別異但大體說大乘法不是從出家比丘的基礎而發揚起來的聲聞行者如上說有三類但大乘法的昌盛與在家佛弟子有密切關係這有事例可證的大乘經說釋迦佛現出家相是方便為了適應當時印度外道沙門團的示現佛的真身現在家相有髮戴天冠佩瓔珞如毘盧遮那就是這樣論到菩薩如文殊普賢觀音善財維摩等大多是在家的出家菩薩是很少見的大乘法不一定是釋迦佛說的而且多數是菩薩說的如文殊對於大乘實相即為菩薩說了不少經典華嚴經幾乎全部是金剛藏菩薩與功德林菩薩等說的維摩經般若經也多半為佛弟子說大乘經中佛是處於印證者的地位這表示了大乘法是以在家佛弟子為中心而宏通起來因為一般在家佛弟子崇仰佛的出世法而又處於世間的立場佛法普遍的傳播於民間由城鎮而鄉村由鄉村而僻野人間受到佛法的熏陶即自然而然的有以在家佛子為中心的重視人乘正行德行讚仰出世而又積極地入世度生的佛法發揚廣大起來舉例說一華嚴經中的入法界品善財童子菩薩是精進求法的模範所參學的菩薩初三位代表三寶是出家的以後有的是國王法官數學家航海家工程師外道等學菩薩行就是追從這一類的菩薩去參學二維摩經方便品所說維摩弘揚大乘法也以在家為主要對象婆羅門剎帝利或其他階級的人應什麼機說什麼法他去謁見國王就誘導國王以合理的政治進學校就教以佛化的教育甚至酒肆淫舍也時常聽到他的法音這二位在家菩薩一是修學的一是弘揚的都是以一切人類的正行融化於佛法而使他更合理化這一切的人間正行即是菩薩的廣大正行這不像出家聲聞僧的偏於遁世禪定而不重視慈悲菩薩法是適應印度的在家弟子以人乘正行為基礎而興起廣大從大乘修行的法門內容而說也可以明顯的看出來如布施持戒禪定智慧忍辱精進慈悲方便人天法聲聞法菩薩法世間法出世法入世而向出世出世而能入世出世的聲聞法不重布施世間的人天法不論勝義智慧菩薩法以六波羅蜜為根本將世出世法綜合起來到達最高的圓滿境地著重於救世所以重行肯定布施的價值該攝到菩薩道中來所開示的本生談布施都從大悲心來布施的真義是犧牲自身的一切財物時間精神等幫助人或解決人的一切困難大乘菩薩是入世的入世即不能不廣行布施又因為菩薩是不忘出世的所以也重視智慧以智慧來攝導善行以布施等來助成智慧出世菩薩是這樣的出世而入世入世而又出世的忍辱與精進聲聞乘中也有但大乘為了自利利他對忍辱與精進更為重要內涵也深廣得多慈悲與方便是大乘菩薩的特質菩薩度生以此二為工具無論在任何時代任何環境菩薩道必以此為要務大悲是通過智慧的悲心與仁愛等相近而不同方便是為了適應從慈悲而引出的智慧妙用即善巧化度的方便從這分析去了解菩薩法是以人乘正行為基在出世與入世的統一中從世間而到達究竟的出世佛法在印度普遍發揚以後在家學佛的如風起雲湧一般菩薩法即必然的興盛起來然而菩薩法的發揚更含有天行的一邊印度的一般民間重視世間的積極利他但他們一向在神教的熏陶下神教天行的觀念也極為普遍所以佛法普及到一般民間又為了避免與舊有的神教作無謂的衝突人間為本的大乘法日見發展的過程中也就多少融攝了神教天行也就逐漸發展起來我曾說過出家為主的聲聞行是適應印度苦行的沙門根機像三迦葉大迦葉等他們都是從外道的根機而轉化過來在家為主的菩薩法是適應印度在家眾根性如婆羅門等適應在家根性為主的菩薩一著重人事二傾向天事神化大乘經中的菩薩如維摩善財等十六大菩薩中的賢護菩薩都是此界人間的菩薩而他方世界的菩薩釋尊說法時也來隨喜聽法此土他方的菩薩所現的人身也可以說是高級的天身和人的樣子一樣而身相要高大莊嚴些印度婆羅門的神教重祭祀咒術苦行大乘佛教的發揚有著天乘的融攝所以這三種也融攝進來佛法中有類似祭祀的即供養供養與祭祀本是不同的佛在世在家信眾的供養如安居期了以衣服或飲食等來布施結緣或平常以衣食藥品等供僧或者修福舍修伽藍供養佛與僧眾出家弟子對於佛及師長恭敬承事依法修證都稱為供養供養本是極平實的與祭祀無關但佛滅後即不同了在家人作福供佛佛不在世即立佛像為供養的對象用香花燈塗果樂來供佛這樣的供養與佛在世受供不同而有了祭祀的形式知道佛法的人知道這不過表示對於三寶的信敬而已傳說佛往別處去在家的佛弟子思念他才有優闐王刻旃檀佛像佛滅後百餘年阿育王造八萬四千塔供奉佛的舍利這種舍利塔的性質與供佛像一樣可見當時的佛像還不普遍自此而後佛像漸漸多起來佛弟子多留意於塔廟的莊嚴了這些事聲聞法中即逐漸發達到大乘佛教興起更加著重起來塔廟中佛像莊嚴除上說的供品而外還掛著幢旛寶蓋等供養具佛弟子在佛前禮拜唱讚於佛前懺悔以宗教的儀式為修行的方法這些與大乘法相結合而開拓了佛教的新時代法華經說正直捨方便為說無上道更以異方便助顯第一義這意思是說釋迦佛現出家相而化厭離的聲聞根性說二乘究竟是方便門這樣的方便現在要捨除顯出大乘的真義但不能沒有方便要用特殊的方便法門大乘新起的異方便據經上說即是修塔廟供莊嚴具禮佛念佛讚佛等如說若人散亂心入於塔廟中一稱南無佛皆共成佛道大乘的異方便是以佛為中心而修禮拜供養懺悔迴向勸請這即是十住毘婆沙論的易行道入法界品的十大行願大乘重於人間的積極救濟又發展為適應一般民間的宗教情緒以此熏習成深刻純正的信仰從此引他發大悲心修菩薩行先用方便善巧教他培福德長信心充滿了莊嚴喜樂的情緒不像聲聞乘的重智慧淡泊精苦佛法本來是生天及解脫自力不由他等到大乘法發展後他力加持的思想才逐漸發達咒術是婆羅門天法中所重視的依龍樹說大乘法中與聲聞乘不同的即是陀羅尼陀羅尼與咒術有關初期的大乘經中有四十二字母即文字陀羅尼華嚴經般若經大集經裡都說到他修文字陀羅尼的不但持誦四十二字也可念其中的五字或十六字或某一字八大陀羅尼是大乘法中常見的大乘法的文字陀羅尼也是適應婆羅門根性的婆羅門修證求解脫也說觀念於梵梵是一切生滅相不可說而為一切的本體同時口念唵字這樣的心想口念如修成就了就可見真我得解脫大乘法的四十二字以阿字為本阿是不生不滅義這即是一切法的本性唱誦每字都與阿相應即觀一切入不生不滅的實性華嚴經般若經中的文字陀羅尼觀行成就是可以證入無生法忍的這是觀音聲色相而契入法性的雖還沒有說到其他但與持咒的精神一致後來帝釋羅剎夜叉等都說咒護法逐漸的一舉一動都有咒有印發展為密宗的修持法大乘以方便善巧融攝咒術以佛法淨化它由於佛弟子的久而忘本佛教化神教結果反多少被神教化了初期聲聞法最純樸大乘重人間救濟而神化的內容反多了這由於一當時發心學大乘法的多是一般平民曾深受印度教的影響二婆羅門的天法當時又重新抬頭演成現今所稱的印度教多少傾向於天乘的大乘法應時應機發展出異樣的光芒而反障蔽了大乘的真精神苦行的思想聲聞教中一分遁世者如十二頭陀等還不失為精嚴刻苦的正道大乘法中無意義的苦行又多少滲雜進來如燒臂燃香捨身等印度神教的三大特徵祭祀咒術苦行大乘中都顯著融攝著大乘發揚時代雖也有出家聲聞但在大乘經中不是教化的主要根機大乘經中大抵彈斥出家的聲聞僧如維摩經天女散花落到菩薩身上就掉下落到舍利弗身上就粘著維摩詰長者即說舍利弗的習氣沒有斷盡大乘經中呵責出家的聲聞行者為焦芽敗種為癡犬而聲聞行者如大迦葉等也表示自己不是不應該取證羅漢果弄得現在不能修菩薩行或是說聲聞行者也曾發過菩薩心只是忘記了如法華經即以此而認為聲聞的學無學人都要迴小向大趨向佛道總之在大乘佛法的發揚中聲聞不是主要的反而是依於人菩薩行天菩薩行而附帶的發達起來等到大乘隆盛了才發展回小向大依聲聞行果而趨入佛果即人成佛為佛教的真義從上來的應機施教可以了解人法天法以及聲聞菩薩法的特質而大乘法的發揚是從適應於隱遁的天行的聲聞行而轉向於入世的人行的菩薩道雖然菩薩道的發展由於適應一般的民間而通俗化攝受一分祭祀咒術苦行的天行或加上隱遁瑜伽發展為後期佛教的依天乘行果而向佛道但大乘初起的真義確是為了適應人類著重人行發展為不礙人間正行的解脫佛法是怎樣的重在人間對於天法佛又是怎樣的淨化他佛法特色的聲聞行與菩薩行雖一攝人行的根機一攝天行的根機而佛化了的人行天行都不是一般神教那樣施戒禪慧都不離於人類的道德淨化身心的體驗從佛出人間的意境中一重人間一重佛道這我們稱為人間佛教的不是神教者的人間行也不是佛法中的人乘行是以人間正行而直達菩薩道行菩薩而不礙人間正行的佛教從來所說的即世間而出世出世而不礙世間今即稱為即人而成佛成佛而不礙為人成佛即人的人性的淨化與進展即人格的最高完成必須確定人間佛教決非同於世間的慈善事業是從究竟的佛乘中來看我們人類應怎樣的從人而向於佛道仁俊記
