body:
  text: 人間佛教要略一論題核心人菩薩佛從經論去研究知道人間佛教不但是適應時代的而且還是契合於佛法真理的從人而學習菩薩行由菩薩行修學圓滿而成佛人間佛教為古代佛教所本有的現在不過將他的重要理論綜合的抽繹出來所以不是創新而是將固有的刮垢磨光佛法只可説發見不像世間學術的能有所發明因為佛已圓滿證得一切諸法的實相唯佛是創覺的唯一大師佛弟子只是依之奉行溫故知新而已人間佛教是整個佛法的重心關涉到一切聖教這一論題的核心就是人菩薩佛從人而發心學菩薩行由學菩薩行而成佛佛是我們所趨向的目標學佛要從學菩薩行開始菩薩道修學圓滿了即是成佛如泛説學佛而不從佛的因行菩薩道著力做起怎能達成目的等於要作一畢業生必定要一級一級學習起次第升進才能得到畢業學佛也就是這樣先從凡夫發菩提心由初學久學而進入大菩薩地福慧圓滿才成佛菩薩道重在實行不單是讚歎仰信究竟的果德就成而要著重在學習一切菩薩行平常説菩薩總是想到文殊普賢等大菩薩其實菩薩也有初學的菩薩道所有經歷的過程可略分三個階段一凡夫菩薩二賢聖菩薩三佛菩薩第三階段的菩薩是證得大乘甚深功德與佛相近似的楞伽經説七地是有心八地無影像此二地名住餘則我所得這是説八地以上的菩薩與佛的智證功德相近般若經説第十地名佛地龍樹解説為如十四夜的月與十五夜的月一樣所以雖還是菩薩地也就名為佛地這樣的佛地大菩薩是久修二阿僧祇劫以上所到如文殊觀音等初學是不容易學到的第二階段的菩薩是已發菩提心已登菩薩位從賢入聖修大悲大智行上求下化這即是三賢到八地的階位第一階位是新學菩薩是凡夫身初學發菩提心學修菩薩行雖或是外凡夫或已進為佛法內凡夫菩薩心行的根柢薄弱可能還會退失大乘起信論説信心成就發菩提心成就才不退菩薩位而能次第進修初學發菩提心學修菩薩行的是在修學信心的階段仁王般若波羅蜜經稱此為十善菩薩也即是十信菩薩凡夫的初學菩薩法還沒有堅固不退時都屬於此依經論説這一階段也要修學一萬劫呢新學菩薩要培養信心悲心學習發菩提心樂聞正法聞思精進而著重以十善業為菩薩道的基石這類菩薩雖沒有什麼深定大慧神通妙用但能修發菩提心修集十善行菩薩戒精勤佛道已充分表示出菩薩的面目這樣的力行不息積集福慧資糧一旦菩提心成就就可進入不退菩提心的賢位凡夫菩薩十善本是人乘的正法初學菩薩而著重於十善業即以人身學菩薩道的正宗太虛大師宣説的人生佛教即著重於此大師平時坦白地説我是凡夫而學修發菩薩心的以人間凡夫的立場發心學菩薩行略有兩點特徵一具煩惱身凡夫是離不了煩惱的這不能裝成聖人模樣開口證悟閉口解脫要老老實實地覺得自己有種種煩惱發心依佛法去調御它降伏它慈航法師晚年發願離淫欲心也就是真實的佛子模樣有人説如學佛的或出家大德內心也充滿煩惱這怎能使人歸敬呢這些人把煩惱看得太輕易了依大涅槃經説有四依菩薩可以作為衆生的依止師初依即具足煩惱的初學發心者初依菩薩對佛法的根本理趣有相當的正確體認自己學修菩薩行也能引導衆生來學他雖沒有斷除煩惱但能攝化衆生向於煩惱所不染的境地所以能為大衆作依止師聲聞法中也是這樣四果聖者能斷煩惱未斷未證的順解脫分順決擇分聲聞行者一樣的能住持佛法教化衆生為人間福田凡依人身而學發菩提心學修菩薩行務要不誇高大不眩神奇如忽略凡夫身的煩惱覆蔽智慧淺狹一落裝腔作勢那麼如非增上慢人自以為然即是無慚無愧的邪命依人身學菩薩行應該循序漸進起正知見薄煩惱障久積福德久之自會水到渠成轉染成淨二悲心增上初發菩薩心的必有宏偉超邁的氣概菩薩以利他為重如還是一般人那樣的急於了生死對利他事業漠不關心那無論他的信心怎樣堅固行持怎樣精進決非菩薩種姓專重信願與一般神教相近專重修證必定墮落小乘初發菩提心的除正信正見以外力行十善的利他事業以護持佛法救度衆生為重經上説未能自度先度他菩薩是故初發心應以這樣的聖訓時常激勵自己向菩薩道前進有的人因誤解而生疑難行十善與人天乘有什麼差別這二者是大大不同的這裡所説的人間佛教是菩薩道具足正信正見以慈悲利他為先學發菩提心的勝解一切法身心自他依正都是展轉的緣起法了知自他相依而性相畢竟空依據即空而有的緣起慧引起平等普利一切的利他悲願廣行十善積集資糧這與人乘法著重於偏狹的家庭為自己的人天福報而修持是根本不同的初學發菩提心的了知世間是緣起的一切衆生從無始以來互為六親眷屬一切人類於自己都展轉依存有恩有德所以修不殺不盜等十善行即此人間正行化成悲智相應的菩薩法門與自私的人天果報完全不同這樣的人間佛教是大乘道從人間正行去修集菩薩行的大乘道所以菩薩法不礙人生正行而人生正行即是菩薩法門以凡夫身來學菩薩行向於佛道的不會標榜神奇也不會矜誇玄妙而從平實穩健處著手做起一切佛菩薩都由此道修學而成修學這樣的人本大乘法如久修利根不離此人間正行自會超證直入如一般初學的循此修學保證能不失人身不礙大乘這是唯一有利而沒有險曲的大道二理論原則法與律的合一印度大乘法的流布受有本生談的影響菩薩都是獨往獨來的所以大乘法著重於入世利生而略帶特出的偉人的傾向不大重視有組織的集團這也許是大乘法晚期衰變的主因然大乘經説菩薩常與無數菩薩俱依龍樹説俱就是有組織的集合原來釋尊所創建的根本佛教包含著兩個內容一法二律導之以法齊之以律這二者的相應協調才是佛教的整體法是開示宇宙人生的真實事理教人如何發心修學成就智慧圓成道果法是重於顯正重於學者的修證律又有二類一止持是不道德行為的禁止二作持是僧團中種種事項的作法把這類事分類編集起來稱為犍度聚出家的聲聞比丘特別是人間比丘過著集團的生活修行居住飲食衣著以及有關教團的事務大家都是在一起依律制而行的佛世的出家弟子有團體的組織於集團中自利利他但當時的在家弟子佛只開示他們應怎樣的信解修行也有戒律卻沒有組織的團體古代的政治不容許在家衆作有組織的活動如孔門弟子也是沒有固定團體的但在佛法的流行中顯然的重法而輕律如聲聞乘的經阿含經與律約為四與一之比而在大乘法中大乘經有幾千卷傳來中國的律典卻等於沒有即有小部的也還是附屬於經中雖然説律是佛制的只可依著奉行但律是世間悉檀更著重於時地人的適應呢一分重律的拘於古制不知通變而一分學者索性輕律而不談有些人但知發心而不知僧團有什麼大用不知自動發大心的自尊自勉是難得的上根一般中下根性雖也要自己發心向上但如有良好團體教育他範圍他勸勉他實在是策令向上的無上方便如佛世的聲聞出家行者雖也有動機不純正的煩惱極重的但一出了家以經法開示他以戒律調伏他在大衆的攝導與折伏下利根的當然迅速的了生脫死鈍根的也可以漸趨涅槃用集團力量來規範自己的行為淨化內心的煩惱是根本佛教的特色後代學者而尊律的但知過午不食手不捉持金錢而大都漠視僧團的真義一分重禪的近於隱遁瑜伽的或以佛法為思辨的論師都輕視律制不知佛法的流行於世間與世間悉檀的律制有著最密切的關係律的不得人重視為佛法發達中的一大損失所以人間佛教必須本著佛教的古義重視法與律的合一原則出家的佛教如忽視僧團的律制必發生亂七八糟的現象無法健全清淨時代與過去不同了現在的在家學衆也有了團體的組織但少能注意到佛教團體的特色只是模倣一般社團的組織形式也還是不夠的無論是弘揚佛法或修學佛法只要是在人間尤其是現代集團的組織是極其重要的人間佛教以人生正行修菩薩道要把握這法律並重恢復佛教固有的精神切勿陷於傳統的作風但知真參實悟但知博究精研於毗奈耶律的原理法則不能尊重現代修學菩薩行的必須糾正這種態度法律兼重來契合佛法的正宗緣起與性空的統一法律並重是初期佛教的精髓緣起與空是中期大乘的特色緣起與緣起性空寂阿含經已有説到而且是作為佛法的特質菩薩道的特質的但由於適應當時的一般根性著重個人解脫所以對緣起性空的中道僅是要約的開示而還沒有廣博的開演出來到了佛滅後四五百年在大衆及分別説系的化區中興起的大乘佛教才使緣起性空的中道徹底的闡發無遺世間的一切事象人物蟲魚山河大地草木叢林什麼都各有他的特殊體性形態作用這一切的一切都是從緣所生的法相一切依因緣和合而幻現這幻現的緣生法表現出他的無限差別相個人的生死與解脫道德的行為世道的治亂一切無非緣起世間的宗教者哲學者不能徹底正解緣起性空的中道義都在尋求宇宙最後的或最先的實體傾向到本體論形而上的神祕領域佛所創覺的正法否定他因為一切是緣起的所以一切是性空無自性的一切法不生不滅本來涅槃事象與理性如花的表裡一樣形與影一樣有表即有裡有形即有影一切法也是這樣不能離相覓性也決非從性體而生事相從性空看一切是泯然一如的從緣有看因為緣起所以性空性空這才所以從緣起學佛的有的偏重於事著重法相的差別於空平等性不信不解或者輕視他這種見解是不能與出世的佛法尤其是與大乘法相應的不能成就菩薩道又有些人執著本性空理醉心於理性的思惟或參證而不重視法相不重視佛法在人間的應有正行這就是執理廢事唯有依據緣起性空建立二諦無礙的中觀才能符合佛法的正宗緣起不礙性空性空不礙緣起非但不相礙而且是相依相成世出世法的融攝統一即人事以成佛道非本此正觀不可既不偏此又不偏彼法性與法相並重互相依成互相推進而達於現空無礙的中道但這是説易行難初學者在處事契理的學程中每每是不偏於此便是偏彼但能以此現空無礙的正觀為思想基礎從一切三業行持中去實習體會隨時糾正終可以歸向中道然這裡是説學發菩薩心學修菩薩行應以佛的正見為本不是封鎖在宗派的圈子裡將後代的法性宗與法相宗作勉強的合一在中道正見的根本上與經論不相違背的契理而契機的融攝而冶化一番抉擇出人間佛教的正義所以這是超越宗派的歸宗於佛本的然還有應該注意的緣起與性空的統一他的出發點是緣起是緣起的衆生尤其是人本的立場因為如泛説一切緣起每落於宇宙論的容易離開衆生為本的佛法如泛説一切衆生即不能把握佛出人間即人成佛的精義自利與利他的統一世間的凡夫不能有純粹的利他一切都是從自己打算而來專為私我打算結果也不能有真正的自利然在佛法中聲聞乘重在斷煩惱了生死著重於自己身心的調治稱為自利這在離繫縛得解脫的立場來説是不可非難的聲聞乘著重身心的調伏對人處事決不專為私利而損他的聲聞賢聖一樣的持戒愛物教化衆生這與凡夫的自私自利根本不同大乘指斥他們為小乘自利是説他過分著重自心煩惱的調伏而忽略了積極的利他不是説他有自私的損人行為大乘道也不是不重視身心的調治自利只是著重利他使自利行在利他行的進程中完成達到自利利他的統一凡夫學大乘道以大悲心為動力以普度衆生的悲心來廣學一切經上説菩提所緣緣苦衆生衆生受無量苦菩薩起無量悲行所以大乘道是以大悲為上首的然發心利他並不忽略自己身心的調治否則未能自度焉能度人如不解不行不修不得佛法既無智慧又無能力那怎能利他呢所以為了要度一切衆生一定要廣學一切戒定慧三學六波羅蜜等如出發於悲心那麼深山修禪結七掩關也都是為了造就救度衆生的能力所以菩薩的修學與小乘的出發於自利不同一切是為了利他如為衆生為人群服務作種種事業説種種法門任勞任怨捨己利人是直接的利他修禪定學經法等是間接的利他菩薩是一切為了利他所以對身內的身外的一切不把他看作一己私有的一切功德回向衆生就是得了優越的果報也願與大衆共其利益老子所説的為而不恃功成不居就與大乘的心行相近事情做好了不當作自己的功德成就了推向大衆去功德的回向一切衆生便是大乘利他精神的表現菩薩的自利從利他中得來一切與利他行相應如持戒即不妨害衆生習定而修慧發通可以知根機而化濟衆生大乘道的自利不礙利他反而從利他中去完成説到大乘道的自利利他也不一定是艱難廣大的隨分隨力的小事也一樣是二利的實踐只看你用心如何如這塊小園地執著為我所有的我栽花我種樹我食用果實這就是自私的行為即使是物物交換社會得其利益也算不得真正的利他大乘行者就不同了不問這株樹栽下去要多少年才開花多少年才結果不問自己是否老了是否能享受他的花果也不為自己的兒孫打算或自己的徒弟著想總之如地而有空餘的樹而於人有益的花可以供人欣賞枝葉可以乘涼果可以供人摘了吃或可以作藥或可以作建材那就去栽植它但問是否於人有益不為自己著想這便是菩薩行了行菩薩道的出發於利他使利他的觀念與行為逐漸擴大不局限於個人一家一鄉等凡是於衆生於人類有利益的不但能增長自己未來的功德果報現生也能得社會的報酬如上所説的小小利他功德還能得現生與未來的自利何況能提高向佛道的精進擴大利他的事業為衆生的究竟離苦得樂而修學呢所以凡不為自己著想存著利他的悲心而作有利衆生的事就是實踐菩薩行趣向佛果了自利利他同時成就三時代傾向佛法是應該契機的不是迎合低級趣味了解現代中國人的動向適應他化導他為以佛法濟世的重要一著現代中國人的動向約有三點青年時代這一時代少壯的青年漸演變為社會的領導中心四五十年前城市與鄉村裡總是四十以上五六十歲的老前輩士紳族長等為領導者他們的地位優越講話有力量年紀大些品德高些或者做過官如相信了佛教一般人都跟著信仰佛教順利地傳開了也就得到有力的護持現在逐漸變了老前輩不能發生決定作用優越的發言權影響力漸由年輕的少壯取而代之所以如佛法不再重視適應青年根性那非但不能進一步的發揚且還有被毀謗與摧殘的危險中國佛教一向重玄理重證悟重死後往生與老年的心境特別契合尤其是唐宋以後山林氣息格外濃厚好在從前青年們總是以家長的信仰為信仰至少不致過分的反對可是到了近代少壯的力量強化加上西洋神教徒的惡意破壞物質科學的偏頗發展佛教受到了重大的危害其實中國固有文化都被破壞了上一代的逐漸過去後起的青年們除少數信仰神教外大抵為非宗教的或反宗教的唯物論者真誠信佛法的數量太少這是近代中國佛教的大危機前些時如國府主席林森司法院長居正考試院長戴季陶等都是誠信佛教的但由於軍政黨學的組織中多數是少壯的而這些人又大多數是對佛教無認識無信仰或者印象不佳這所以不能開展出佛教昌隆的機運而時有被摧殘的事實從前説英雄到老都學佛這些不可一世的風雲人物老來還是要歸信佛教這畢竟是佛教的感召力大但從另一面看為什麼當他們年輕有為的時候在政治軍事社會上發生力量不以佛法去攝受他使他更能以佛教精神去利人利世一定要等到來日無多才想到歸依佛門懺悔前愆這不完全是佛教的光榮而包含著佛教忽視青年的一種缺點當然這不是説老年人不需要學佛而是説應該重視於青年的歸信了生死青年人是不大容易領會的青年的血氣旺意志強意欲如海浪般奔騰澎湃不大能警覺到生死這回事所以如專以了生死為教是不容易獲得青年的信受可是學菩薩法著重於六度四攝四無量心發心普利一切衆生就與青年的心境相近中國雖素稱大乘教區而行持卻傾向於小乘急急的了生死求禪悟虛大師稱之為思想是大乘行為是小乘結果青年與佛教愈隔愈遠反之錫蘭暹羅緬甸等佛教國雖説是小乘教而青年人都學習佛法他們並不開始就學了生死而是歸依三寶深信因果增進向上主要是修學不礙出世的人乘所以推進適應時代的中國佛教不宜因循於過去而應該隨時記著青年人愈來愈處於重要的地位了中國佛教如不以適應青年的法門引導他們來學佛等於自願走向沒落弘揚人間佛教攝化的當機應以青年為主了生死當然還是佛法的一大事但修學大乘要以利他為先適應廣大的青年群人菩薩為本的大乘法是唯一契機的了佛藏經説耆老們但知保守瑣碎的教條偏於自利不能住持佛法虧了少數青年才將大法傳弘下來過去如此未來也一定如此青年衆來發心修學才是發揚真正大乘的因素如大乘法中的文殊善財常啼等都是現青年身發廣大心勇猛精進學不厭教不倦他們自身現青年相也歡喜攝引青年學佛這不是菩薩偏心而是青年人具足了適宜於修學大乘的條件人間佛教的動向主要是培養青年人的信心發心修菩薩行如不能養成人間的菩薩風氣依舊著重少數人的急證或多數而偏於消極的信仰那對於中國佛教的前途光明是太微茫了將來世局好轉世界佛教區的來往容易了大家不妨到錫蘭暹羅緬甸日本去看看他們是怎樣的重視青年和適應他用作我們弘揚人間佛教大乘佛教的參考處世時代現代的又一傾向是處世的佛法中人天乘是戀世的耽戀著世間欲樂沒有出世解脫的意向小乘與人天法相反視三界如牢獄生死如冤家急切地發厭離心求證解脫出世不是到另一世界去是出三界煩惱不再受煩惱所繫縛得大自在的意思佛説小乘出世法是適應隱遁與苦行根性的出世總比戀世好不會因貪戀世間的物欲權力將大地攪得血腥薰人至少能不貪不瞋養成社會上淳朴恬淡的風氣大乘菩薩可不同了菩薩是出世而又入世所謂以出世精神作入世事業大乘法中在家菩薩占絶大多數在家菩薩常在通都大邑人煙稠密的地方利益衆生弘通佛法如華嚴經入法界品維摩詰經菩薩本生談都顯著地記載那在家菩薩在社會上現身説法的種種情形大乘菩薩道的偉大全從入世精神中表達出來菩薩為大悲願力所激發抱著跳火坑入地獄救濟衆生的堅強志願與人天的戀世不同與小乘的出世也不相同菩薩入世的作風在現代戀世的常人看來非常親切要比二乘的自了出世好得多近代由於物質文明的發達由縱我制物而發展到徇物制我迷戀世間物欲的風氣特別強壓倒了少欲知足恬淡靜退的人生觀此時而以人天法來教化等於以水洗水永無出路如以小乘法來教化又是格格不入唯有大乘法以出世心來作入世事同時就從入世法中攝化衆生向出世做到出世與入世的無礙菩薩行的深入人間各階層表顯了菩薩的偉大出世又入世崇高又平常也就因此什麼人都可漸次修學上求佛道時代傾向於戀世唯有大乘的入世才能吻合現代的根機引發廣泛的同情而漸化貪瞋的毒根同時現代也不容許佛徒的隱遁了從前天下大亂可以到深山去闢土開荒生活維持下去佛法也就延續下去如山西的五臺山陝西的終南山每逢亂世出家人都前往避亂專修現在的情形不同不但不同情你的遁世就是隱入深山也會被迫而不得不出來城市與山林將來並無多大差別隱遁山林的佛教是一天天不行了其實佛教本來是在人間的佛與弟子不是經常的遊化人間嗎大乘是適合人類的特法只要有人住的地方不問都會市鎮鄉村修菩薩行的就應該到處去作種種利人事業傳播大乘法音在不離世事不離衆生的情況下淨化自己覺悟自己山林氣息濃厚的佛教現代是不相應的應把這種習氣糾正過來養成不離世間的大乘胸襟決不宜再走隱遁遺世的路子中國佛教的崇尚山林受了印度佛教中一分苦行瑜伽僧的影響到中國來又與老莊的隱退思想相融合這才使二千年來的中國佛教與人間的關係總嫌不夠緊密現在到了緊要關頭是不能不回頭恢復佛教的真精神深入人間的時候了集體時代在法與毗奈耶裡已説到佛教團體生活的要義佛教本來是重視團體生活的現代社會也傾向於此不但政治重組織就是農工商學等也都組織自己的集團工會商會農會等佛法是應該適應時代的時代已進向集體組織佛法也就該更著重於此民國以來出家在家的組織佛教會在家的創立正信會居士林等可説都與此時代風尚相合佛教會的成立起初是重在對外遇到利用政治或地方惡勢力想侵凌摧殘佛教就運用此團體來抵抗護持然佛教的團體組合不專是為了對外對於自身的分子健全組織嚴密實有更重要的意義學佛的主要目的在自利利他照佛説毗奈耶所指示要生活在團體中才能真實的自利利他就是自利的斷煩惱了生死依團體的力量也是更為容易這在一般看來也許覺得希奇不知學佛的進入佛教團體過著有規律的生活行住坐臥語默動靜一切都不能違反大衆共守的制度因為佛教的集體生活有著三項特色互相教授教誡互相慰勉互相警策佛弟子住在一起關於法義是互相切磋問難你會的講給我聽我會的講給你聽當然精通三藏的上座們是更負起住持正法引導修學的義務如有意見不合或有不合佛法的見解由大衆集會來議定將錯誤的見解糾正過來初學的或者心起煩惱想退失道心就用柔軟語安慰他勉勵他幫助他的信心堅定起來努力向上如有性情放逸不專心佛法的就用痛切語警策他犯了戒一定要親向大衆求懺悔知道他犯罪大家有警策他教他懺悔的義務這種集體生活充滿著大衆教育的意味所以佛在世時雖有發心不純正的但一經出家在團體中鍛鍊一番也能引發真心用功辦道了脫生死這種集體生活的精神古代的禪宗很有些類似如在禪室中放逸昏沈供養他幾香板如參禪不能得力向和尚及班首們請開示因有教授教誡慰勉警策的精神所以禪宗能陶賢鑄聖延續了中國佛教一千年的慧命佛教的集體生活不只是生活在一起上殿過堂就算了不只是注重表面的秩序而是在同一生活中引導大衆走上正常而向上的境地這樣的集團生活自能發生真正的力量佛教僧團可説是自我教育大衆教育的道場僧團與學校不一樣學校只是老師教學生僧團是進一步的互相教授教誡依佛説上座而不發心教導新學比丘是沒有慈悲違犯上座的法規教授教誡慰勉警策是佛教集團的真精神這樣的相互教育可實現在團體中的自由而每人的真自由即佛法所説的解脫依律説在僧團中一切是公開的真能做到無事不可對人言做錯了有大衆檢舉自己也就非懺悔不可這樣的集團生活做到知過必改人人向上和樂共處養成光風霽月的胸襟清淨莊嚴的品格淨化自己健全佛教發揚正法一切都從此中實現出來近代組織的佛教會對於健全僧品發揚佛教一時還不能發生力量如外面由於時代的需要內部尊重佛教的精神復興佛教的集團生活相信不但能健全佛教佛教也必迅速的發皇起來因為大衆和樂僧品清淨在有組織的集團中不會因內部的矛盾衝突而對消自己的力量在和諧一致的情形下信心與熱忱增強大家能分工合作充分發展為教的力量過去由於隱遁的個人的思想泛濫佛教的集團精神受到了漠視這才使佛教散漫得沙礫一樣現在社會已進入集團組織的時代為了發揚人間佛教要趕快將集團的精神恢復起來四修持心要學佛是離不了修持的持是受持是擇善而固執之的意思修是熏修是依著受持的佛法去學習照中文的訓釋如修身修理等修有改正的意思依佛法修是熏發義由於學習能熏發現在與未來的善根叫做修説起修持有的總以為要擺脫一切事務這是與大乘不相應的修行大乘法門如布施持戒愛語利行同事習定修慧念佛供養懺悔等凡是學習自利利他的培養福德智慧的都是修行決無離棄世間善行的道理依人間善法而進修菩薩行依一切大乘經論特拈出三字為中心信願精進智定方便悲施戒忍信為修學佛法的第一要著沒有信一切佛法的功德不生如樹木的有根才能生長無根即不能生長一樣智是解脫生死的根本斷煩惱悟真理都是非智慧不可小乘法重視這信與智而大乘法門格外重視慈悲因為菩薩行以利濟衆生為先如悲心不夠大乘功德是不會成就的可能會墮落小乘經上説信為欲依欲為勤依有了堅固的信心即會有強烈的願欲也一定有實行善法的精進這三者是相關聯的而根本是信心如有人説某某法門最好非此不了生死如認為此外也有可以了生死的那不行就不一定是不信但並沒有真實修持這證明他並無信心因為他沒有起願欲發精進如人生了重病病到臨近死亡邊緣聽説什麼藥可以治如病人真有信心那他會不惜一切以求得此藥的如不求不服那他對此藥是並無信心的所以願與精進依信心為基礎可説有信即有願有勤行無信即無願無勤行的智慧可以攝定深智是離不了定的依定修慧定是慧的基礎有了智慧一切善巧方便都逐漸成就了悲是利他的動力如損己利人的布施節己和衆的持戒制己恕他的安忍都是悲心的表現依人乘行而學菩薩道此三法即攝得六度四攝一切法門啓發信心引生智慧長養慈悲實在是大乘道的根本法門信是信三寶信四諦凡是能增長信心的事情和言教應多多去學習依大乘經論所説初學大乘法首先要起發信心這如念佛菩薩禮佛菩薩讚佛菩薩隨喜供養懺悔勸請等都是攝導初學長養信心的善巧方便見賢思齊為人類向上的攝引力孔子服膺西周的政治時刻在念連夢裡都常見周公學佛的要成佛作祖當然要時時恭敬禮念諸佛菩薩念佛念法念僧能時時繫念三寶學佛成佛的信心自然會成就佛弟子在夢中定中見佛見菩薩也就是信心深固的明證同時有真實信心的一定是了解佛法的了解佛法才會確信非佛法不能利濟自他有悲心大乘信才得堅固這是依人法而修菩薩所必要的如有悲與慧為助緣信心培養得深厚堅固了就能生起堅強的願力不問如何艱難一定要學佛法也一定要護持佛教孔子説民無信不立世事尚要依信心而成就何況修學即世間而出世間的佛法為了自悟悟他非學智慧不可對於經論的義理非要理解個透徹但是慧學的閲讀經論聽聞開示只是慧學的資糧主要是於佛法起正知見了解佛法的真了義依著進一步的思惟修習引發甚深的智慧這是為了學佛不是為了作一佛教的學者説到悲心本來什麼人都有一點如儒家的仁耶教的愛只是不夠廣大不夠清淨佛法的四無量心慈悲喜捨就是要擴充此心到無量無邊普被一切初發大乘菩提心的可從淺近處做起時常想起衆生的苦處激發自己的悲心儒家有見其生不忍見其死聞其聲不忍食其肉是從惻隱心中流出大乘法制斷肉食徹底得多但也是為了長養慈悲心種由此養成悲憫衆生的同情才能發揚廣大實踐救濟衆生的事業總之如能著重啓發信心引生正智長養慈悲大乘聖胎也就漸漸具足從凡入聖了信莊嚴淨土智清淨身心悲成熟有情信智悲三法如學習成就就是菩薩事業的主要內容信願能莊嚴淨土這或是往生他方淨土或是莊嚴創造淨土如法藏比丘這都是由於深信佛身佛土功德發願積集功德而成智能清淨身心悟真理時斷一切煩惱得了正智自然能身口意三業清淨舉措如法悲能成熟有情即是實施救濟事業菩薩的方便攝化或以衣食等物質來救濟或在政治上施行良好政治使人類享受豐富自由的幸福十善以上菩薩每現國王身如大乘經所説的十王大業但菩薩的救度有情重在激發人類向上的善心循正道而向樂果所以如有人天善根的就以人天法來化導他如有二乘善根的以二乘法來度脫他有佛種性的就以大乘法來攝化使他學菩薩行趨向佛果這些都是菩薩悲心悲行所成就菩薩道的三大事就從起信心生正智長大悲的三德中來所以由人菩薩而發心的大乘應把握這三者為修持心要要緊是平衡的發展切勿偏於信願偏於智證或者偏於慈善心行做點慈善事業就自以為菩薩行真正的菩薩道此三德是不可偏廢的仁俊記
