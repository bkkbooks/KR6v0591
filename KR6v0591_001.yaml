body:
  text: 佛在人間一釋尊小史我們的大師釋迦牟尼佛在二千四五百年前的一個四月八日誕生在中印度迦毗羅國的釋迦族父王叫淨飯是迦毗羅的國王母后摩耶夫人在東向拘利城歸寧的途中在他母親的別墅嵐毗尼園裡誕生了太子這大喜的消息立刻引起了大自然的狂歡枝頭的小鳥唱起和平之曲花朵也更嫵媚了充滿生意的春風把這大喜的消息傳遍了迦毗羅傳遍了恆河兩岸一直到全世界此時此地此人將永遠成為人間的光榮受著人們的歌讚與崇拜釋尊不但生在高貴的王族還生著端嚴的相貌這在當時印度人的眼中他無疑是未來人間的領導者一切的利益都要在他手上完成因此釋尊幼時就被稱為悉達多七八歲時他開始入學也曾學過軍事在競婚時曾表現了體力的優越他在王宮甜蜜的物質享受中滋長了一顆人生可痛衆生可憫的心靈衆生的自相殘殺身世的渺茫這現實的苦痛警覺了他使他不願留戀這優美的王宮不能漠視這慘酷的人間二十五歲的一個晚上他堅決的放棄了統治者的地位離開了王宮父王與心愛的嬪妃成為一位一無所有的真理與自由的追求者出家以後為了真理與自由參訪當時著名的宗教師過了六年非常刻苦的生活但事實證明苦行是徒然的於是乎他的生活開始轉變受牧女善生的乳糜在尼連禪河洗淨了七年來的積垢到摩竭陀國的菩提伽耶結跏趺坐發出堅強的誓願我今若不證無上大菩提寧可碎是身終不起此座在四十九天中運用智力悲力無限的精進力從一切障礙中獲得解放徹底體悟了人生的真諦成為人間的佛陀釋尊體悟的人生真諦與實踐的軌則道在祭祀生天與苦行解脫的印度時代思潮中顯然是格格不入釋尊曾慨歎的説我此甚深法無信云何解我寧不説法疾入於涅槃在五十七日的長期思考中度著獨善的生活最後決定創設一種適應時代文明深入而淺出的宗教但不單是適應在這適應淺化的裡面顯示出釋尊的本懷在波羅奈的施鹿林開始為五比丘説法推動了不共世俗的四諦法輪法輪的精要正像阿説示説的諸法從緣起是法説緣生諸法緣及盡吾佛大師説此後釋尊從事真理的傳布工作組織僧團到第六年加入這和樂自由的僧團者已有一千二百五十人這樣的教化約有五十年之久佛教傳遍了恆河兩岸最後釋尊從摩竭陀到毗舍離漸漸遊行到拘尸那受純陀最後的供養度最後弟子須跋陀羅在雙林間為弟子作最後的教誨自今已後我諸弟子展轉行之則是法身常在而不滅也八十歲的二月十五日的中夜釋尊入大般涅槃結束了一代的教化世間眼滅一何疾釋尊的入滅將永遠遺留在佛弟子內心的深處悲懷戀慕直到人間淨土的完成二佛陀的身命佛教是理智的宗教自然不能離卻這人間的導師轉到玄祕的信仰但是單在種姓清淨相好圓滿出家成佛説法入滅的形迹上建立信仰也還不能算深刻正確凡是純正的佛弟子必須把握佛陀的崇高偉大點要窺見佛陀之所以為佛陀唯有在這即人成佛的佛格上才能奠定堅強的信念在理智信仰的生命中去為真理與自由而邁進完成佛教出現世間的目的佛陀之所以為佛陀就是佛陀的體性與生命經上説見緣起即見法見法即見佛這是佛陀的法身苦行沙門瞿曇為什麼被人稱為佛陀這並不因他是王子出家修苦行或者説法是因他體悟了人生的真諦緣起正法緣起的本質是説凡是存在沒有無因而自然的沒有常恆的獨立的一切的一切是關係的存在因關係的和合而現在因分離而轉化佛陀在定慧的實踐中觀緣起的如幻而證悟緣起的寂滅具有這樣的正覺內容才稱為佛那麼如果我們也能悟解這緣起的寂滅性就接觸到佛陀的本質就能正確窺見佛陀之所以為佛陀這是佛教的核心有它的詳細正確的內容可不許你懸想這裡不妨説一個淺顯的比喻一個龐大的東西把你我隔在兩邊這個巨物本是緣起的和合相但我們都把它看成實在的實在才隔離了你我假使你我的慧眼比愛克司光更強那就能透過這好像實在的巨物顯發它的真相不但彼此慧眼的光芒在這共同的對象上接觸融成不二還能互相覿面相見這就叫心心相印與十方三世諸佛同一鼻孔出氣凡是佛弟子能在聽聞思惟中獲得這緣起正法的正見就是信解見佛能在定慧的實踐中通達就是證悟見佛從前釋尊在世時有一次廣大的集會大家都去見佛須菩提在山邊考慮我也去見佛嗎佛説見緣起即見佛我為什麼不觀察緣起呢他觀察一切從緣所生都是無常演變從無常的觀察中通達法性空契入寂滅的聖境當時釋尊對一個最先見佛的弟子説你以為先見我嗎不須菩提先見我身這是佛陀之所以為佛陀的一面經上説解脫戒經是汝大師又説能供養僧則供養我已這是佛陀的慧命是佛陀生命的另一側面佛陀的存在存在於佛教大衆的集團中有僧就有佛這點決定了佛陀的偉大偉大到超越我人的意想以外緣起法性是宇宙人生的最高法則那麼我們的身心修養自它共處一切的一切都不能違反這緣起法性也就是説世出世法不能打為兩截要在這一貫的法則中建立佛教的本質是平等而非階級的自由而非壓制的集團而非個人的從佛陀的本質正覺緣起的內容中展為活躍無限止的生命都表顯在僧團因僧團的存在而存在僧團的組織可説是法性具體的顯現因此佛法的存在並不以殿宇塑像經典來決定在有無吻合佛陀本懷與法性的僧團佛法弘揚本在僧的僧不是偉大的個人是一個推動佛教的和樂共存的自由集團不是深山中一個一個的隱者那家庭化商業化的更是出佛身血與佛無緣緣起性是佛陀的法身和合衆是佛陀的慧命在佛陀之所以為佛陀中佛弟子的整個身心成為佛陀之一體三釋尊的故國之思釋尊是一位國際主義者對軍閥的爭霸戰根本不表同情戰勝增怨敵戰敗臥不安勝敗兩俱捨臥覺寂靜樂這是佛陀對侵略者著名的教訓假使就此説佛陀漠視國家民族的被征服被奴役被殘殺那是非常錯誤的這可以從釋尊出家與國家的關係説起釋尊的祖國迦毗羅如何富庶如何強盛在佛教的傳記中顯然是誇大的事實上當時的迦毗羅早已淪為波斯匿王的憍薩羅國的附庸有一回波斯匿王向迦毗羅的釋族索婚大家雖覺得他非我族類但又不敢得罪他結果喬裝一個婢女冒充釋女去下嫁我們只要想到齊景公的遣女入吳漢唐的宗女和番就可想見當時的情勢了那時的印度是憍薩羅與摩竭陀爭霸的時代地勢狹小而偏於北部的迦毗羅在這兩大軍閥的爭霸戰中處境的困難是可想而知同時釋族本身又是那樣的憍逸而沒有自信看他們在琉璃王兵臨城下的時候主戰派最先受了制裁還是和呢守呢經過一番辨論終於開門迎敵甘受敵人殘酷的屠戮這樣的時代這樣的國家未嘗不是釋尊擺脫了而別圖解救的一個主要動機在釋尊悲憫衆生如一子的心境上因種族的歧視互相侵奪而陷國計民生於悲慘的境遇者又不止一個迦毗羅不止迦毗羅需要正義的救濟吧這使釋尊痛心衆生的自相殘殺而有別闢坦途的必要了因此釋尊在倡導佛教的解脫論中沒有忽略世間這是對的正確的出世觀是必然的配合著世間的淨化釋尊倡導種族平等論以消泯種族間的歧視對立與非法的壓迫抨擊侵略者的殘殺而鼓吹無諍的和合在另一方面組織起大智大悲的自由集團也就是社會性的自由族和平共存的思想多少給豫當時紛爭的印度以有效的救濟這一切活動是從倫理實踐的宗教出發但他沒有忽略人間更沒有忘記祖國當毗琉璃進軍迦毗羅的消息傳到這個為解脫的自由集團釋沙門團的時候提議給豫迦毗羅以實力的援助者在傳記上看來是大有人在雖然受了苦行厭離的時代思潮的限制不能實現有力的援助但釋尊到底以大慈無畏的精神在毗琉璃王的大軍前出現事實是這樣在毗琉璃王軍隊通過的大路邊釋尊安間的坐在一株沒有枝葉蔭蔽的舍夷樹下琉璃王聽説釋尊在此便過來禮拜問訊他不理解釋尊獨坐枯樹下的用意覺得有些希奇釋尊對他説我現在是沒有蔭蔽的人了琉璃王聽到親族之蔭勝餘人也的慈訓大大感動吩咐還軍傳説在釋種被滅的時期釋尊頭痛了多日這是怎樣象徵釋尊的內心在佛在人間的見地去考察釋尊雖然出家他沒有忘卻國族那一縷故國之思依然是活躍著釋尊怎樣在指導人間的佛弟子應該怎樣關切他國家民族的自由獨立與生存那些以為信佛出家就可以不再聞問國家民族的存亡者不論他如何談修説證無疑是我佛的叛徒四出家更接近了人間釋尊的出家不但常被外人就是小乘學者也常誤會他是消極厭離其實釋尊出家的主要動機是不忍人世殘酷的慘殺不忍貧農的胼手胝足而不得溫飽這在佛本行經太子觀耕釋尊最初發心的故事中可以明白看出從釋尊倡導的緣起正法來看也明白如繪老病死憂悲苦惱與生就是八苦這不但是老死那人與人間人與自然間種種的苦痛與缺陷都是佛教的觀察對象要給豫這人生的缺陷以適當的解決非解決這苦痛的原因愛取不可愛是生命的貪戀與世間所有物的繫著取是內依自我愛欲的發展而為一切的追求企圖滿足一人一家一國的爭奪經上説到愛取説人類因愛取而追求如求之不得那就否認懷疑人類努力工作的價值而走上尊祐論上帝的恩賜或天意無因論宿命論一朝求得又要藏蓄守護假如得而復失那種悲哀像熱沙上的魚一樣因人類愛欲的自私父母兒女兄弟都在互相爭鬥互相誹毀譏嫌這種情勢的擴大就是民族國家間的侵奪因此而死傷或被掠者的苦痛實在不堪設想這樣看來佛教所説的苦不單是老死苦痛的解決在勘破自我的愛取在改變我們身心的行為相對的改善就是世間的救濟根本的解決就是出世世間與出世間並非敵對相反不善世間是相反的世間的改善與淨化決不障礙出世的解脫反而是接近一分學者著重在瑣碎的哲理思辨或離卻人間去出世忽略勘破愛取的人間實際性因此也不能理解因人事的融洽而促進身心解脫的重要性集體生活的真義也受到漠視釋尊是迦毗羅的王子陷在五欲享受的重圍中這不是尊榮幸福在釋尊悲智的意境上這是人生的大不幸是悲哀他離開王宮完成最高的犧牲棄世才真正的走入人間自然屬於自然一切還於一切在自我私有的占領形態下能有圓滿的真理與自由嗎這種精神貫串在一切中在釋尊教化弟子的時代雖受著弟子的推尊敬禮但釋尊卻這樣説我不攝受衆不願以統攝者自居是佛陀正覺緣起正法完滿的實踐他服事病比丘洗滌給盲比丘袵針向小比丘懺摩意思説請你容恕我他不再單是王公宰官與政客學者的朋友他是一切人的安慰者誠摯的勸誡教誨者釋尊的弟子有王公大臣后妃也有屠戶妓女土匪與奴隸有讀遍四吠陀與十八大經的名學者也有三個月讀不熟一偈的呆子有威儀庠序的耆年大德也有嬉笑跳躍的童子他的足迹踏遍了恆河兩岸你説他出家是消極棄離人間嗎釋尊為了真理與自由忍受一切衣食上的淡泊但他以法悅心怡然自得他受著教敵的毀謗毒害但他還是那樣慈悲無畏到底在恬靜中勝過了一切在入滅的時候他還在教化須跋陀羅諄諄的教誨他的弟子他為著什麼拋棄了人間嗎比那些稱孤道寡的統治者更消極嗎一切屬於一切唯有為衆生特別是人類的痛苦為人類的真理與自由為使人類向上此外更不為自己沒有自己在這人類所知的歷史中有比釋尊更在人間的嗎為自我的解脫與真理的掘發有割斷自我與世間愛索的必要這樣的為身才能為大衆忘世才真正的走入人間五佛從人間被升到天上釋尊是一位慈和誠摯的教師他稱呼那斷惑清淨的比丘與自己一樣是阿羅漢何嘗有意把自己提高到一切之上但在釋尊大悲大智大精進的偉大活動中事實上超過了一切偉大高潔的德性深邃的智慧因定慧而獲得超越的能力特別在溯述過去自利利他的本生談中露出佛陀的本來面目這無限生命的偉大活動不斷的投入弟子的心目中使聲聞弟子不能不承認佛陀的崇高偉大而意識到自己的渺小釋尊之所以被稱十力大師與聲聞弟子是有所不同的仁者見仁智者見智弟子心目中的佛陀是有著不同觀感的在佛教中有不同的佛陀觀但正確的佛陀觀到底是佛在人間即人成佛如來在世間不言有與無如來涅槃後不言有與無凡真能獲得正見者接觸到佛陀的生命者必然有深刻正確的體認而離卻俗見與擬想但庸俗者忘卻了佛身無漏以為佛陀的飢渴寒熱與自己一樣佛陀的偉大在功德但又遺忘了舍利弗五分法身不滅的明訓因此説功德滿三界無常風所壞以為佛陀的入滅是灰身泯智的這樣的佛陀觀是照著苦行厭離者自己的想像而復寫的正確的佛陀觀並不如此從本生談的啓示中佛陀的因地修行菩薩道的菩薩並不與俗見者所見一致菩薩早已斷了煩惱具有超越聲聞弟子的能力所以正確的佛陀觀是證無生法忍菩薩斷煩惱已盡成佛斷習這無生法忍菩薩雖然隨機益物但成佛還是在人間諸佛世尊皆出人間不在天上成佛也阿含經如此説初期大乘經也如此説正確的佛陀觀是不能離卻這原則的但中與正是難得把握的或者又開始擬想證無生法忍的菩薩就是成佛有的以為不然釋尊是成佛久矣現在不過是示現如來壽量無邊際的見解小乘部派中早已存在早已成佛的佛陀在何處成佛在人間這似乎太平凡那麼在天上在天上身相圓滿廣大的最高處摩醯首羅天上成佛天上成佛是真實的人間成佛是示現的起初天上佛與人間佛的關係還看作如月與水中的月影再進一步在人間成佛的釋尊修行六年不得成佛於是非向摩醯首羅天上的佛陀請教不可在佛陀的本教中釋尊是人天教師現在是轉向天上請教了這一思想的反流我領略到異樣的滋味佛陀在天而天在人而人何必執著是的不過我們現在人間我們得認識人間的佛陀佛陀是人間的我們要遠離擬想理解佛在人間的確實性確立起人間正見的佛陀觀佛是即人而成佛的所以要遠離俗見要探索佛陀的佛格而作面見佛陀的體驗也就是把握出世不是天上正見的佛陀觀這兩者的融然無礙是佛陀觀的真相在大乘佛教的發展中如果説有依人乘而發趣的大乘有依天乘而發趣的大乘那麼人間成佛與天上成佛就是明顯的分界線佛陀怎樣被升到天上我們還得照樣歡迎到人間人間佛教的信仰者不是人間就是天上此外沒有你模稜兩可的餘地請熟誦佛陀的聖教樹立你正確的佛陀觀諸佛世尊皆出人間不在天上成佛也
