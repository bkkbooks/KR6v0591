body:
  text: 佛教的知識觀今天講說的為佛教對於知識的態度這問題有關於佛教修行的方法論及佛教徒對現世間的知識文明是取什麼態度知識究竟是好是壞佛教徒依於佛法應有一個公正的估價時代青年說今日人類社會在知識發達中有了進步進步離不了知識年老的每說今日世界人心不古越來越壞了壞也離不了知識這是一般常識的看法並沒有觸到知識的本身一般說現在的科學發達世界的文明進步都是知識發達的好處人類文明進步既都是知識的好處為什麼有人起來咒詛它可見知識的本身定有問題所以有以為知識愈高人類痛苦愈深對於知識不僅老年與青年的看法每每不同即古今中外人士也都有好壞的不同看法一一般文化界的看法中國文明中的不同看法中國人對知識的不同看法從中國固有的文化思想中考察可以略分為儒墨與老莊的兩大派儒家與墨子的看法一樣他們是推崇知識的孔子說我非生而知之者好古敏以求之者也即對固有的文化發生了高度興趣不斷地探求深入所以孔子成了一位學不厭教不倦的大教育家在他的心目中知識是人類立身處事的根本沒有知識什麼都不成唯有知才能趨入道故大學說知所先後則近道矣知識是多麼重要在儒家看不但修身齊家治國平天下需要知而這一切還以知為本如大學的八條目中平天下先要能治國治國依於齊家這樣推論到首先要從格物致知做起知是極重要的儒家一向重視它我國固有文化學術也大抵因儒家的好古而保存傳授下來墨子是從儒家中流出發揚比儒家較朴實而實用的思想他非常重視知識因此墨家的論理學極發達同時物理數學等在墨子的學說中也有發揚墨家還是精於器械製造的從儒墨的學說思想看知道他們是崇尚知識的這是中國古代正統文化對於知識的正面看法老莊是崇尚自然的老莊的思想主張反朴歸真老子認為世界上有聖人就有虛僞的道德有知識就有欺詐天下就要發生禍亂人民遭受苦痛所以他要絶聖棄智若世間沒有聖者與智人類在自然的生活中得以享受安寧和平的幸福老子的這套思想到莊子更為明朗極端更富於哲學內容他寓言說混沌形容一個無知無識的神看他可憐每天給他開鑿一竅七天之後他七竅完備對世間事物的認識發達了可是也就死亡了這意思是說無知無識充滿了生命還能安逸的生活知識一開生命也就開始毀滅不再能安逸的生存了所以在莊子看來知識是天下大亂人民苦痛的根源也就是死亡的根源莊子又說到有一農夫以一木桶到河裡提水灌溉禾苗上下來去極為艱苦有人教以用水車取水他卻說用不得因為以機巧取水即有機心有機心便是一切災禍的來源莊子又說到找求玄珠真理極為不易有力氣人求不到聰明人不知化費了多少時間也沒找到後來罔象形容無名無形的很快的就尋得了玄珠這含意是說聰明人以知識求道道越求越遠這都表示了知識的無益於大道無益於人類故老莊的社會觀念是反朴歸真崇尚自然的原始社會的生活從儒墨與老莊的兩種思想去看那麼說今日社會由於知識而文明進步與由於知的發展而人心不古這種對立的不同觀點原是中國古已有之的西方文明中的不同看法現有的西方宗教主要是起自希伯來民族起先是猶太教後來耶穌革新而成基督教後來又經過馬丁路得的宗教改革分成固有的天主教與新的耶穌教回教又是受過這幾種宗教思想而蛻化出來的今日的西方宗教家他們像也在提倡教育研究科學等實際上希伯來式一神宗教的根本思想是知識的反對者不信請讀舊約創世記據說他們的神造了一男一女兩個人起初他們是混沌無知無知識他們卻生活在極樂的樂園裡他們住處有兩株樹一是生命樹一是分別善惡樹樹上都結滿了果實神對他們說分別樹上的果子不可吃但他們受了魔的誘惑忘掉了神的吩咐竟吃下了分別果不吃果時他們的知識未開生活過得很好一食了果子眼目明亮了頓時對世間起了分別發覺自己沒穿衣服便知羞恥晚上神來時他們怕羞恥而躲在樹下神非常生氣說你們該死照中國儒家及佛教看人類的知羞恥是一種向上向善的表現佛經稱此為人與禽獸的區別點而希伯來的神卻認為這是罪惡應該死亡因此神趕走了他們人生從此便失去樂園便有了死亡人間便充滿了苦痛這與中國老莊的思想相近不過老莊是反朴歸真崇尚自然而西方宗教的思想一切皆歸於信順神依神的指導而生活舊約中又說到人類多起來想建築塔以紀功神說他們都與神那樣有分別善惡的能力如讓他們團結而發展起來太危險了於是使他們分散使他們的語言彼此不同所以神教不但是人類知識的咒詛者還是人類團結以及工業等文明發達的反對者希伯來宗教重在教人因信仰而得救不重於智的開發新約說你不要研究撒旦深奧之理在進向真理的過程中這是推崇信仰而抹煞知識價值的代表者在他們認為人類的自由知識是死亡苦痛一切不幸的根源希臘是西方哲學的發源地在西方文明中這是主要的一面哲學的意義是愛智愛智是對知識的思慕愛好因為愛好而不斷地探求哲學起初包含一切學問的統一所以哲學即等於一切知識的鑽求被看作哲學之祖的蘇格拉底說知就是德有了知識才會向上向善而邁進於德性的開展這分明是推崇知識的一流與希伯來宗教的根本思想不同過去希伯來宗教發達後希臘哲學便慢慢衰落下去造成中世的黑暗時代那時的哲學與論理學都被用於論證上帝的有無當時的哲學與論理學被譏為宗教的奴隸其後文藝復興也就是希臘哲學自由思考的復活連一神的宗教也不得不多少革新容納一些民主與自由的成分然而近代的西方文明宗教信仰與知識之間始終沒有做到協調的地步印度文明中的不同看法印度的正統文化是婆羅門教婆羅門極重視知識他們所依的經典叫吠陀吠陀即是明的意思在古來印度的社會文化幾乎一切都包含在吠陀裡到佛教時代總括為五明明即是學問一切學問皆是宗教徒應該學習探求的因此印度宗教信仰而重視理智宗教即哲學哲學即宗教如佛教中佛稱覺者證得菩提菩提就是覺此外如明智見觀勝解等名詞到處都是表示了重智的特徵因為重智故印度宗教的信仰裡充滿了知識這一點顯然與西方宗教的精神不同在佛出世前一二百年間印度有反抗婆羅門教的沙門團崛起沙門團雖也注重知識但與婆羅門教的看法多少不同在哲學的思考中露出知識不能確見真理的意思有一名刪惹耶毗羅胝子的如問起有無後世他反問你覺得怎樣若對方說後世是有的他也跟著對方的意思說後世有若對方說後世是沒有的他也跟著說沒有總之你怎麼說他就怎麼說他不反對你說有說沒有但他自己卻不說是有是沒有佛教喻此派為鰻論不易捕捉他的真意也有稱之為不知主義舍利弗尊者最初即依這一派思想學習問他的老師究竟得到真理沒有他沒有具體的說什麼而說我也不知道得與不得在哲學上有他的地位與價值即看透了知識本身的缺陷不能表達真理佛教有著沙門文明的內容而又含攝了婆羅門重智的傳統因此佛教是更能認透知識之性質與價值的在這三大文明中雖略舉為例也可看出對知識都有正反的兩面但由於民族文化的不同輕視知識的學派目的並不全同中國重人事齊家治國平天下所以儒墨主用世而老莊主張反朴歸真任性自然憧憬於自然的社會生活印度重哲學的宗教所以沙門團的不知主義等都是以知識為不足表彰真理而大家傾向無分別的體驗生活西方的哲學與宗教為完全不同的兩個系統希伯來宗教的輕視知識著重於敬虔的信仰生活我想附帶的說到中國佛教的一面佛教傳來中國發展為有力的禪宗但也有兩大派一知之一字衆妙之門二知之一字衆禍之門這是對於知的兩個相反態度禪宗下的荷澤派有圭峰大師他說知之一字衆妙之門此知雖與一般的妄識不相同而到底是對知的極高讚美後來禪宗下的南嶽派批評他把衆妙之門的妙字改成禍字這是對知的不同看法不但妄識不對有一真知在也還是有所著的妄待真起所以知為衆禍之門被稱為正統派的禪宗南嶽青原門下不重經教而高揚不立文字的特色只要行者死心塌地參究去就好至於教理文字甚至看作禪悟的大障礙可是在圭峰大師即主張教禪一致這豈不是佛教禪宗二派對知的看法不同從上面看知識本身定有問題若知識是絶對好你想還會有人反對嗎知識的反對者都極聰明可見知識本身一定有毛病在若知識是絶對要不得你想還會有人推崇難道由知識而來的文明燦爛真是可咒詛的嗎知識是有它的價值與好處的佛教徒對知識的看法究竟如何應該根據正確的佛法來說明它二佛教的知識觀一知識的缺點可從四方面說一知識的片面性知識是片面的是一點一滴的不但宇宙人生的最高真理知識不能充分去把握就是現象的事物繁多人類對它們的了解也是從一點一滴的聚合而來識在佛法中是了別的意思了是明了別是區別宇宙本好像混沌一團由我們的區別它分別它的彼此不同而逐漸了解它所以知識的本身逃不過片面與點滴的限制如粉筆眼看它是白色的長圓形的手觸它是堅硬的粗澀的敲之有聲嗅之有粉氣甚至看到工人怎樣的把它做成粉筆的性質形相作用都經過我們五根所發識的實際體察又經意識的綜合而明了我們對粉筆的知識不是一下就來而是從多方面一點一滴的聚合然後才了解粉筆的全面粉筆如是世間的一切知識無不皆然因為知識是片面的一點一滴得來的所以看到外面不一定就看到裡面知道這樣不一定知道那樣部分的還不知道這不必說就是都知道了也每每顧此失彼重此輕彼所以佛教稱此為擔板漢能完全徹底了解一切事物的表裡始終這不是常人的知識所能做到的如教育界每說教育萬能教育才能挽救國家民族的頽運工業界卻說工業的建樹才是救民生建國家的基礎乃至軍事政治法律家等大抵重視自己這一套各執其是強調自己所重視所了解的片面知識還有無數的重要知識被他輕視甚至一筆勾消這怎能作為世界人類全面而整體的計劃彼此間的顧此失彼重此輕彼引起相互間的摩擦鬥爭弄得愈來愈不對也就難怪老莊等反對知識了寓言說如蛇頭與蛇尾相諍蛇頭說你尾巴小只享受而什麼都不做每天靠我養活你蛇尾說你只知道吃沒有我怎能走路諍論的結果互不合作於是蛇頭不吃蛇尾繞在樹上幾天之後大家都完了這便是只知自己的一部分有用而不知相互存在的關係內在相依的聯絡關係資本家輕視勞工的功績而勞工仇視資本家也只是這種毛病弄到勞資不能合作世間人的知識由於知識自身的片面性點滴性所以不但不能把握最高真理就是事物相互關係性也每每忽略而錯誤只以自己所重的片面知識拿來作為一切知識的基礎衡量一切這怎麼行這是知識本身缺點之一二知識的相對性知識的本身是片面的點滴的總合故常忽略整體而偏執部分而且也是相對的知識的相對性可從知識的兩方面說知識的活動與表達不外乎內心的思想與外表的語文若離開了思想語文即不能成為知識知識的特性是遮他顯自的如見紅色即不是白色等沒有光明即不知黑暗有虛假才能顯示真實這即是知識本身的相對性佛法稱此為二二是一切認識的形態沒有它就沒有認識作用的可能如大海波浪若每個浪的大小動態都是一樣你僅能了解是浪而無法表示那一波浪使人明了為那一浪因此非有突起的大浪不能顯出旁邊的小浪沒有大小高低的形態作比較你能說出什麼呢故知識必須在相對的形態與作用中表現出某事某物來所以識的字義就是區別如說有便區別了無有與無在人類的認識中是相對的區別才能明了因知識的本身是相對的所以它不能了達絶待的一切而無外的究竟真理再從心識來說知識有能知所知能知是心識所知是認識的對象當心識了知對象時卻不能知認識的自身心不自知縱然自知心念的生滅動態這還是後念知前念決不是同時在一念中具有能所的認識否則能所就混淆不分因此知識只能知道相對的世間不能知道絶對的境地佛法說對相待而說絶待絶待還成相待又如這是一邊那是一邊於此兩邊間說名為中然而說到中中是對邊說的離中無邊離邊無中邊與中是相對的可見我們的思想語文所論說的中道絶對也早就不是絶對與中道了口說與心想的知識永遠觸不著絶對中道的邊緣這不能不說是知識的缺憾三知識的名義性人類的思想語文都是名字名字是心想所構畫的假名符號並不就是物體的自身如心裡想火口裡說火火是名字若名字代表了真實想火火應燒心說火火應燒口事實上心想口說並沒有受到火的燒灼可見名字並不就是那物體的實相但人類從來說慣了便生起錯覺一聽到火一想到火的名字甚至聽到上帝聽到龜毛兔角都好像有此一物好像就是那個東西有人覺得名字是假立的但假名確表達真實的意義義是名字所表示的有人說到想到某一名字就覺得確實表示某一意義其實一個名字中含有的意義很多如說書不但代表書本書籍同時寫字也叫書關於一名多義我們翻開字典就可看出反過來一義中也含有多種名稱如房子可以叫屋宅樓閣這不是一義多名嗎一名多義一義多名完全要依上下文及習慣而詮定的並非某名即是某義某義便是某名這就是說明了名與義沒有決定不變性因為名義的不決定故隨說一名一義每成諍論若能心平氣和的相互研究也許會知道名字儘管不同而意義卻可能相同反之雖然使用同一個名字但不妨有多種解釋在這裡我們了解到知識是建立在名義上的名與義是依人類的習慣使用而形成的如小學生寫字少了一筆我們就說他寫錯了然而古代的名書法家每因他少了一筆我們就照著他寫覺得可以這樣寫知識不離名義性所以有不決定相對流動變化的特性人類的知識每為名義的習慣使用而互相紛諍糾纏不了宇宙和人生都是衆緣所成的如幻如化沒有決定的實體因此世間的名義知識表示它而不能直顯它的絶待性真理這是知識的本性如是對於絶對真實是無法把握的四知識的錯亂性知識的錯亂性很大如一杯水把筆插下去即見筆形曲折或見天上雲動以為月行或眺望馬路見前面越遠越小但這些雖都是知識上的錯亂還容易改正而知識的根本錯亂卻習非成是難於糾正了如宇宙萬物的流動變化息息不居哲學與科學能推證為變化但常人即不能了解其中的變化如講臺平穩不動的放著然依科學說桌子的內在實是時刻在不斷地衝激流動只是繼續保持平衡而已講臺面是平整的若以放大鏡一照即刻現出了高低不平的現象但不平整與不息的動在常人的認識裡連科學與哲學家都在內如直觀對象也不能了解今天看如是明天看也還如是因此對桌子生起了一種不變的實在感這就是知識的根本錯誤他不但不知外物的流動變化即連自身的變化也不覺知如老人是由孩子的慢慢轉變而壯而老明明孩子與壯年壯年與老年有很大的變化但他卻不承認以為現在的我與過去的我還是一樣這是不能理解世間的諸行無常義有時雖聽懂了無常的名義但在諸法的事相上不見無常變化因此每在無常變化中又執實執常這即是由於知識的根本錯亂而來佛法說常是衆生知識的顛倒錯覺的確在衆生的觀念中世間諸法是常實的這不是顛倒錯亂嗎我們觀察桌子知是木料與人工等關係所成科學說人是由九十幾種原素的集合佛說人是六大假合人與物體都是多種因素的復合體世間那有絶對的獨立物體因此諸法皆是緣起關係的存在顯現就是極小的電子科學也還說是復合體但一般人就不能體會緣起的關係性特別當自己在做事時很少見到我與他人的關係無意中總把自己看成一獨立的個體個體在佛法中稱為一自己獨存稱為我一與我是衆生知識中的根本錯誤在緣起關係的決定下世間沒有絶對的獨立個體沒有真實獨存的我與一而一切衆生從無始來即有我的獨一觀念這又不能不說是知識的錯誤知識對我與世間的緣起事物尚有如此倒亂錯覺更深更妙的真理自不能體會知識中既包含了許多錯誤以知識來說明事物怎能恰合真理沒有顛倒與種種流弊産生如人有時為了一個名詞的認識不同而起諍論有時把虛假當為真實把真實看作虛假這都是常有而難免的錯亂唯識說外境唯識所現不像常人所見為客觀外在的中觀說一切法無自性不像常人所見為實有的這都是表示了一般知識有著根本的錯亂性還有有人把知識看為人類痛苦的根源我們仔細想這話也有他的道理因為人類的私欲由於知識的我見錯亂一直與知識不相分離混沌愚癡的人知識未開欲望也低得少為足等到知識高了欲望也就大起來物質金錢名位不能滿足他的私欲因而諍論欲望跟著知識而擴大發展知識即成了人類苦痛的根源難怪有人要咒詛知識然而知識最低下的衆生也還是有他的錯亂有他的私欲所以知識低欲望低並非是理想的並非是問題的解決一般的知識離不了私欲知識大私欲也就隨著知識而擴大知識低的他的欲望也低如只想做一家之主占有家的一切支配一切可是知識高的發展他的無窮私欲他希望占有一國或做整個人類世界的支配者控制者各人都有私欲與知識人類在私欲與知識的不斷發展中世界成了鬥諍的沙場最顯著的例子如山地人民的知識低生活淡泊清苦但他們的欲望少多少好一點即能暫告滿足而都市中的人民知識高他們就是住的洋房坐的汽車還是感到不滿足這就難怪老莊要討厭知識了二知識的長處知識有錯誤的一面然而也有好的一面現在即以佛法的立場說明知識的好處一以分別識成利生事現世間的衣食住交通都因知識的發達而有了長足的進步今天農家的耕種也進步到機械代替人工比起從前來真不知好得多少倍從前人去臺北艱苦的跑上兩三天現在搭飛快車只消一小時零幾分坐飛機當然更快這都是從知識的發達中來你能說知識發達不好嗎所以人類的日常生活在知識發達中得到許多便利改善現在農工居住的屋子比五千年前的王宮茅茨土階有時還好些古時的道路不寧土匪衆多若人民要輸運財物就得請保鏢的現在以火車輪船運貨絶少匪類的搶奪危險顯然比從前好多這能說不是知識文明的好處嗎世間的利用厚生非知識不成大乘法說初學菩薩向上向善的正行即由分別知識的引導由知識分別知善知惡了解世間的因果事相知善而深信善法的價值於是不斷地努力向善這才能趣向證悟的聖境得平等無戲論的根本智不但初學的菩薩在自覺的聖境中雖遠離了分別妄識但菩薩行的特點在利他故從平等的根本智中又起後得的分別智此即通達事物度生的方便智從菩薩的修行證悟利他的一切事業中看佛法始終重視知識佛法把知識看為是自利證悟的前導利他妙行的方便離去了知識即不能成就自利與利他的事業這是佛法重視知識而說明了知識的崇高價值佛經說周利槃陀伽根性暗鈍教他讀經他記得前一句即忘掉後一句但佛陀是慈悲的始終慢慢教他誘發他學習他在佛陀的慈悲教授策勵下終於證得了阿羅漢果雖證聖果但不會說法請他開示他只會說人生無常是苦此外只有現神通了他的話錯嗎當然不錯但他缺乏知識故證悟了也不會說法佛弟子中的舍利弗就不同了他未出家前即通達吠陀經典出家證悟真理後他為衆說法在一個義理上能滔滔不絶地講七天七夜還沒有講完佛讚嘆他智慧第一善入法界又如近代的印光大師他是老實念佛的淨宗大德為無數的信衆所崇敬然老實念佛的不止他一人何以其他人不能發生廣大的教化力量還是因為印光大師不但切實履踐而又有對儒學及佛教的深廣知識阿知識是菩薩攝化衆生的要門故瑜伽師地論說菩薩求法當於五明處求從這些事實看即知佛教對知識是多麼重視了分別識是能成利生大用的二以分別識成深信解佛教與希伯來的宗教不同希伯來宗教厭惡知識重於感情的信仰佛教卻說有信無智長愚癡這肯定了無知的信仰會造成愚妄的行為不是合理的正信所以佛教的正信要透過知識的考察以知識為信仰的基點解得分明信得懇切這才是合理的正信如對佛法的正確知解愈高愈深信仰也就愈深愈堅沒有經過知識的信仰好像很虔誠其實是非常浮淺例如害病祈求神賜豫健康病真的好了於是信神然如再有病痛求神無靈他的信仰便要動搖了所以佛教主張從深解中起信仰確信透過知識的信仰才是深固的這一點與希伯來宗教理智與信仰衝突完全不同中山先生也說有思想而後有信仰這與佛教的從正解而成堅信是一致的佛教說信仰的最高度即與智慧融合一體可見知與信不但沒有衝突而且是從互相助成而能達成統一的有了高度的智慧才有更深刻堅固的信願這是說明信仰建築在理解的基礎中理解不能不說是知識的力能這是知識的又一長處三以分別識成無分別智世間的知識雖有缺陷而不能證知絶對真理但如能根治錯亂而引向更高度即成通達真性的出世間無分別智有人以為世間的分別妄識不能契見真實反而是證悟的大障礙所以一味訶毀分別識不知道在沒有證得聖智前如不以世間分別識分別善惡觀察真妄即無從修行誰能直下從無分別處著手呢不解不行怎能證得解脫所以太虛大師在大乘宗地圖釋中肯定的說佛法大小宗學無不從分別意識處下手以此為修行的關鍵若一味厭患分別識事實上這些人是誤會佛說的無分別了不用分別識為方便不但學佛者無從信解修習佛出世間後得智也就沒有化世的妙用了某些人似乎一向厭惡分別的知識而不知人類的明了意識為人類的特勝而為人所以能學佛成佛的要點如貓犬蟲魚牠們也是有心識的但牠們的分別意識極弱極簡略不能善了名言牠們的分別識既弱私欲也不太強分別識如為悟證的障礙牠們比我們少得多簡單得多就該比人易悟真理了但事實不然佛只說人類易成佛道因人的意識分別力比天還強也唯有強勝的分別力才能分別善惡真妄才能痛下決心依法觀行才能契悟絶待的真性所以佛法不否認知識本身的缺點但認為若捨棄了它的缺點把握它的長處即是證悟解脫的正因有人認為分別識不能契真如再以分別識修觀豈不分別愈多與真理愈遠這是不懂緣起相對性的機械論法豈不見如一木再以一木相摩擦似乎木積越多而實則兩木相摩即有火生火一生起木也就燒燬了又如青草如多多堆積起來就會生熱而迅速朽腐下去所以學佛而以分別識不斷地觀察乃至於定中觀察正觀諸行無常諸法無我法法空寂即能契悟諸法的空寂相在契證平等空寂中有相的分別識也即泯絶而不起了故佛教的破除虛妄分別識決不是一味厭絶它反而是以它作為引生出世間的平等聖智的前方便這所以修習方便中止以外有觀定以外有慧經中常說如以小楔出大楔一樣還有如雹墮草草死雹消以藥治病病愈藥廢之喻沒有小楔深陷在管中的大楔即無法取出等到大楔取出小楔也就自然落下了學佛以分別識觀破分別證入無分別聖智分別也即斷捨了就與此理相同佛教重無分別的智證但也重視知識與印度宗教中專重瑜伽禪定的學派精神大有差別所以佛法的特點在觀慧佛法認為知識雖不能表詮真理但它有引向真理的作用如有人問從精舍去新竹公園向那裡去我們就告訴他從此向北轉幾個彎等他依著指示的方向一直走去自可達到公園直觀公園的本身雖無所謂南北也無所謂彎曲但我們從此去公園確有它決定的方向與曲折如不信所說以為公園自身並無南北彎曲我們相信他就永不能到達新竹公園分別識而為無分別智的方便是佛法確認的道理所以在證入以前有信解行三現代知識應有之反省從上面看知識有缺憾錯誤的一面也有優越良好的一面知識若向錯誤的一面發展會造成人類的無邊苦痛若著重道德與真理而去發展知識亦能引生人類的無邊幸福知識的本身有好有壞而不是決定好決定壞既不是妙門也不是禍根問題看我們對它的運用如何近代的知識進步人類受到嚴重的威脅與苦痛大家應有深切反省的必要我在菲律賓時知道西洋神教徒在宣傳世界末日的快要臨到現在原子彈的爆炸力比過去擲於廣島原子彈的威力要大多少倍了而現在氫氣彈的威力比原子彈的破壞力更大還有死光等武器比氫氣彈的威力更可怕這些不都是近代文明的結果嗎所以人類世界即將接近毀滅的末日了他們的目的如為了宣傳為了誘惑愚人入教不妨原諒他們如認為事實站在佛法的立場看絶難同意我們知道人類從有史以來凶惡的武器即不斷地出現可是你有不久我也有了誰也不能純以武器征服誰或者雙方勢力相等雖有凶惡的武器而不敢用如毒氣或者一種武器出現有極大的破壞力但隨時又有防禦它甚至克制它的武器産生所以以新武器的威力憂慮人類毀滅宣傳世界末日全是一篇鬼話真正的問題是科學發明的原子等不使用於和平利人卻以此為殺人或控制世界的武器這才豫人類以恐怖威脅的無限苦痛問題在人類自己對知識的偏向與運用不當這才發展知識而反被知識所威脅傷害近代知識文明的迅速發展是難得的但知識發展的路向有兩種偏向造成畸形的病態的發展一精神知識趕不上物質知識近代的知識發展先是從物質界發展起不斷地向外追求物質的知識以物質為對象而考察研究實驗利用因此而忽略了精神由於起初是重於自然界中天文地理物理的知識慢慢造成了物質的文明以此偏向物理的方法去研究生物等生理學以及心理學也處處覺到心理受到物理的生理的限制與決定他們就是研究心理也是把內在的心識看成了外在的東西物化一樣去考察所以研究動物心理兒童心理成人心理變態心理群衆心理等等都著重在受到物理因素生理刺激反應以及受到環境風俗群衆的影響近代的知識不但物質界的知識是物化的心靈界的知識也是物化的以此去研究心理心理便成為物質的屬品了真正有情的生命活動心理活動不但從外界去觀察從生理刺激反應等去了解更應從自身去觀察分析體驗人類內心的自覺活動心理的無限復雜無限深奧決不是現代科學知識向外探求所能徹底了解的佛法對有情心理的體認是著重於自身的反省觀察與體驗佛法的定慧換句話說即以自心去把握自心審細地透視自心這是一種自覺自證的實際體驗唯有這樣才能覺察到心理活動的自覺性主動性內心的無限復雜心性的究極奧祕若把心識活動當作外在的東西去研究人便看成機械了近代的某些統治者即把人看為機械一樣的利用這才缺乏人性沒有同情只是盡量發展個己的私欲利用迫害奴役的一切技巧以妄想達成控制整個的人類世界這種錯誤暴虐的行為是從知識偏向發展所引起的嚴重危險二道德趕不上知識知識的錯亂性與私欲不相離所以知識的發展最易引起個人自私欲的擴展然世界的知識本來也不離向上向善的德性知識發達而能促成人與人間和平共存富裕康樂即應重視道德的發達至少要做到道德與知識並駕齊驅使知識受道德的影響受人類德性的領導巧為利用不致由於私欲的過分發展而損害大衆的和樂可是近代知識文明的發展偏向於物質無形中受著唯物思想的支配在自然界中在物理化學生物學中是不能發見道德因素的道德原是人類文化的精神世界的産物因此西方的物質知識愈文明人類道德便被輕視懷疑而日漸低落固有的宗教道德也趨於沒落到現在西方的神教也盡是利用物質的財物作為傳教的工具了以此而宣傳宗教實表示了神教的走向沒落故人類道德在功利現實物欲泛濫的今天不堪回首西方的部分人士也要唱出道德重整的口號了站在佛法的立場看人類知識的發展應盡量約束自我的私欲使知識服從真理與道德的指導趨於道德的世界真理的境域若能服從真理尊重道德即能防止人類私欲的泛濫使損人利己的私欲化為自利利他的法欲這樣知識愈文明人類所受的實益愈大也即更接近於道德的真理的境地可是近代知識文明偏向了功利物質的一面忽視了精神的宗教道德故人類知識的發展反成了知識的奴隸縱我而我愈不自由我是自在自由義制物而反為物所控制這才面臨無邊的苦痛與毀滅的威脅有些科學家政治家患著原子武器的恐懼病其實真正可怕的並不是這些近代世局混亂多少善良人民被關進了鐵幕處於鐵幕鬥爭的世界中人人變成了仇敵變成了囚犯據鐵幕透露出來的消息說人民正普遍的陷於心理變態虐殺狂神經病在仇恨鬥爭殘酷的世界裡人民還有正常而和樂的心情嗎想毀滅別人必為自己所毀滅在自由世界裡據報載今日美國的精神病也與日俱增每月約增加一萬人這是多麼可怕的報道人性的瘋狂化憂苦的加增正說明了現代世界的混亂與苦痛這並非是原子彈死光而是知識畸形發展的結果故現代的知識文明西方為主的文明應有徹底反省從人類自身的德性求開展皈向佛法依於佛法精進地修學初步以道德克制情欲的泛濫深一步修學定慧開發自己的無邊寶藏發揚佛陀的慈悲精神以指導人類的文明人類能反省自己克止私欲體察自心使知識與道德物質與精神的知識並進合而為一這才是我們所想望的人類世界新的知識文明唯慈記
