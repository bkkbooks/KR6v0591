body:
  text: 人性一人與衆生性衆生之通性佛法雖普為一切有情而真能發菩提心修菩薩行而成佛果的唯有人類如唐裴休的圓覺經略疏序説真能發趣菩提心者唯人道為能所以雖説衆生都是佛法所濟度的對象而唯有人類有智慧有悲心有毅力最能承受佛法的熏陶佛出人間就是人類能受佛法教化的證明一切衆生各有他的特性人有人的特性必須了解人在衆生中的特勝以人的特性去學佛切勿把自己看作完全與一切衆生相同同是衆生衆生即有衆生的通性今略舉三點説一依經説一切衆生皆依食住衆生生命的延續必須不斷的獲得營養人是這樣雞犬蟲魚等也無不是這樣佛法説食有四種一段食像我們煮的飯和吃的菜都是分成段落的吃下叫段食二觸食六根與境相觸也有延續生命的力量特別是身體的觸如按摩運動洗澡等三思食即希望衆生要有欲望才能維持生活一個人雖是老病相侵但他總是要想法子活下去這叫思食四識食人類的意識因執著自我身心執取自體所以身心雖壞而卻會生死死生流轉不已前二種食屬於物質的後二種食屬於精神的這是衆生賴以維持生命使生命延續的因素不但人間具備這四食鳥獸等也是全有的思食與識食為一切衆生所必有的而對於生命的延續有著最重要的關係段食與觸食都不過能延續這一生的生命而已總之依食而住是人類與衆生相同的生存需要營養但這是要適量的而且按時不斷的補充如長明燈要時時添油時時修淨燈心否則就會熄滅我們的段食也是這樣要按時進食多了會成病少了就挨餓不吃即活不下去這是生存所必要的而也是麻煩的事如單靠思識二食能生活下去這問題比較簡單些可是大部分特別是人類要依賴段食才得生活一切的努力活動幾乎無非是為了解決生活然物質的營養不但是人類畜生等也如此在人類社會如不把它當問題處理社會與人類都是不得平安的但僅將這問題解決了不進求人類特性的發揮與完成這對人類問題的癥結還是不得解決人所以被稱為人雖有與衆生一樣的通性但又有超越其他衆生的特性太虛大師曾經説人類的教育如專在穿衣吃飯上著想這是動物教育與一般動物並無大差別這雖似乎説得刻薄但人的教育解決人的問題不能局限於這些也是確實如此的二一切衆生皆以愛欲而正性命這是圓覺經所説的愛欲經文作淫欲然淫欲實不遍一切衆生非生死根源人類的綿延不絶是由男女淫欲的關係淫欲側重在人類可通於欲界地獄趣亦不通如約一切衆生説應該為愛欲人類有男女性別才互相配偶人是由父母的淫欲而生的從淫欲而生的呱呱墮地的小孩經説雖不知淫欲為何而實不斷愛欲的隨眠潛力到了成年的時期淫欲即漸漸地發動起來所以人類把男女婚姻看作傳宗接後成家立業的唯一大事由淫欲而有生命的出現這唯有人類與一分動物雞犬等是如此依佛法説衆生的生命不都是由淫欲而有的如化生或濕生的一分不由兩性的淫欲也能現起生命的照科學家説有的下等動物是不分雌雄的由一體的分裂為二作用就有新的生命延續下去所以佛法以為男女欲事為人類與欲界天的特徵一分的鬼畜也有而上二界與地獄衆生都是不起淫欲的這樣如説一切衆生皆以淫欲而正性命這是不了義的可能是譯者不好究竟的説一切衆生皆以愛欲而正性命男女的愛欲為愛欲中的一種為欲界尤其是人類極有力的愛欲一切衆生繫縛力最強而最根本的是自我愛佛説愛無過於己人類的一切行為總是為自己打算為了自己甚至不惜用殘酷的手段毀滅他人或其他的衆生即使病得非死不可總還是想活下去真要死了更希望死後的存在佛法名為後有愛佛法肯定生死的根源是愛欲愛欲即愛著自身而推動向外取著各種境界男女淫欲也是一種的動力一切衆生都為此愛欲繫縛得動彈不得所以在生死海中頭出頭沒儒書説飲食男女人之大欲存焉又説食色性也色即男女欲性是生來就是這樣的依佛法説食飲食即一切衆生皆依食住色男女即一切衆生皆以愛欲而正性命但佛法所説的食與愛不但飲食男女這不過但指人類説這雖是人生的大問題但決不是人類所獨有的至少大部分衆生是相同的人類與衆生同為這食色食與愛的強烈束縛因此而作出種種罪惡所以有方法教育政治法律等來規範他以減少一切不必要的罪惡三自我感也是一切衆生所共有的本來一切衆生都是互有關係的而構成衆生的因素也是一切法不離一法一法不離一切法的可是在緣起的和合中衆生是形成一獨立的單位自他間現出彼此的差別各成一單元而不斷的延續雖然息息相關人與人間沒有絶對的獨立性而因緣和合所現起的形相有相對的差別如水與冰水本是無分別的一味相融的但結成的冰塊就各各不同這塊大那塊小那塊化成水這塊還是堅結的衆生也如此本來息息相關相依相存由於衆生的無始蒙昧不與平等一味相契合而形成獨立的形態於此因緣和合的相對自體有自我感不能了悟無人無我無衆生的定性衆生一個個的獨立形態佛説是依五衆蘊和合而生這五衆和合而成的單位內有復雜性而外似統一一切衆生的自我感都將自己從一切中分離出來意解作一獨立體一切問題就層出不窮了衆生都有心精神活動因此也就都有自我感對自己的身心家屬等能深切的注意愛護他對他人的卻漠不關心不但人這樣牛羊也是這樣但自我感不能像人那樣的明晰罷了息息相關法法緣起而衆生都看作獨立性起真實的自我感這是衆生共同的錯覺佛法中的無我就專為對治它的有了自我感處處以自我為中心不論是食是色是名譽是權利都想占有他使一切供給我從屬我為我所有每每只顧到自己的生活而不問他人的苦樂強取豪奪欺詐控制奴役斫殺鬥爭一切的禍患就無可避免了根本的自我感佛法稱為無明它可以統為一切煩惱中的根本特性凡是與真理相反的認識活動都有無明存在從這煩惱根本的無明而發展出來主要的阿含經裡説有三類見愛慢愛是自我的愛好人總是愛自己的生命滿意自己即使真的不好自己也總是要原諒自己不但愛現在的還愛未來的生命由於自我生存引發外物境的愛著為現在而愛外物也為未來著想而愛外物如人為了怕米貴柴荒即多買些藏在家裡就是雀子蜜蜂也為冬天而預先積蓄食物自我愛與境界愛是衆生相共的見是執著主要是執有確實的自我依佛説我是沒有真實自性的只是五蘊和合的假名但在執有自我的一切衆生卻頑固地執有自我的存在慢是自我的重視因此而對他出以輕蔑這三者都是自我感中內含的根本特性至於佛法常説的三毒貪瞋癡是由這微細的發現到粗顯煩惱如瞋恚是由自恃輕他的慢而起從輕厭他而瞋恨他貪耽戀五欲都是從愛而來顯著的不知因果不知善惡等愚癡皆由於錯誤的妄見總之這一切可泛稱為無明而實為自我感的發展人類固然有此一切衆生也不能例外人之衆生性衆生有各各的特性姑且不談先説人的衆生性人是衆生有衆生的一般特性雖不是別的衆生也有類似衆生的特性這雖是人類所有而不是人類特有的人性衆生的種類極多通常分為五趣天人畜生餓鬼地獄一道以內更有很多的分類我們但知地獄的地獄天國的天國而不知人間的天國人間的地獄其實在人間人是有著類似諸趣的性質有人罵別人為畜生也許這人沒有合乎人性的正軌而多少帶有類似畜生的行為地獄是極重惡業所墮落的苦地方略有二類一熱地獄到處猛火洞燒二寒地獄冰雪交加造了惡業的衆生墮落在這大熱大冷的地方什麼都不關心一直受著這極熱極冷的苦迫此種境界我們人間也常可見到或住於極冷處或住於極酷熱處或由於貧窮在冰雪的寒天挨冷在酷熱的暑天被逼工作晒得發昏這不是人間的少分地獄境界嗎要救衆生出地獄苦就要將這人間活生生受著地獄苦的加以救助餓鬼分三一沒得吃二吃最壞的東西來維持生命永遠餓著肚皮三受人類的祭祀食或有或無這種情形人間更是遍地都是特別是遇到旱荒水潦的年頭或者兵火疫癘弄得赤地千里食糧無著大家在飢餓恐怖的生存線上掙扎過活這不是人而現成餓鬼一樣的情形嗎畜生是被奴役的如牛馬被吞食的如豬羊被豢養玩弄的如籠中的小鳥外國人的哈巴狗被殺害的更多更多這世間的人類過著被奴役被殺害被玩弄被吞食不是到處都是嗎多少人還過著畜生的生活呢此外畜生是無慚愧的父母兒女間也會淫亂殘殺不知恩情不知仁義如人而也如此即會被呵責為畜生本論著重在人間佛教尤其要簡別天化的佛教所以對於傳説的天神應該多説明些高級的鬼畜也叫做天如四天王中毗樓博叉是龍王毗沙門是夜叉王高級的天欲界空居的與上二界是沒有鬼畜的這些鬼畜天都含有表法的深意如乾闥婆他是戀愛的愛神會彈琵琶作樂為諸天的歌神即音樂神在印度神教的傳説中如跳舞演戲唱歌可以生戲樂天如乾闥婆一樣那麼在人間醉心於戀愛醉心於音樂藝術的如著重於低級的情欲即是人而含有乾闥婆的性情了羅剎男女不同女羅剎是漂亮的專門誘惑男性使男性為他而死男羅剎卻性情凶劣形相醜惡專與人類為難或使人失心或攫人而食這樣的男女人間豈不很多娼妓們同女羅剎的行為相倣那些故意作弄人類殺人無厭的劊子手與男羅剎有什麼差別夜叉為諸天所役使的如人間政府的衙役胥吏一樣在天上服務的時候侍候謹慎一到人間就肆無忌憚吃人肉喝人血強迫人間要用活人去祭祀他這與壞政府下貪官污吏欺壓人民也並無二樣龍的特性是脾氣壞暴怒起來什麼也不管刮狂風降暴雨將人間的一切破壞得一塌糊塗人間那些暴君也是這樣的不問人民的死活一意任性胡為頂有意思的是阿修羅與帝釋了他倆本來是親戚阿修羅的女兒嫁給帝釋照印度的傳説阿修羅本來住在須彌山頂的是從前的忉利天主後來被天帝釋攆走了阿修羅便住在須彌山腳下的海邊彼此間結下了怨仇這等於世間的強國併吞弱國或新來的民族驅逐土著而占有他的土地一樣他們是時常作戰的帝釋勝了將阿修羅的女兒虜來做妻妾阿修羅也時刻惦念天上的美滿生活動不動就打上來想奪回他的原地這故事在印度是有事實背景的阿修羅有兩大毛病一疑帝釋有時與他談和平他因為過去的經驗憎厭帝釋的狡詐對他存著絶對不信任的心理所以造成猜疑的原因全是由於仇恨如德國與法國一樣兩國是不易取得互信而合作的他猜疑成性連佛説的也不相信佛對他説四諦他疑佛對帝釋説五諦佛對他説八正道他又疑佛對帝釋説九正道二嫉妒他懷念須彌山的光榮如意非常嫉妒戰勝了他的帝釋由此猜疑與嫉妒養成好戰的心理帝釋與他的特性相反一提倡和平推行正法帝釋是既得利益的保持者他當然重視和平將人的領土奪來了與人談和平無怪阿修羅不信任他他的推行正法也像治國者的文教治國二他是享樂者與那些天女們盤桓在一起到了窮奢極侈的享受境地這如文明成熟而走向糜爛衰落一樣傳説他到人間來從佛聽法但一回到天國什麼也忘失了世間的高貴尊榮者為享受五欲而沒落對人生崇高的理想自利利他的事業也想不起去做了天龍羅剎夜叉乾闥婆阿修羅等各有他們特殊的性質都不是人的正性人的性情無論近於他們那一種就不能使人性得到正常的發展不能使人性淨化而完成所以修學佛法的應重視人性的合理化以人生正行到達人性淨化對於衆生通性或衆生所有的特性應減輕他揚棄他使充分發揮人性以進成佛道二人性與佛性人含有衆生性也含有佛性而人又有人的特性關於人的人性衆生性佛性先泛説世間一般的相似的見解一般以為人有神性也有獸性這是浸淫於神教的西洋學者所説他們認為人也帶著獸性的成分如人的性格發展到極其殘暴酷毒喪失人性這與禽獸是沒有分別的基督教的神學説人可分為三類一體即生理本能的如純為肉欲的發展想到什麼就任性地作去全受肉體的欲望所支配這是墮落的與獸性相近二靈神性上帝賜給人類的靈性是盡美盡善的如純依這靈性而活動即得主上帝的濟拔而上生天堂永生不死三魂上帝將靈性賦與人類靈性與身體結合而産生的是魂雖不是純屬於情欲的但也與神性相隔這有點近於真妄和合而有的識性神學的人性分析以為人類專向肉欲物質的方面去追求必定墮落向靈性的方面去發展必能生天中國的書經説到人心與道心大意是人心惟危人類受了情欲的衝動想求得肉體的安適這種物質的貪求不已可能發生種種的危險道心惟微微妙難思的道心就是契合天理的心中國一向重視這二者的協調綜合允執厥中以道心制人心不偏向於情欲以人心合道心不偏重於理性到了理學家也許受了不了義的佛法真常唯心論的影響以為人心即人欲道心即天理而主張去人欲存天理佛法所説的人類特性不像儒者所説的人心他是與道心相對而偏於人欲的也與神學者的魂不同他僅是靈與肉的化合物不免偏向於靈的生活現在所説的人性除卻與衆生類同的人的衆生性與佛類同的人的佛性而正明人所特勝的人性人的特性是什麼有的學者説人是有手的動物人有兩隻手可以做種種事製造發明實為人類的特色有的説人是唯一會説話的動物言語能將自己的意思發表出來使他人瞭解我的一切促成了人類文明的互相傳習其他的衆生音聲簡單雖有一些音號能傳達意思感情但是糢糊不清的有的説人是頭腦特別發達的動物所以人的思索力強鳥獸等的智力不及人類有的説人是會用火的動物將東西煮熟了吃還能利用熱力去發動機器等其他的衆生非但不能利用火見火就嚇跑了這些都是人類與衆生不同的但不一定構成人類的特徵最近報上見到有生下來沒手而會用自己的兩腳刮鬍鬚踏鋼琴成一有名的音樂師他沒有手但還是顯出人的特性啞吧不會説話但一樣的能讀書寫字會做種種事情至於火不過是説人類會利用火並不因為能用火所以成為人人的特性當然從有手會説話腦髓大能用火能創造器具等中表現出來但人類根本的特色不如説是人類的文化生活非常發達的意識活動佛出人間人身難得可顯出人在衆生中的地位這在佛法概論人類的特勝中依佛經所説人類具有三事不但超過了鳥獸蟲魚還超過了天上三事是一憶念末那沙勝末那沙即人的梵語與末那意同語人能思惟分別一切法憶念過去預期未來認識現在的都在意識中縈回不已人類具有這思量的作用固然能使人作惡而人類一切優良的知識文化都是從此而發生出來在衆生中人的思想最發達現代學者研究得人的腦部特別發達與人的豐富的記憶力思索力等有密切關係這是人類的特色腦與思想色與心的關係姑且不論而人的思想力確是勝於一切動物以及天神的末那能不斷的憶持過去量度未來思索現在人類文化的進步就是從過去積纍下來的經驗事實而用以考察現在推論未來才發揚起來憶念思惟佛法中更應用以啓發真實的智慧依佛法説生得慧衆生也有譬如蜂能釀蜜蟻能築窼蛛能結網它們不經過教學的過程便自然的會這樣這生得的智力即是本能但人類的生得慧經過學習發達成高深的智力其他動物從加行而起的智力雖也多少有一些但比起人來是太微渺了人類於本能的基礎上逐漸的學習學會各式各樣的語言種種知識種種技能這是人類的特點如不能善用人類的智力做起壞事來比其他衆生不知道要超過若干倍然如能善於應用那麼能發明一切於人類有益的事物制度真能善巧地運用思惟憶念淘練雜染的而擴充淨善的經加行慧的熏修即能引生清淨智慧成為人類學佛不共其他衆生的特色二梵行勝阿含經説以世間有此二法慚愧與六畜不共慚與愧梵語含義稍不同而總是連合説的人能知有父子師弟夫婦親友等人類關係因有此慚愧心才能建立合宜的人倫關係不致造成亂倫悖常的現象如沒有慚愧心像畜生那樣的不問父母兄弟姊妹亂攪一頓相殺相淫相盜相欺這成什麼世間儒家重視倫常家庭本位的道德雖不免局狹然確為人類道德的濫觴倫次第的意思人與人間有著倫次父子夫婦兄弟朋友等有著親疏的關係各守其位各得其宜的應有軌律佛法所説的法住法位與之相近人類的道德即建立於人與人的關係從家庭而擴大到種族擴大到國家擴大到世界人類儒者説親親而仁民仁民而愛物佛法説慈悲心的修習從親而中從中而疏次第擴展到平等大同的道德慚愧道德的發展應以周遍的擴大到一切衆生為理想對象不能如後代的儒者局限於家本位的倫常圈子然在學習實踐的過程中也還要有本末次第如佛法即以人間的人類為先拿殺來説殺人為最重的根本大戒殺畜生與殺人殺是相同的但論殺罪就大有輕重了甚至將鬼神殺死了罪也沒有殺人那樣重我們是人佛法為人而説人與人的關係是特別重要的如學佛而不知重視人與人間的道德泛説一切衆生這就是不知倫次不近人情俗語説救人一命勝造七級浮圖也顯出對人的重視但有的但知護生不知首先應護人這才但知放生龜鱉魚蝦蛇蛙鳥雀等動物千千萬萬地熱心救護他而眼睜睜地看著那些無衣無食的受災患病的人類卻不想去救濟他們這即是不知倫次從人的立場説應先救人類這不是輕視衆生而是擴展人類道德應有的倫次發心應廣大遍為一切衆生而實踐應從近處小處做起擴而充之以到達遍為一切衆生在人與人的關係中出家的如師長徒屬在家的如父子夫婦兄弟朋友都應以慚愧心履行應行的道德分宜但這決非孝順父母輕欺他人的父母愛護自己的同屬而排擠另一團體慚愧是從人類應有的關係中傾向於善的人或法拒遠於惡的人或法慚愧為道德的意向傾向於善良多多親近善知識聽聞正法制伏煩惱都從慚愧而來要有向善遠惡的自覺慚愧這才算具足了人的資格有人説樹也知道傾向光明狗子也會對主人表示殷勤負責守護然人是不同的人知道是非好壞雖不一定能實行或者作惡但即使做了壞事無意中會覺得不是心中總不免良心負疚那些殺人放火無所不為的大惡人有時也會意識到自己的不是雖然由於環境的熏染社會的習慣使某些不合理的行為竟也心安理得不能自愧但既為人類這種向善拒惡的自覺慚愧僅是多少不同對象不同而決非全無的所以雖為環境等誘惑或逼迫而墮落但人人有慚愧心現前而能導使改過自新有慚愧所以人是有自覺的德行的衆生他會從尊重真理尊重自己尊重大衆輿論中引發慚愧而勵行入情入理的德行其他的衆生從本能所發而不能不如此作所以墮落不深地獄畜生餓鬼是很少會因作惡而墮落的人有自覺的道德意識知慚知愧也有故意作惡無慚無愧所以人特別是學佛法的墮落也墮得重上進也上進得徹底墮落後可生起向善離惡的力量悔改自拔也是人類的特色有以為天空的行雁齊齊整整的排成人字或一字説這是雁的知序道德狗會守門説是狗的有義道德不知道德是重於自覺的可以不這樣作而覺得非這樣作不可這才是道德的價值或不道德的良好的習慣只可説是道德的成果而已如天國的良善勝於人間但這還不免墮落多於勝進因為自然而然的如此行去也算不得崇高的德行所以如大家都那樣的胡作妄為如了解為顛倒罪惡那必要立定腳跟任何苦難都不妨卻決不附和遷就這才是人性中道德力的高尚表現德行即梵行梵行為清淨而非穢惡的行為這是人類所有的特性三勇猛勝娑婆世界堪忍的人類是最能耐苦的只要所做的事情自覺得有意義即使任何艱苦的情況也能忍受毫不猶豫信為欲依欲為勤依欲即願欲是企圖達成某一目標的希願勤即精進是以積極的行動去努力完成從願欲而起精勤即從內心的想望引發實踐的毅力提起精神去做時就是刀山火坑在前也要冒險過去這種剛健勇猛的毅力為人類特勝的地方牛馬也是能耐苦的但那是受到人類的控制頸上架了軛身上挨著鞭策這才會忍苦去工作如沒有人管制牠牠是會躺在田塍休息的人類雖也受有生活的逼迫但每能出於自發的覺得自己應這樣做的即奮力去做成這種願欲與精進人類也常是誤用而作出驚人的罪惡然實行菩薩道難行能行難忍能忍即由此勇毅而來經上説人的特勝中這三者是衆生與諸天所不及的雖不是盡善盡美的不如菩薩的清淨圓滿但已足以表示出人類特點人性的尊嚴我們既然生得人身應利用自己的長處日求上進人的特性衆生也多少有些唯人能充分發揮出來才叫做人人性中也含攝得一分佛性將這分佛性擴充淨化即能與佛同等怎樣是佛概略的説具足三事大智大悲大雄佛的特色正確的普遍的證覺得大自在是佛的無上智佛智凡是有意識活動的衆生都可説是智慧性所以經説凡有心者皆得作佛佛是徹底覺悟了的衆生還迷而不覺不是一無所知人的思想雖到達憶念思惟勝於其他衆生但攙雜了許多惡慧迷謬的倒見將那惡慧淨治了使淨慧充分成長起來這就能到達圓滿的佛慧佛的大悲度一切衆生對一切衆生起同情心衆生受苦如自己受苦一樣佛的大悲是從自心中而流露出來的大悲是佛的德行德行是依自他關係而盡應分的善行道德的本身即是利他的如由家庭而宗族由宗族而國家由國家而世界人類更擴大到一切衆生人類的德行還著重於人類從前是家庭本位的國家本位的近來傾向於人類本位的這是人的德行淨化那私我的偏執擴大那德行的對象即從人的德行而發展成佛的德行大悲即佛德的究竟圓成又佛有十力四無所畏表現出佛的大雄德讚佛的也常以師子吼等來讚佛佛的確是大雄大勇而無畏的負起普度衆生的重擔這是從菩薩的大悲大智久歷生死的修持而成的我們發菩提心即願欲心這願欲心即是引發精進心的來源薩埵譯為有情其實含有勇猛的意思用現代話説即充滿了生命力的經中喻如金剛是説衆生心的志向如金剛般的堅固一往直前人類的生命力發展到非常強能忍勞耐苦不折不撓勇猛精進但還染淨錯雜而不純如能以此充沛的生命力轉化為成佛度生的大願大精進一直向前那麼究竟圓成時即成佛的大雄大力大自在了佛性是佛的性德人的佛性即人類特性中可以引發而向佛的可能性説人有佛性如説木中有火性一樣並非木中已有了火光與熱力的發射出來據人而説人性當然還不是佛性不過可能發展成佛的性德而已不妨比喻説一般衆生性如芽人性如含苞了修菩薩行而成佛如開花而結實不過衆生與人性中含有一分迷昧的不淨的繫縛的以迷執的情識為本所以雖有菩薩性佛性的可能而終於不能徹底如現在人的智識是提高了社會制度也有好的創立但壞的也跟著來有時好制度好發明反成為壞事的工具每見鄉村人都是朴實無華的一讀了書走進大都市就變壞了人性中常是好的壞的同時發展這是人還不能擺脫情識為主導的本質佛法轉染成淨轉識為智要從智本的立場使一切獲得良好的增進人類學佛只是依於人的立場善用人的特性不礙人間正行而趨向於佛性的完成太虛大師的人成即佛成即是即人成佛人的學佛法門仁俊記
