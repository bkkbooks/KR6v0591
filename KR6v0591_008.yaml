任何知識都離不了感官得來的知識基礎而感官所得來的都含有一種惑亂性人類的一切感官知識及依此而發展的一切知識都不離惑亂也就一切認識都有問題都有錯亂如不把這惑亂我們的錯亂根本找出而解決他糾正他那我們將永久在虛妄顛倒中生永不能體見真理也就永久在憂苦當中經論中表示這一意義所以說真如指絶對的真理是離言說相離心緣相的真理不但離言說文字相不是一般的語言文字所能表達還是離心緣相也非一般的認識所能認識我們的感官認識或理性的認識以及依認識而有的語言文字在在都含有一種錯誤認識到大的宇宙小的微塵或是事相或是理則無一能離此隱密的惑亂所以說一切都是虛妄那惑亂的根源癥結到底在那裡說到惑亂可分為二類一是世間知識所能覺知的一是憑世間的知識怎麼也不能知道他是惑亂的世俗所能了解的惑亂可以分為三類境亂根亂識亂如患有某種眼病的兩眼常見空中飄著飛蠅般的黑點或一絲絲的在浮動在目力正常的人知道這是虛妄的這是由於根生理病態所引起的錯亂這是世間知識所能覺察的因一般目力正常的都沒有見到只是病眼的錯覺再如嗜食辣味的或食石榴而嚼到榴皮舌根為辛辣澀麻所侵襲什麼滋味也嘗不出來這是舌根有了問題又如鼻塞而不聞香臭的耳內經常嗡嗡作響身體某一部分麻木不仁不知痛癢的這都是由於生理的變化使所見所感的與常人不同各式各樣的病態的感覺就是根亂有些錯亂是與生理感官沒有關係的如站在一條又直又長的大路上向前望去望到遠處覺得路是狹得多了近寬遠窄是人人所同見的就是攝影也是愈遠愈小的但路並沒有寬狹而現起近寬遠窄的錯亂相是物理的自然現象又如盛水的玻璃杯將一枝筆插入筆就成曲折形當然筆還是直的這只是插入水杯所現起的幻相與眼根的病態無關還有所謂雲駛月運舟行岸移這都是外在物理相關所生的現象而引起我們錯誤的認識這些就是境亂有些惑亂是屬於我們自己的心識如生長在某一區域對該區域的文化宗教習俗受了長期的熏陶習以成性認為當然如此如沒有佛法而一向信仰神教的區域對於創造萬物的神看作真實佛法稱之為生於邊地邪見之家這是從環境教育所養成的惑亂也有知識發達經自己的觀察研究推理而不慎的陷於判斷的謬誤卻自以為然堅執己見這類習以成性的或自己觀察判斷錯誤的是自己心識上的惑亂如能虛心深一層研究那還是可以世間知識科學實驗等證明自己過去的謬誤這一類稱為識亂上三類性質不同雖時常惑亂我們使我們陷於謬誤但在世間知識進步下都能覺察而糾正過來的另有一種惑亂是世俗所不能解了的雖然今日的科學昌明知識發達可以推知一二我們不曾能正見一切的真相但究竟說來怎樣去發掘研究推理憑世間的知識是難以徹底了解他的惑亂性舉例說放在這裡的桌子已經好久了大家看來沒有什麼不同前天是這樣昨天是這樣今天也還是這樣其實是錯了佛陀正覺所開示的一切法即生即滅都在不息的變化中這確是一般人所難以了解的一般是要在桌子破舊階段才會知道的又如昨天的我與今天的我有什麼不同不但在座諸位看不出連我自己也不明白但佛卻這樣的對我們說身心是不息變化著的前剎那與後剎那不同昨我與今我變得非常不同了近代科學進步知道我們身內血液的循環在新陳代謝的過程中變化是多麼快血液如此就是構成身體的細胞也迅速的新陳代謝而過去然出現在我們認識上的桌子身體是那麼真實而沒有什麼變化這種錯亂我們怎麼能了解呢佛說一切法從因緣生依種種關係因緣而決定他的性質形態作用因緣所生必歸於滅在生滅不息中相似相續而我們卻誤以為沒有變動獨存的個體見到紅以為是真實的紅見到白以為是真實的白以為有真實的物有真實的自我總之以為一切都有特定的實體不知一切從因緣生不能了達生滅不息的變化也就不能了解無常的法則不能了達相依相待的關係也就不能了解無我的真相有時在理論的推比上知道一切為關係的存在如生存在社會中人與人有相互依存的關係人是不能離群獨存的社會的種種關係為我們獲得生存安樂的必備條件雖這麼了解這麼說一旦面對人事卻都忘了那時直覺的以自己為中心以自己為尺度而決定怎麼做去這因為我們的認識是依感官知識為根源的感官直覺到的含有根本的惑亂不能了解無常無我的真相所以經意識推比而得的多少了解在實際生活中不能充分發揮力量還是受到老觀念的影響說理論嗎在感官的經驗中直覺為實在的不變的獨立的這種根本的惑亂在高深的學理思想中仍舊有他的影響力世間知識的一般現象終於要把握一實在客觀的存在永恆的實在永恆的變化等為根源而建立世間的哲學問題也就在這裡我們的一切知識常識科學的知識哲學與一般宗教的知識都離不了那種惑亂男女老小愚智都是一樣在這點上大科學家大哲學家與知識平常的人差不了什麼這所以人人有煩惱人人有憂苦這種根本的惑亂是世俗知識所無法通達的佛以我們所能理解比喻那不容易理解的引導到超越世間的正智如經上說色如聚沫受如水泡想如陽焰行如芭蕉識如幻事在這些比喻中陽焰是很容易理會的什麼是陽焰鄉村中春天的陽光照下來地上的水分化成水汽而向上升起遠遠望去如河中的波浪湧動一般這就是陽焰遠遠望去波浪洶湧走到近處一看什麼也看不到這比喻那眼見耳聞是確實如此而在真智慧前卻一無所得陽焰等不真實是我們所能理解的佛就用來比喻物理的生理的心理的我們所覺得真實的也是那樣的虛妄見為如何如何都是不離惑亂的從理解而從進一步的修行中從根去除惑亂而正覺萬有的真相三通達勝義的方便佛說世俗的一切是虛妄的所以稱為虛妄就在我們的一切認識都含有惑亂性與真相不符佛法所說的勝義如實勝義是聖人所體悟的境地聖者所體悟到的是什麼就是什麼諸法本來面目如其本來面目毫無歪曲毫無惑亂也就不再是虛妄而稱之為如實了凡夫的認識不離言說言說包括了語言文字思想出於口的是語言潛存於內心的是認識思想口言與心思兩者是沒有太大差別的我們的一切是言說的境界有惑亂性虛妄性聖者是離言說的所以聖者的如實的境地非世間語言所能說也非世間的心識所能了說到這裡諸位也許要發生疑問人類就是依語言文字來理解一切的如離開語言文字佛也無法教導我們我們修行也無從下手了在這裡我們不能不稱歎佛的偉大因為佛有不可思議的大方便能以方便來引導衆生這是說佛依衆生知能所能了解的應用世間的語言文字思想引導我們使我們能通向離語言文字心識的境界舉例說我們聽說有山沒有去過也不知在那裡如何去法有人指示我們山在南方要去就先到城然後沿大道再左轉右轉就可以到達了我們依所指示而進行果然到了目的地其實山自身並沒有東南西北可說什麼路什麼道也只是世俗的假名就因為世間所能了解於是說向南向北左轉右轉就能引導到目的地所以聖者所體悟的勝義如實雖不是凡夫所能理解的佛卻能從我們所能認識的發現他的惑亂性終於能透出虛妄到達諸法的如實也就能離種種煩惱而解脫一切的憂苦依緣起有解自性空這是佛教導我們通達勝義遠離虛妄的大方便佛開示我們在我們所了知的一切法無一非依種種關係條件因素因緣和合而成立的依因緣和合而生起的物理的生理的心理的一切現象決不如我們所執著的那樣凡從因緣而生起的必依緣而滅所以因緣所生法一定是無常的既依因緣和合而有就不能離因緣而存在只存在於相依相待的因緣關係中那就是沒有自性無我的一切是依緣而有沒有實自性的空性也就是無常性無我性無生性無滅性空性為聖者所體悟的離言法性雖不是我們所能解卻可以因緣有的方便經修持實行而通達他佛說緣起有而自性空指明了我們認識中的根本謬誤執著一一法為實有自性以緣有性空為方便能引導到於一切法不生執著正知一切無定法可得就能離虛妄離惑亂悟入諸法空相聖者的境地空也是一個名字代表聖者所證悟的如實四憂苦的究竟解脫要解脫憂苦了脫生死在乎覺了認識上的迷妄惑亂覺了迷妄惑亂的方便是從一切因緣有中理解一切法空一切都如幻如化世俗上分明如此而其實並不如此一切是空無自性的能觀照一切法自性空戲論就滅了戲論是一切法實有自性的惑亂相是迷妄的根元戲論生煩惱就生煩惱生憂苦也就生起反之戲論滅煩惱就不起煩惱不起憂苦也就解脫了般若波羅蜜多心經上說照見五蘊皆空度一切苦厄在廣明一切法空後接著說依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃又結說能除一切苦真實不虛只是說明了依照見性空的智慧般若得究竟的解脫憂苦當然這要經歷聞思修的實踐過程才能完成憂苦的究竟解脫從經論去研求從善知識處去請益對於執有自性為迷妄根元自性本空為離妄悟入的不二門獲得明確的定解是聞慧進而深入思惟使空義得更深切的明顯發起趣向的決意與精進是思慧再進一步的雙修止觀於正定中觀照了了是修慧這樣的進修不已終於徹底的離卻惑亂戲論戲論惑亂不現就是真空的悟入現證聖者離言法性的境地如心經所說心無罣礙無罣礙故無有恐怖遠離顛倒夢想正是沒有煩惱沒有憂苦的境界這是三乘共證的涅槃生死解脫是己利的完成從法性空寂中廣行利益衆生的大行到覺行圓滿得無上菩提成佛那就是自利利他的圓滿衆生在迷妄中執常執我受情意所播弄所以引生內心無限的憂苦解脫憂苦根本是智慧通達緣起性空的智慧以智化情了達緣起的事理真相不為境相的惑亂所誘惑生老病死為世間的必然現象是用不著憂苦的怕老怕病怕死才會憂苦不了眷屬的聚散也各有因緣用不著癡情而自沈苦海從前佛在世時有婦人而死了心愛的兒子於是心情錯亂到處亂跑說是要找自己的兒子後來遇到了佛聽佛開示佛法的光明照破了他的癡情於是不再哭泣不再瘋顛了後來一個兒子又死了不久房屋與財物又失火焚去了他並不憂苦只是處理他應該處理的事他的丈夫覺得希奇問起來知道他受了佛陀的開化於是也去見佛聽法結果都離俗出家達到遠離一切憂愁恐怖顛倒解脫自在這是以智化情的實例也是沒有憂苦的實例以智契理要以智化情而解脫憂苦就要以智契理而遠離迷妄緣起性空的真智慧就是契理化情的要著從前佛入涅槃沒有究竟解脫的雖有智慧還勝不過情意都陷於憂苦當中究竟解脫的聖者阿羅漢們只是感到無常力大而心地還是寧靜不動以智興悲能照見一切皆無自性空也就能了達一切如幻如化知道幻化的一切從因緣而有也就能發無我的同體的悲心從無我智慧中發起的慈悲才是大慈悲也可說是真正的仁大乘佛法以普利一切衆生為目標就是從緣起性空中來以智化情以智契理以智興悲應用於自己的解脫憂苦就是自利應用於為人解除世間的憂苦就是利他世間的一切憂苦問題在我們自己而自己的問題所在是煩惱的根元惑亂戲論所以根治世間迷惑而引導衆生從憂苦中解脫出來這是佛法的救世觀也就是佛法的大慈悲惟願大家在三寶的加被中遠離苦厄獲得永恆的平安慧理慧輪合記
