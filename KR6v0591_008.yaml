與戒布施與持戒是佛法的熟悉名詞特別是在家學佛的布施幾成為必行的義務布施的意義何在佛法所說的布施對象或是可尊敬的如孝養父母奉事尊長供養三寶等或是可悲憫的如貧窮鰥寡孤獨殘廢等以現代語來說即慈善事業或福利事業的布施佛法所說的布施意義深長非僅財物的施捨而已唯一般以財物為主布施的最高意義是為人而能犧牲自己的一切富有者在生活必需外經濟上有餘裕力應豫貧窮孤苦或因天災人禍而受難者以援助古代有修橋梁開道路義學等施設也都是財物施捨的對象從效用來說布施可使貧富不致於過分懸殊窮困者得到救濟也不致陷於苦難或引起諍亂而布施者能養成損己利人的品格不會作物欲的過分追求古代的印度中國也曾經有過只是有些變質了有稱為無遮大施的國王大臣等將富餘的財物盡量的普濟人民凡財物的布施均含有減少物欲節制物欲的意義如物欲而受到限制那因物欲而引生的諍執與憂苦也必然減少而同得和平與安樂了以基本的戒來說是五戒五戒中有不與取盜戒就是針對物欲的非法行為佛法所說的盜戒正如上面的正命所說的不應取而取固然是盜應付出而不付出也是盜總之凡屬不應得而得的都名為盜所以能切實奉行盜戒的必與正命相符合其他殺生戒妄語戒等多數也與物欲有關佛法針對物欲引生憂苦而立戒能依戒持行避免由物欲諍競而引生的憂苦就是促進人世和平與安樂的好方法二對治偏執的見諍說到偏執偏見可說是人的通病每就所見的部分作為全體或以自己錯誤的認識執為正確由於種種偏執自以為是形成思想問題發展擴大甚至成為世界和平的莫大威脅對治偏執佛陀是一貫採用緣起的立場緣起即中道中道即不落於兩端的偏見佛在世時當時的外道有種種偏執或執為常以身命為常住不變或執斷以為一滅永滅更不受生或執一以為身與命我靈宇宙萬有是同一的或執異以為身與命宇宙萬有是有不同實體的或執一切從神所生或說一切從微塵物質生這些不是偏這就是偏那不能正確理解事理的真相佛法說離此二邊說中道此有故彼有此生故彼生等這就是緣起論唯有依緣起的正見才不致落入兩邊而從種種偏見中脫出得到中道的路線說到緣起意思是為緣能起人生宇宙的任何一種現象之生起絶非孤立的突然的而是依種種關係條件佛法中名為因緣的和合循著必然的法則而生起與散滅的所以任何現象都不可作為孤立的去理解不可抓住一點以為一切由此而生而忽略整體的延續的與相關的觀察一切依因緣和合所成因緣是極復雜的沒有單一因佛從種種關係去了解現象所以能超出二邊得到中道中道就是恰恰好恰到好處最正確的方法最正確的理論茲舉例來說如看見是一種現象一般人以為眼能見雖然隨俗是可以這麼說的而實際卻不止如此佛就事論事說能成為見這一事實是有種種因緣的有能見的眼根眼根是生理的以現代名詞來說是視覺神經視神經接觸某一事物引生印象這眼根是見的主要條件但不是唯一的條件要有所見的對象若沒有對象怎麼看也見不到什麼如沒有對象而看到什麼那眼根也就有毛病了我們人類的眼根是有共同性的人人見到如此雖所見的對象究竟是什麼研究起來頗不簡單但常識告訴我們對象境是不能說沒有的沒有是不能見的單是眼見如攝影一樣留下印象但我們能見到這是什麼那是什麼這不只是留下印象而是能主動的分別這一印象這就是識分別如沒有分別的心識而僅有眼根與境界那是不能成為明確的見的有了根境識還不一定能成為見因為根是根境是境識是識彼此不相關聯怎能成為見呢能使眼與境界相觸對依眼根而發眼識眼識能了境界根境識三者綜合相關的活動是有賴於觸觸是使三者和合從三和引起的心理作用還要有一種注意力作意傾向於對象才能明確見到否則心不在焉視而不見還是不能成為見這一種現象上面約見所需的種種因緣說其實因緣多得很如光線空間等都是只是不太重要也就不說罷了從緣起的觀點去了解現象就不會偏於一邊不致以為有眼就能見或有心就可見佛陀始終以緣起來闡明中道因為除了緣起就沒有中道可說例如人有生理的物理的心理的因素佛陀的分別人衆生總不外乎根境識十八界的總和人的活動具有多方面的因素佛從不將人的一切歸結到物質以為一切都由物質而生雖然佛法中說唯識說唯心似乎與一般的唯心論一樣其實依唯識學說一切現行現象由於種子而種子也不外乎根境識的種子從十八界種而生一切並不是只有心識由心生出其他的一切所以世間的學術思想種種見解以為唯這唯那都是執著一端以部分為根元來說明一切違反緣起的正見佛所說的緣起觀不是武斷的而是就事論事闡明緣起的事相不落二邊也就因此能更深刻的通達緣起的本性如能對緣起說而有所理解就不會陷於偏見佛就是依緣起以掃蕩一切偏見依緣起以顯示中道的緣起中道是極深極廣的非三言兩語所可說盡現在只能略說點滴而已三對治慢人人都有慢心每直覺得應該超勝別人慢心如發展過分就會在物欲上意見上要凌駕別人騎在別人的頭上佛法以平等來對治慢病衆生是平等的勿以為自己或自己民族自己的國家是特別優越的非勝過別人不可佛出世時印度的神教假借神權以為人類有四大階級當時的宗教婆羅門如以色列的利末族武士王階級剎帝利如以色列的猶太族勝過一切而以首陀無恆産的農工及被認為低賤職業者為賤族連