著年齡的增長而終於到來二身苦心苦再分二大類來說經上常說憂悲苦惱一般來說這都是苦沒有太大的差別然經文所說有不同的意義憂是意識上所感受的苦較平時所說的憂愁憂慮意義要廣一點為未來事擔心固然是憂即當前的境界引起不稱意的感覺非生理所引生的與意識相應都名為憂悲是悲哀悲傷也是與意識相應的內心因某項事物的無法獲得或得而復失所引生的不稱意感如權威的喪失經濟的耗散眷屬的分離年華的消逝名譽或其他的蒙受損害這一類的憂苦統稱為悲悲是與意識相應的比憂的情形更嚴重些什麼是苦苦是與五識相應的如口渴饑餓冷熱肉體受創傷等直接由生理關係所引起的就是苦惱是由生理所引起苦到極點劇烈的痛苦內心焦灼如焚嚴重起來吃不下睡不著坐立不安名為惱這憂悲苦惱可分為兩類憂悲屬於心苦苦惱屬於身苦身苦是由生理所引起的苦雖然身體強弱抵抗力不等反應的苦不完全一致但大致說來是人人一樣的都會有苦感的如饑渴創傷疾病身苦的感受大致相同心苦或也由物質所引起但是間接的或直接由憶前想後等而引起引起的對象儘管相同而感受的苦痛程度的深淺因人而異甚至相反的感到喜樂舉例說中秋的明月喜歡他的人多有人逢此佳節還有賞月的雅興感到無限的快樂然同是一輪明月有的卻不見則已見了反生痛苦甚至泫然淚下無限悲傷所謂舉頭望明月低頭思故鄉原來他看到中秋的明月激起思家之情想起父母妻兒都遠在天涯海角而自己卻流落異鄉雖逢佳節也不得一敘天倫之樂佳節與明月帶來了感觸憂苦所謂每逢佳節倍思親可見同樣的明月使人有不同的感受這種憂苦與生理不相關與對象沒有必然關係視人所引起的感想而定這是心苦再舉例說有人聽說某人在背後詆毀他聽了焦躁不安內心感到莫大的委屈過了多時心裡還忘不了也有人聽說他人背後誹謗卻無動於衷付之一笑了之同樣的一句話有人聽了苦惱不已有人聽了無動於衷這可見引生的感受是因人的心境而異的這樣的苦就是心苦以世情來說最大的痛苦莫過於臨死對眷屬財物的戀著不捨然平時於佛法有相當修持的能在這緊要關頭泰然而去同是瀕臨死亡卻有不同感受顯示了心苦確是因人而異的所以身苦大致相同而心苦卻人人不同學佛的人應分別二類苦痛的差別三空虛與幻滅的感覺文明的進步物資的豐盛醫藥的昌明甚至政治修明天下和平而人類的內心深處所有空虛幻滅的不安還是解決不了的也就是不能免於憂苦的幻滅從欲望的不能實現不能保持而來在年輕時對前途都有美好的憧憬熱切的希望想達到理想那怕是多少好一點的目標如希望未來的事業有輝煌的成就成一位富有的人希望將來能得到如意眷屬有個美滿的家庭從事政治生涯的希望能實現自己對政治上的抱負或作個出衆的領導者總之即使是極平凡的希望人都是有個金色的夢希望在人生旅途的前進中能有更光輝的一頁可是事實上卻不能盡如人意可能成家以後兒女成群為兒女辛勞終身而家庭卻不見得幸福可能未來的事業一籌莫展或者有了相當成就又踏上了失敗之路特別今日是個善變的時代社會上不少發跡快而垮台也快的實例如果年輕跌倒再爬起失敗為成功之母如年齡進入老年受到這種挫折那只有失望一途了如晚年而家庭破碎不堪希望從何而來身體有殘缺的人如聾盲四肢不全小兒麻痺等更是前途一片灰黯種種的內心悲哀痛苦無比有人外表上滿不在乎可是當他午夜夢回思潮起伏也難免沮喪了尤其是不論家庭如何圓滿事業如何成功一旦衰老到來往日多彩多姿的好景一幕幕重現心頭但可追憶不復再來人生的希望如泡影的幻滅這種幻滅的感受是現實不過的人在失敗後年老時多病時從幻滅而來的淒涼悲感是何等深切有幻滅感的內心必定有空虛感空虛感與幻滅感不同從欲望的不能滿足永不滿足而來有空虛感的對世間任何事都不能滿足只感到無可奈何一片茫然久了覺得什麼也沒有多大意義活像水上浮萍東西飄蕩沒有著落似的然人已生在世間又不得不活下去吃飯工作睡覺對生活的一切是例行公事一般空虛茫然的心情常湧現在心頭人生經驗告訴我們忙碌緊張的生活是不大有空虛感的因為他的心情有所專注了逮工作結束靜止下來空虛感每無聲無息的侵襲而來每當夜深人靜不想則已一想就感到空虛有些人歡喜玩有的人為了苦悶去過鬧烘烘的刺激的生活燈紅酒緑舞興方酣越是夜深越起徑可是到了曲終人散或是一醉醒來拖著疲乏的身體回去還是一片空虛湧現心頭人是不怕忙而怕間的經常忙碌日子也容易打發空虛感的憂苦無隙可乘連身體也會健康些一旦空間下來無所事事越是無聊越多妄想儘管說忙得討厭可是一間而問題更多心無著落煩惱接踵而來間才真討厭呢我們學佛修行一般總以為清靜無事的好如內心不得充實清間了問題更多有人閉關而非鬧著出來不可再也安不下去空虛感就是重要的因素之一凡夫有說不完的憂苦而屬於心苦的都是煩惱作怪幻滅與空虛是最深徹的憂苦了心理上的苦受是隨年齡而有深淺差別的越是年老幻滅與空虛越是體驗深切老年人進求宗教的歸宿原因也就在這裡世間一切都無法安慰自己那唯有求之於宗教了佛法著重於了生死還是為了這個從前禪宗二祖慧可當達摩東來後就去初祖處乞求安心法門可見二祖的參學為了內心不安心有不安就是潛伏在內心深處的憂苦無法了脫所以學佛修行主