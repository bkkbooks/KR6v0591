body:
  text: 佛法是救世之仁民國五十二年的春天我曾應臺南佛教會的邀請作了七天的講演其中一天以佛法是救世之仁為題五十八年二月我在星加坡時星洲佛教總會為我安排了一次兩天的講演會地點在維多利亞劇院題目也是佛法是救世之仁有慧理筆記下來四月到了香港香港佛教聯合會邀我在佛教會講演講題為苦與空似乎講了六天次第雖小有變化內容與星洲所講的相近只是詳備一些當時有慧輪録音把它記録出來二人的筆記都寄到臺灣來我只好給它整理一下去掉重復截長補短而合為一篇仍以佛法是救世之仁為題印順附記諸位長老法師善友在這動亂的時代能有這麼一個因緣與各位共聚一堂來向大家介紹佛法宣揚佛法這是三寶威德的加被對於三寶我們首先要表示崇敬與感謝的喜悅佛法是救世之仁這是孫中山先生說過的一句話佛法流傳人間千百年來受到人們的崇敬作為我們自己的信仰到底佛法的意義何在中山先生這一句話可說是扼要的揭示了出來平常說佛法以慈悲為本慈悲就是仁以慈悲心來救濟世間苦厄所以稱為救世之仁這句話非常正確而內容還需要解說也就是佛法是怎樣的救世現在以此為題從兩方面去說一重在人與人間所有的憂苦二重在自身所有的憂苦佛法以救濟衆生咸令免離一切苦厄為目的從這群體與個體兩方面去說佛法救世的真意義才能完滿的理解出來一人間相互引起的憂苦的救濟一佛法宗旨度一切苦厄我們的教主釋迦牟尼佛在二千五百多年前的印度成佛說法成立了佛教佛陀弘揚佛法的目的也就是我們來信佛學佛的目的扼要的說只是為了人類衆生的憂苦困厄自己要求解脫是自利想解救別人是利他自利利他的主要意義正如心經所說度一切苦厄能除一切苦真實不虛人生固有相對的意義然而人生有說不盡的憂苦也是不容我們否認的世間無處不充滿憂苦就人類來說最嚴重的莫過於人與人間的殘酷鬥爭了過去曾有這麼一個傳說一位來自印度的法師在中國逗留期間有國人向他吹噓我國文化的悠久和偉大並取出一部草四史為例那位印度法師想瞭解書中的內容拿起那部草四史嗅了一下說儘是血腥氣歷史是充滿了殘殺鬥爭豈僅是中國而已以上雖是一則諷刺的寓言然確是有真實意義的最近在星洲當地報紙上閲讀到這麼一則記載某外籍人士以研究及整理的方法將有史以來的國際歷史檢讀一番他認為數千年來只有二百五六十天是天下太平的其餘的日子都在戰爭中過去人類隨時而陷於戰禍的災難而不得安樂是可以想見的了實在說來這二百五六十天也未必有真正的太平小型的鬥爭殺害還不是到處都是只是沒有被記入歷史版中而已世界上各式不同的苦難很多戰爭只是一類所以人類常在擔心憂悶苦惱中過日子難得有真正的平安說到衆生的苦厄有當前的苦厄及苦厄的無限延續從人與人的關係說不單是現代多憂多苦過去早就是這樣如問題而不能解決不能渡入大同的時代人類的苦厄還要一直的延續下去人世間如此每人自己也是這樣不但當前的自己現生是如此過去生早就如此在苦厄的癥結沒有徹底解決之前未來還要一生又一生的無限地延續下去在一生又一生中雖然也有比較好一些的時候如生天國之類但沒有脫離苦厄終於還是在憂苦厄難中過生活人類歷史的延續也好個人生死的流轉也好苦厄不只是現在未來還要苦下去所以為了現在為了未來不能不探求一個解脫苦厄救世之道佛法就是救世的方案問題在人類是否肯來實行二世間苦厄的問題所在茲就人類的世界來說說起人類的苦惱形形式式真是難以計量的為什麼如此憂苦憂苦由何而來我們必須先研討這個問題瞭解這一問題才能從根本上去解決他如地方有土匪出現為了治安當然要去勦滅他們但在出動清勦之前必須先探得匪徒們的行蹤匪徒們來侵襲時所採的路線有什麼人在窩藏匪徒代匪推銷贓物瞭解了這些情形才能有效的加以勦除人類固有說不盡的憂苦而憂苦是依什麼而存在的呢如知道憂苦的來源憂苦依什麼而生根那才能設法來解決憂苦祛除憂苦了憂苦雖然很多歸納起來不外二大類一因個人家國全世界人類而生起依苦痛問題的形式來區分約可分為上面四項孟子說天下之本在國國之本在家依此推論家之本在身個人所以大學的治道以修身齊家治國平天下為次第身就是個人自己有了自己就因自己的存在而有憂苦衆多的憂苦中有些是與別人無關純粹是由自己身心所引生的由個人與個人的聚合營為共同的生活而成立了家庭家是家的成員夫婦父母子女兄弟姊妹等所組成的俗語說相見容易相處難別時容易見時難在長期的相處中眷屬間難免不引起家庭間的問題就難免不為家庭而發生憂苦由家與家的聚合而成社會或組織成國家龐大的國家組織對內部的和平教化繁榮難免有治理上的問題與困難也就造成了國家的憂苦國與國之間是不能隔絶而沒有關係的有了關係也就不免有了問題問題就擴大而成天下的了古人所說的天下是全人類也就是現今所稱的國際國際問題由每個國家間的關係而形成國家問題是依各社團各家庭的組合而存在家庭問題依家庭成員個己的共聚而有所以從問題的形式來看依天下國家身而有不同的憂苦而從根本去看只是人類自己是你自己也是我自己這樣要求世界天下太平必得從國治從家齊尤其要從每人自己的修身做起這猶如要求國族的興盛非注意國民的優生國民的道德與健康等不可否則如基礎不固材料的質地不好再加偷工減料建起來的房屋怎能不倒塌呢在這點上儒學與佛法儘管不完全一樣但根本的見地是一致的二對身心衆生人類自然而起的苦上面所說是約人間關係所構成家國天下所有的不同問題不同苦難而這裡是約人的心境說內心的生起憂苦一定由於觸對境界從對境的差別來說就分為這三項人是身心就是精神與物質的和合自己的生理心理都在瞬息不停的變化中身心不斷的變化漸漸的生老病死到來從老病死而引生的憂苦就是觸對身心而引起的老病死本是自然的必然現象是人生無可避免的事這是當然必然的但我們一得人身每人都想不老不病不死至少是不歡喜自己老了病了死了說句笑話年輕的女子大多怕年華消逝而不肯道出自己的確實年齡西方女子以被問芳齡為不禮貌這都道破了一個事實就是怕老而引起的憂苦為老病死而憂苦是否明智那是另一回事而一般人總是為此而憂苦成為現實人生的普遍事實另一類憂苦是對衆生人類而引生的虎狼豺豹等出現令人畏怖特別在古代人與獸爭的時代蚊刺蛇咬也使人感到困擾還有穀物遭蝗蟲的災害田鼠多起來會把農作物吃光家鼠損壞衣物螞蟻蒼蠅也同樣帶給人類不少的苦惱這是人與旁生與動物的含義相近相接觸所引起的對人類而引起憂苦更為明顯人是被稱為社會的動物是不能離社會關係而獨存的因此人必須與他人相處即使沒有共處也多少不免有所關聯種種的人事問題便接踵而來人與人由於個性興趣見解的不同彼此每産生種種的誤會爭執仇恨也就由此而帶來了苦惱即使感情好恩愛非常但感情是沒有定性的一旦受到某種影響感情也就隨之而起變化不論是母子夫婦朋友雖然關係不同而感情不能融洽所生的苦痛是沒有多大分別的其實情感親厚的眷屬知友感情雖沒有變壞而為了生離死別所引起的苦惱也每是常人所不能解免的還有一類對自然界物質的關係而引起的生存於大自然中的人類離不了自然人的生存不能沒有衣食住行等資生物沒有或缺少都會苦痛的但有了多了也常會引起困難例如交通從前依賴步行小舟交通是非常艱苦危險的自有了汽車飛機輪船交通的工具把人類的空間距離縮短了然在方便迅速的情形下又有新的憂苦如飛機汽車輪船的失事特別是都市中的交通事故日見嚴重至於自然界如天時的炎夏炙熱或嚴寒徹骨冰雪連天天旱求不得滴雨有時卻大水為災還有地震颱風海嘯火山爆發自然界的種種災害是人類生活於大自然觸對自然而生起的苦惱由上所說個人家庭國家國際所有的問題解決不了苦難重重不消說是依個人依人與人的結合而存在就是對自然界對衆生人類界對自己的身心所以有種種憂苦也都是由於我們自己的存在有了我們自己人類便有種種的苦厄人類所共處的世間也就充滿了苦惱有苦惱就有解除苦惱的要求因而引發出解除苦厄的辦法切實的說起來世間一切學術醫藥教育經濟工巧政治法律以及科學的聲光電化無一不是與衆生人類有關無一不為人類自己的存在而出現宗教佛法的出現也還是為了這個如離開人類自己或設想一沒有衆生沒有人類的世界那一切都不成為問題也一切都不成其為憂苦了一般來說人類的憂苦存在於個人家庭國家國際的關係中存在於對自然界對衆生界的關係中所以世間的醫藥教育一切文化施設對人類憂苦或福樂的關係異常密切佛法並沒有輕視這些的重要性而是說老病死引起的憂苦雖僅是個人的卻是最基本的也可說最原始的一切問題一切苦痛即使解除了而每個人的老病死苦還是存在的佛法是說物産的增加政治的革新等對人生苦厄的解除幸福的增進雖極為重要而最根本的還是每個人理性的智慧與道德的提高消除種種不良的心理因素淨化自己的身心重視個人根本的革新與完善才能徹底的解除苦厄實現個人家庭國家國際的真正幸福否則不重視人類自己的修治革新一味向外求解決覺得別人不好起來打倒他而不知問題並沒有解決因為代之而起的一群每人自己都具有同樣的問題覺得物資不足盡量向外求發展而不知物資的發達與個人的福樂國際的和平不成正比例而還是那樣的鬥爭與迫害以佛法的觀點來看一切憂苦一切問題是依人類自己而存在唯有從自己的理解自己的改善自己的解決中才是根本而徹底的辦法三問題的分析與推究一切憂苦一切問題依人類衆生而存在到底衆生的身心有什麼問題而這樣的解決不了依佛的開示看來可以歸納為四類一欲諍諍是不和諧從內心的猜忌語言的論諍到身體行動上的鬥爭戰爭都是諍諍是世間不和樂的別名為什麼會諍呢經中告訴我們愛欲是諍的原因內心有貪愛的煩惱在作祟所以就不斷起諍諍就有憂苦義品說趣求諸欲人常起於希望所欲若不遂惱壞如箭中欲是希望的欲求但這裡所說的欲不只是希望而是與愛貪著相結合的欲愛如對生活資具物質的欲愛男女間的欲愛家族或國族繁榮的欲愛一切都是欲愛而主要是經濟物資的欲愛人而生在世間衣食住行等資生物不僅常人不能缺就是阿羅漢聖者也少不得既然是當然的正常需要為什麼會因對物資的欲求而引起諍引起無邊的苦痛呢不要說由於缺少所以你搶我奪我曾不止一次的舉例說兩隻狗臥在地上有人挑一擔食料倒在地上論理兩隻狗是怎麼也吃不了的大可以滿足了然而食物一到地上兩隻狗是又吠又咬邊搶邊吃無知的狗是如此文明的人也好不了多